name: Build and Publish Academy App

on:
  push:
    branches: [ main ]
    paths:
      - '*.py'
      - '.github/workflows/build-and-publish.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: build-publish
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build app
        run: python3 build_aviation_academy.py

      - name: Sync index.html for GitHub Pages
        run: cp Aviation_Maintenance_Academy.html index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Aviation_Maintenance_Academy.html index.html
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Auto-build: sync published app [skip ci]"
            git push
          fi

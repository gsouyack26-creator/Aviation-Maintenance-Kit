, per SRM."}, {"q": "Before performing ANY composite structural repair you must:", "choices": ["Guess at cure time", "Follow the Structural Repair Manual's exact ply schedule, cure, and pressure specs", "Use any available resin", "Skip damage classification"], "answer": 1, "explain": "SRM data is approved data - deviating from ply schedule, cure profile, or vacuum/pressure specs can produce an unsafe repair."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "ice_rain_protection", "title": "Ice & Rain Protection Systems", "track": "airframe", "icon": "&#x2744;", "sections": [{"heading": "Why Ice Matters", "body": "Even light frost/ice disrupts airflow over airfoils, increasing stall speed and drag while reducing lift - the <b>clean aircraft concept</b> demands no ice/frost/snow adhering before flight. Ice can also block pitot-static ports, engine inlets, and control surfaces/hinges."}, {"heading": "Anti-Ice vs De-Ice", "body": "<b>Anti-ice</b> systems run continuously to prevent ice from forming (e.g., heated leading edges, prop anti-ice). <b>De-ice</b> systems allow a small amount to build then remove it cyclically (e.g., pneumatic boots that inflate/crack ice off, or cycled electrothermal heating)."}, {"heading": "System Types", "body": "<b>Pneumatic boots</b> - rubber leading-edge boots inflated by engine bleed air/pump in a timed cycle. <b>Bleed-air thermal</b> - hot engine bleed air ducted to wing/engine inlet leading edges (turbine aircraft). <b>Electrothermal</b> - resistive heating elements (props, windshields, pitot heat, small unpressurized aircraft wings)."}, {"heading": "Rain & Windshield Protection", "body": "<b>Rain repellent</b> coatings, <b>windshield wipers</b>, and <b>heated windshields</b> (also anti-fog/anti-ice) maintain visibility. Pitot heat is critical - unheated in icing conditions gives false/frozen airspeed readings, a classic accident chain contributor."}], "quiz": [{"q": "The 'clean aircraft concept' requires:", "choices": ["A polished exterior", "No ice, frost, or snow adhering to critical surfaces before flight", "Recently washed windows", "New paint every year"], "answer": 1, "explain": "Even light frost disrupts airflow and increases stall speed - the aircraft must be free of adhering ice/frost/snow before flight."}, {"q": "The key difference between anti-ice and de-ice systems is:", "choices": ["Anti-ice prevents formation; de-ice removes ice after some accumulation", "They are the same thing", "De-ice only works on the ground", "Anti-ice is always pneumatic"], "answer": 0, "explain": "Anti-ice runs continuously to prevent ice formation; de-ice systems (like pneumatic boots) cycle to remove ice that has already formed."}, {"q": "Pneumatic deice boots work by:", "choices": ["Heating the leading edge", "Inflating in a timed cycle to crack/shed accumulated ice", "Spraying anti-freeze", "Vibrating at ultrasonic frequency"], "answer": 1, "explain": "Boots inflate with air pressure in a timed sequence, breaking the bond between ice and the boot surface so airflow removes it."}, {"q": "An unheated pitot tube in icing conditions can cause:", "choices": ["No effect on instruments", "False or frozen airspeed indications", "Increased fuel burn only", "Automatic autopilot disconnect"], "answer": 1, "explain": "A blocked/frozen pitot tube gives erroneous or frozen airspeed readings - a well-documented contributor to loss-of-control accidents."}, {"q": "Bleed-air thermal anti-ice systems are most associated with:", "choices": ["Small piston singles only", "Turbine-powered aircraft using engine bleed air", "Gliders", "Battery-only systems"], "answer": 1, "explain": "Bleed-air anti-ice taps hot compressor air from turbine engines to heat wing/inlet leading edges - not available on non-turbine aircraft."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "engine_overhaul", "title": "Engine Overhaul & TBO", "track": "powerplant", "icon": "&#x2699;", "sections": [{"heading": "TBO & Overhaul Basics", "body": "<b>TBO (Time Between Overhaul)</b> is a manufacturer recommendation (hours or calendar time), not usually an FAA mandate for Part 91 piston aircraft - though it IS mandatory under some operating rules (e.g., Part 135) or if specified by an AD. Overhaul disassembles, inspects/measures every part against service limits, replaces life-limited/worn parts, and reassembles to like-new tolerances."}, {"heading": "Overhaul vs Rebuilt vs Repaired", "body": "<b>Overhauled</b> - inspected/reworked to service limits, may retain some original parts. <b>Rebuilt (zero-timed)</b> - only the manufacturer or their agent can 'zero-time' a logbook, using new/service-limit parts to essentially factory-new tolerances. <b>Repaired</b> - fixed a specific defect, not a full overhaul."}, {"heading": "Inspection During Teardown", "body": "Measure cylinders (bore wear/taper/out-of-round), check crankshaft runout/journals, inspect bearings/camshaft/lifters for spalling, magnetic-particle inspect steel parts, dye-penetrant aluminum parts, check AD/service bulletin compliance on every component (e.g., crankshaft AD inspections)."}, {"heading": "Life-Limited & Time-Continued Parts", "body": "Some parts (certain crankshafts, turbine disks, life-limited bolts) have a hard replacement time regardless of condition. Others can be <b>time-continued</b> - reused if they pass inspection, extending their service without a fixed cap. Proper records must trace part total time/cycles across overhauls."}], "quiz": [{"q": "For a typical Part 91 piston aircraft, TBO is generally:", "choices": ["An absolute FAA-mandated limit", "A manufacturer recommendation, not automatically mandatory", "Only for turbine engines", "Irrelevant to maintenance"], "answer": 1, "explain": "TBO is a manufacturer recommendation; Part 91 operators are not automatically required to overhaul at TBO unless an AD or their specific operating rules require it."}, {"q": "Only the manufacturer (or their agent) may legally call an engine:", "choices": ["Overhauled", "Rebuilt (zero-timed)", "Repaired", "Inspected"], "answer": 1, "explain": "The term 'rebuilt/zero-timed' has a specific regulatory meaning reserved for the manufacturer or their approved agent using new/service-limit parts."}, {"q": "A life-limited part must be:", "choices": ["Reused indefinitely if it looks fine", "Replaced at its specified limit regardless of condition", "Repaired instead of replaced", "Ignored during overhaul"], "answer": 1, "explain": "Life-limited parts have a hard mandatory replacement time/cycle limit - condition doesn't extend it."}, {"q": "During teardown, cylinders are measured mainly to check:", "choices": ["Paint condition", "Bore wear, taper, and out-of-round against service limits", "Color of the exhaust", "Fuel type compatibility"], "answer": 1, "explain": "Cylinder bore dimensions are compared against manufacturer service limits to decide reuse, honing, or replacement."}, {"q": "Time-continued parts differ from life-limited parts because they:", "choices": ["Can be reused if they pass inspection, without a fixed hard cap", "Must always be replaced", "Are never inspected", "Only apply to props"], "answer": 0, "explain": "Time-continued parts stay in service as long as inspection shows they remain serviceable, unlike life-limited parts with a fixed cutoff."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "aerodynamics", "title": "Aerodynamics Fundamentals", "track": "airframe", "icon": "&#x1FA82;", "sections": [{"heading": "Four Forces of Flight", "body": "<b>Lift</b> (up, from the wing), <b>Weight</b> (down, gravity), <b>Thrust</b> (forward, powerplant), <b>Drag</b> (rearward, resistance). Steady, level, unaccelerated flight requires Lift=Weight and Thrust=Drag."}, {"heading": "Lift Generation", "body": "Airfoil shape + angle of attack (AOA) accelerate air over the upper surface, lowering pressure (Bernoulli) while also deflecting airflow downward (Newton's 3rd law reaction). Lift increases with AOA up to the <b>critical angle of attack</b>, beyond which the wing stalls."}, {"heading": "Drag Types", "body": "<b>Parasite drag</b> (form, skin friction, interference) increases with speed squared. <b>Induced drag</b> (from wingtip vortices/lift generation) decreases with speed. Total drag is lowest at <b>L/D max</b> speed - best glide/range speed."}, {"heading": "Stalls & Load Factor", "body": "A stall is a critical-AOA event, not simply a low-airspeed event - it can happen at any airspeed with enough AOA (e.g., a steep turn). <b>Load factor</b> (G) increases stall speed: Stall speed increases with the square root of load factor. Steeper banks and turbulence increase load factor and stall risk."}, {"heading": "Stability & Control", "body": "<b>Longitudinal stability</b> (pitch) depends on CG location relative to the wing's center of lift and horizontal stabilizer effect. <b>Lateral</b> (roll, ailerons/dihedral) and <b>directional</b> (yaw, rudder/vertical fin) stability keep the aircraft tracking predictably. A mechanic's rigging work directly affects all three."}], "quiz": [{"q": "In steady, level, unaccelerated flight:", "choices": ["Lift > Weight and Thrust > Drag", "Lift = Weight and Thrust = Drag", "Only thrust matters", "Weight must exceed lift"], "answer": 1, "explain": "Steady level flight requires the four forces to balance: Lift equals Weight, Thrust equals Drag."}, {"q": "A wing stalls when it exceeds:", "choices": ["A specific airspeed only", "The critical angle of attack", "Maximum RPM", "The service ceiling"], "answer": 1, "explain": "A stall is fundamentally an AOA event - it can occur at any airspeed if the critical angle of attack is exceeded."}, {"q": "Induced drag behaves as speed increases:", "choices": ["It increases with speed", "It decreases with speed", "It's unaffected by speed", "It only exists at high speed"], "answer": 1, "explain": "Induced drag (from lift generation/wingtip vortices) decreases as airspeed increases, opposite of parasite drag."}, {"q": "Increasing load factor (G) in a steep turn does what to stall speed?", "choices": ["Decreases it", "Increases it (with the square root of load factor)", "Has no effect", "Only affects turbine aircraft"], "answer": 1, "explain": "Stall speed increases with the square root of load factor - a 2G turn raises stall speed by about 41%."}, {"q": "Longitudinal stability is most directly affected by:", "choices": ["Rudder trim only", "CG location relative to the wing's center of lift", "Tire pressure", "Paint scheme"], "answer": 1, "explain": "CG position relative to the center of lift (plus horizontal stabilizer effect) governs pitch/longitudinal stability - a mechanic's W&B work matters here."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "environmental_oxygen", "title": "Environmental & Oxygen Systems", "track": "airframe", "icon": "&#x1F6C1;", "sections": [{"heading": "Cabin Pressurization", "body": "Pressurized aircraft maintain a lower <b>cabin altitude</b> than actual flight altitude using bleed air and outflow valves. <b>Pressure differential</b> (cabin minus ambient) is limited by structural design - exceeding it risks structural damage; a <b>pressure relief valve</b> protects against overpressurization."}, {"heading": "Environmental Control System (ECS)", "body": "Bleed air (turbine) or engine-driven compressors cool/heat and condition cabin air via <b>packs</b ) (air cycle machines) or vapor-cycle systems. Includes temperature control, humidity/moisture management, and air distribution/mixing valves."}, {"heading": "Supplemental Oxygen", "body": "Required above certain cabin altitudes per regulation (crew/passenger requirements differ by altitude and duration). Systems: <b>gaseous</b> (high-pressure cylinders, most common), <b>chemical generators</b> (single-use, passenger drop-down masks), <b>liquid oxygen (LOX)</b> (less common, high-density storage)."}, {"heading": "Oxygen System Safety", "body": "High-pressure oxygen + any hydrocarbon (oil, grease) = explosion risk - use only oxygen-approved lubricants/cleaning agents. Servicing requires slow fill to avoid adiabatic heating. Leak checks use approved leak-detection compound (never soap that could contain oil)."}], "quiz": [{"q": "Cabin altitude refers to:", "choices": ["The aircraft's actual flight altitude", "The equivalent pressure altitude maintained inside the cabin", "Ground elevation at departure", "Cruise speed"], "answer": 1, "explain": "Pressurization keeps the cabin at a lower equivalent altitude (higher pressure) than the aircraft's actual flight altitude."}, {"q": "A pressure relief valve on a pressurized cabin protects against:", "choices": ["Underpressurization only", "Structural damage from overpressurization", "Engine overspeed", "Fuel contamination"], "answer": 1, "explain": "The relief valve vents excess pressure to prevent exceeding the structure's designed maximum pressure differential."}, {"q": "Which oxygen system is most common for gaseous supplemental oxygen?", "choices": ["Chemical generators only", "High-pressure gaseous cylinders", "LOX exclusively", "Compressed nitrogen"], "answer": 1, "explain": "High-pressure gaseous oxygen cylinders are the most widely used supplemental oxygen source in aviation."}, {"q": "Why must oxygen system components avoid contact with oil/grease?", "choices": ["It stains the fittings", "High-pressure oxygen with hydrocarbons creates an explosion hazard", "It reduces flow rate slightly", "No real hazard exists"], "answer": 1, "explain": "Oxygen combined with hydrocarbon contamination under pressure can ignite explosively - only oxygen-approved lubricants are permitted."}, {"q": "Slow-filling an oxygen system is important to avoid:", "choices": ["Wasting oxygen", "Adiabatic heating that could ignite contamination or damage components", "Overfilling the gauge", "Freezing the line"], "answer": 1, "explain": "Rapid compression during fast fills generates adiabatic heat, which combined with any contamination is a fire/explosion risk."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "turbine_fuel_ignition", "title": "Turbine Fuel & Ignition Systems", "track": "powerplant", "icon": "&#x1F525;", "sections": [{"heading": "Turbine Fuel Systems", "body": "Fuel flows from tanks through boost pumps, filters, and a <b>fuel control unit (FCU)</b> (hydromechanical or FADEC-electronic) that schedules fuel flow for the requested power setting, altitude, and temperature. <b>Fuel nozzles/atomizers</b> spray fuel into the combustor for efficient burning."}, {"heading": "FADEC", "body": "<b>Full Authority Digital Engine Control</b> computers manage fuel scheduling, limits (N1/N2/EGT), and protection automatically - reducing pilot workload and protecting the engine from exceedances. Dual-channel redundancy is standard; a channel fault typically reverts to the other channel."}, {"heading": "Igniters & Ignition Systems", "body": "Turbine engines use high-energy <b>igniter plugs</b> (not spark plugs like reciprocating engines) fired by an ignition exciter, typically only needed for starting and inclement-weather/continuous ignition - combustion is self-sustaining once established."}, {"heading": "Start Sequence & Faults", "body": "Normal start: starter motor spins N2, igniters fire, fuel introduced, light-off (EGT rise), N1/N2 accelerate to idle. <b>Hot start</b> = EGT exceeds limit. <b>Hung start</b> = light-off but stalls below idle. <b>No start</b> = no light-off (check fuel, ignition, starter air/electrical power)."}], "quiz": [{"q": "The fuel control unit's (FCU) main job is to:", "choices": ["Cool the fuel", "Schedule fuel flow for the requested power, altitude, and temperature", "Filter oil", "Control landing gear"], "answer": 1, "explain": "The FCU (hydromechanical or FADEC) meters fuel flow appropriately based on power lever position and ambient/engine conditions."}, {"q": "FADEC stands for:", "choices": ["Fixed Aircraft Data Engine Computer", "Full Authority Digital Engine Control", "Fuel Air Detection Engine Circuit", "Forward Auxiliary Drive Engine Cell"], "answer": 1, "explain": "Full Authority Digital Engine Control - a computer system managing fuel scheduling and engine limit protection."}, {"q": "Turbine engines use igniter plugs mainly during:", "choices": ["Continuous cruise operation", "Starting and adverse weather/continuous ignition conditions", "Shutdown only", "Taxi only"], "answer": 1, "explain": "Once combustion is established it's self-sustaining; igniters are primarily needed for start and icing/heavy precipitation conditions."}, {"q": "A 'hung start' is characterized by:", "choices": ["No light-off at all", "Light-off occurs but the engine stalls below idle RPM", "EGT exceeding limits", "Normal acceleration to idle"], "answer": 1, "explain": "A hung start lights off but fails to accelerate to idle - often due to insufficient starter assist or fuel scheduling issue."}, {"q": "A dual-channel FADEC fault in one channel typically results in:", "choices": ["Complete engine shutdown", "Automatic reversion to the other channel", "No effect on operation logged", "Immediate overspeed"], "answer": 1, "explain": "Redundant dual-channel FADEC design allows the healthy channel to take over if one channel faults, maintaining engine control."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "engine_instruments", "title": "Engine Instruments & Monitoring", "track": "powerplant", "icon": "&#x1F4CA;", "sections": [{"heading": "Reciprocating Engine Instruments", "body": "<b>Tachometer</b> (RPM), <b>Manifold pressure</b> (power setting on constant-speed-prop aircraft), <b>Oil pressure/temperature</b>, <b>Cylinder head temperature (CHT)</b>, <b>Fuel flow/pressure</b>, <b>EGT</b> for leaning. Each has a green (normal), yellow (caution), red (limit) arc/marking."}, {"heading": "Turbine Engine Instruments", "body": "<b>N1/N2 (or Ng/Np)</b> - fan/compressor and turbine spool speeds as % of max. <b>EGT/ITT</b> - exhaust/inlet turbine temperature, the key limiting parameter. <b>Torque</b> (turboprops) - actual power output indicator. <b>Fuel flow</b> for engine health/leaning trend monitoring."}, {"heading": "Engine Trend Monitoring", "body": "Recording EGT, oil temp/pressure, fuel flow, and vibration over time reveals gradual degradation (e.g., rising EGT margin loss signals compressor/turbine wear) before it becomes a failure - a maintenance best practice beyond simple pass/fail checks at each flight."}, {"heading": "Instrument Power & Failure Modes", "body": "Electronic engine instruments (EIS/glass displays) depend on sensors + processing; a failed sensor can show an erroneous reading rather than obviously failing - cross-check against other parameters. Mechanical gauges (direct-reading, e.g., some oil pressure gauges) are simpler but still need periodic calibration/leak checks."}], "quiz": [{"q": "On many constant-speed-prop reciprocating engines, power setting is primarily indicated by:", "choices": ["Tachometer alone", "Manifold pressure (with RPM held constant by the governor)", "Oil temperature", "Fuel flow only"], "answer": 1, "explain": "With a constant-speed prop holding RPM steady, manifold pressure becomes the primary power-setting indicator."}, {"q": "EGT/ITT is critical on turbine engines because it:", "choices": ["Indicates oil level", "Is the key limiting parameter protecting the hot section from damage", "Controls fuel color", "Measures airspeed"], "answer": 1, "explain": "Exceeding EGT/ITT limits accelerates hot-section wear/damage - it's the primary protective limit parameter on turbines."}, {"q": "Engine trend monitoring is valuable because it:", "choices": ["Replaces the need for inspections entirely", "Reveals gradual degradation before it becomes an in-flight failure", "Only matters for brand-new engines", "Has no maintenance value"], "answer": 1, "explain": "Tracking parameters like EGT margin over time can catch developing problems (e.g., compressor wear) long before a failure occurs."}, {"q": "A failed sensor on a glass engine display might:", "choices": ["Always show an obvious blank/error", "Show an erroneous but plausible-looking reading", "Shut down the engine automatically", "Have no possible failure mode"], "answer": 1, "explain": "Sensor failures can produce misleading in-range-looking readings - cross-checking against other engine parameters is a key habit."}, {"q": "Torque indication is most associated with which engine type?", "choices": ["Piston engines", "Turboprop engines", "Ramjets only", "Electric motors"], "answer": 1, "explain": "Turboprop engines commonly use a torque gauge as the primary power-output indicator, since propeller thrust relates directly to shaft torque."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "welding_fabrication", "title": "Welding & Metal Fabrication", "track": "general", "icon": "&#x1F527;", "sections": [{"heading": "Aircraft Welding Processes", "body": "<b>Oxy-fuel (gas) welding</b> - traditional for steel tube structures, gives a wide heat-affected zone. <b>TIG (GTAW)</b> - precise, clean welds, standard for aluminum and stainless/steel repairs on certified aircraft today; uses inert shielding gas (argon) to prevent oxidation."}, {"heading": "Welder & Weldment Approval", "body": "Aircraft welding on certificated aircraft structure generally requires an <b>FAA-approved welding process</b> and, for repairs, reference to approved data (AC 43.13-1B or the aircraft's SRM). Welder qualification/certification may be required by the operator/repair station even beyond A&P privileges for critical structure."}, {"heading": "Base Metals & Filler Selection", "body": "4130 chromoly steel tube structures use matching or compatible filler rod. Aluminum structures (less common to weld vs rivet) need alloy-matched filler and careful heat control to avoid warping thin sheet. Never weld high-strength heat-treated parts without engineering approval - welding heat can destroy the temper."}, {"heading": "Post-Weld Inspection & Treatment", "body": "Visual inspection for uniform bead, no undercut/porosity/cracks. Dye penetrant or X-ray for critical structural welds. <b>Stress relieving/normalizing</b> may be required after welding on hardened steel. Corrosion-proof (paint/primer) promptly after any weld repair on steel."}], "quiz": [{"q": "TIG welding is preferred over oxy-fuel for many modern aircraft repairs because it:", "choices": ["Is always cheaper", "Gives cleaner, more precise welds with inert-gas shielding", "Requires no skill", "Works only on aluminum"], "answer": 1, "explain": "TIG (GTAW) produces precise, clean welds using argon shielding gas, making it the standard for both steel and aluminum aircraft repairs today."}, {"q": "Structural aircraft welding repairs must be performed using:", "choices": ["Any convenient method", "An FAA-approved process referencing approved data (AC 43.13-1B/SRM)", "Only oxy-fuel welding", "Whatever the mechanic prefers"], "answer": 1, "explain": "Welding on certificated structure must follow FAA-approved processes and approved repair data - it's not left to personal preference."}, {"q": "Welding heat-treated high-strength steel parts without engineering approval risks:", "choices": ["No effect at all", "Destroying the part's temper/heat treatment and its strength", "Improving strength", "Only cosmetic discoloration"], "answer": 1, "explain": "Welding heat can undo heat-treatment (temper), significantly weakening a high-strength part unless properly re-treated per engineering data."}, {"q": "After welding on a hardened steel structural part, you may need to:", "choices": ["Do nothing further", "Perform stress relieving/normalizing per approved data", "Paint immediately with no other treatment", "Sand only"], "answer": 1, "explain": "Stress relieving or normalizing restores appropriate material properties after the heat and stress of welding on hardened steel."}, {"q": "Post-weld inspection of a critical structural weld often includes:", "choices": ["Visual only, never anything else", "Dye penetrant or X-ray (radiographic) inspection", "Weighing the part", "Nothing - welds are self-verifying"], "answer": 1, "explain": "Critical welds are commonly inspected with dye penetrant or radiography to detect cracks, porosity, or incomplete fusion not visible to the eye."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "precision_tools", "title": "Precision Measurement & Shop Tools", "track": "general", "icon": "&#x1F4CF;", "sections": [{"heading": "Measuring Tools", "body": "<b>Steel rule</b> for rough measurements; <b>calipers</b> (vernier, dial, digital) for +/-0.001 in; <b>micrometers</b> for precise outside/inside/depth readings; <b>dial indicators</b> for runout, deflection, and alignment checks; <b>feeler gauges</b> for small, exact gaps (e.g., valve clearance, control surface rigging)."}, {"heading": "Reading a Micrometer", "body": "A standard 0-1 in micrometer: each full turn of the thimble = 0.025 in (25 thousandths). The sleeve shows 0.025 in graduations; the thimble shows 0.001 in graduations. Add sleeve reading + thimble reading for total. Digital micrometers eliminate the mental math but still require zero-checks before use."}, {"heading": "Torque Wrenches", "body": "Three common types: <b>beam</b> (simple, no calibration drift), <b>click-type</b> (must be reset to lowest setting after use to preserve calibration), and <b>digital</b> (direct readout, some log data). All torque wrenches require periodic calibration per manufacturer/shop schedule - an out-of-cal wrench can under- or over-torque fasteners, risking loosening or thread damage."}, {"heading": "Calibration & Tool Control", "body": "Precision tools carry calibration due dates/stickers; using an expired tool is a quality escape. <b>Tool control programs</b> (shadow boards, sign-out logs, FOD accountability) ensure every tool is accounted for before closing up an aircraft - a missing tool in a control surface or engine bay is a safety-of-flight issue."}], "quiz": [{"q": "One full turn of a standard 0-1 in micrometer thimble equals how much?", "choices": ["0.001 in", "0.010 in", "0.025 in", "0.100 in"], "answer": 2, "explain": "One full thimble revolution on a standard mic = 0.025 in (25 thousandths)."}, {"q": "Why must a click-type torque wrench be reset to its lowest setting after use?", "choices": ["To save battery", "To preserve internal spring calibration", "It is required by TSA", "It prevents rust"], "answer": 1, "explain": "Leaving a click-type wrench set at a high torque keeps the internal spring compressed, causing calibration drift over time."}, {"q": "What tool is best for checking valve clearance?", "choices": ["Dial indicator", "Feeler gauge", "Vernier caliper", "Steel rule"], "answer": 1, "explain": "Feeler gauges are thin, precisely-sized blades used to check small, exact gaps like valve clearance."}, {"q": "What is the purpose of a shadow board in tool control?", "choices": ["Decoration", "Instantly show a missing tool by its empty outline", "Store spare parts", "Track employee hours"], "answer": 1, "explain": "A shadow board outlines each tool's shape so a missing tool is immediately obvious at a glance."}, {"q": "Using a torque wrench past its calibration due date is best described as:", "choices": ["Acceptable if it 'feels right'", "A quality/safety escape - do not use", "Required for old aircraft", "Only a problem on turbine engines"], "answer": 1, "explain": "An out-of-calibration torque wrench may not deliver accurate values, risking improperly torqued fasteners."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "flight_controls_rigging", "title": "Flight Controls & Rigging", "track": "airframe", "icon": "&#x1F6E9;", "sections": [{"heading": "Primary & Secondary Controls", "body": "<b>Primary</b>: ailerons (roll), elevator (pitch), rudder (yaw). <b>Secondary</b>: flaps, slats, spoilers, trim tabs, and speedbrakes. Control surfaces are moved by cables, pushrods, torque tubes, or fly-by-wire actuators, depending on aircraft design."}, {"heading": "Cable Rigging Basics", "body": "Cable systems use turnbuckles for tensioning; correct <b>cable tension</b> (checked with a tensiometer, corrected for ambient temperature) is critical - too loose causes slack/lag, too tight causes excess friction and wear. Cables route through fairleads and pulleys; inspect for fraying, corrosion, and proper pulley alignment."}, {"heading": "Rigging Checks", "body": "Rigging verifies control surfaces travel the correct degrees of deflection in each direction and that controls are <b>neutral</b> when the cockpit control is centered. Travel is checked with a protractor/inclinometer against the AMM/SRM-specified range. Symmetry between left/right control surfaces (e.g., ailerons) is essential for balanced flight."}, {"heading": "Autopilot & Trim Interface", "body": "Many aircraft route autopilot servo inputs and electric trim through the same cable/pushrod runs as manual controls, using clutches or slip mechanisms so the pilot can always override. Always verify freedom of movement (no binding) through full range after any rigging work, and complete a control-check/duplicate-inspection per maintenance program requirements."}], "quiz": [{"q": "Which of these is a PRIMARY flight control?", "choices": ["Flap", "Elevator", "Spoiler", "Trim tab"], "answer": 1, "explain": "Elevator (pitch), ailerons (roll), and rudder (yaw) are the three primary flight controls."}, {"q": "What tool checks cable tension?", "choices": ["Feeler gauge", "Tensiometer", "Dial indicator", "Micrometer"], "answer": 1, "explain": "A tensiometer measures cable tension, which must be corrected for ambient temperature per the applicable chart."}, {"q": "What does a rigging check verify besides correct travel range?", "choices": ["Paint color", "Engine RPM", "Neutral position when cockpit control is centered", "Fuel quantity"], "answer": 2, "explain": "Rigging verifies both correct deflection range AND that surfaces sit neutral when the cockpit control is centered."}, {"q": "Why do autopilot servos often use a clutch/slip mechanism in the control run?", "choices": ["To save weight", "So the pilot can always physically override the autopilot", "To reduce cost", "To increase speed"], "answer": 1, "explain": "Slip clutches let the autopilot drive the controls while still allowing the pilot to overpower it if needed."}, {"q": "What must be checked after rigging work before returning the aircraft to service?", "choices": ["Only that the surface moves at all", "Full range of motion with no binding, plus required duplicate inspection", "Cockpit lighting", "Fuel color"], "answer": 1, "explain": "Freedom of movement through the full range and a duplicate/control-check inspection are required after rigging work."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "fire_protection", "title": "Fire & Overheat Detection Systems", "track": "airframe", "icon": "&#x1F525;", "sections": [{"heading": "Fire Detection Methods", "body": "<b>Thermocouple/thermoswitch</b> systems detect a rate of temperature rise or a fixed threshold; <b>continuous-loop (Kidde/Fenwal-style)</b> sensors detect overheat/fire along their entire length and can pinpoint zones; <b>smoke detectors</b> (photoelectric) protect cargo/lavatory areas; <b>optical (flame) detectors</b> sense UV/IR radiation from flame."}, {"heading": "Extinguishing Systems", "body": "Engine/APU fire bottles typically use <b>Halon 1301</b> or newer clean agents, discharged into the nacelle/APU compartment on crew command, sometimes with a backup second-shot bottle. Portable cabin extinguishers use Halon, water, or dry chemical depending on the fire class (A/B/C/electrical)."}, {"heading": "Overheat vs. Fire Warning", "body": "Overheat warnings alert to abnormally high temps before flame is confirmed, while fire warnings indicate an actual detected flame condition - crew procedures and required actions differ (e.g., overheat may allow continued monitoring; a fire warning triggers immediate engine/APU securing and bottle discharge). System test switches allow ground/preflight functional checks."}, {"heading": "Maintenance & Inspection", "body": "Continuous-loop sensing elements are inspected for chafing, kinks, and secure clamping (they must not touch structure directly, which can cause false readings). Fire bottle pressure/weight is checked against placarded limits; squibs (discharge cartridges) have service-life limits and must be replaced on schedule regardless of use."}], "quiz": [{"q": "What advantage does a continuous-loop fire detector have?", "choices": ["It never needs testing", "It only works in cold weather", "It can detect and often pinpoint a fire/overheat anywhere along its length", "It replaces all extinguishers"], "answer": 2, "explain": "Continuous-loop systems sense along their entire length, helping pinpoint the affected zone."}, {"q": "What extinguishing agent has traditionally been used in engine fire bottles?", "choices": ["Water", "Halon 1301 or clean agent equivalent", "Sand", "CO2 only"], "answer": 1, "explain": "Halon 1301 (or approved clean-agent replacements) is the traditional engine/APU fire bottle agent."}, {"q": "How does an overheat warning differ from a fire warning?", "choices": ["They are identical", "Overheat indicates high temp without confirmed flame; fire indicates a detected flame condition", "Overheat is only for engines", "Fire warnings are always false alarms"], "answer": 1, "explain": "Overheat = abnormal temperature rise; fire = an actual detected flame/fire condition, requiring different crew actions."}, {"q": "Why must continuous-loop sensing elements avoid touching aircraft structure?", "choices": ["Aesthetics", "It can cause false or nuisance warnings due to chafing/short paths", "It voids the warranty", "It reduces weight"], "answer": 1, "explain": "Chafing or contact with structure can create electrical/thermal paths that trigger false detections."}, {"q": "What is true about fire bottle discharge squibs (cartridges)?", "choices": ["They never need replacement", "They have service-life limits and must be replaced on schedule regardless of use", "They are reusable indefinitely", "They are only found on turboprops"], "answer": 1, "explain": "Squibs have a shelf/service life and must be replaced on schedule even if never fired."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "prop_governing", "title": "Propeller Governing & Constant-Speed Systems", "track": "powerplant", "icon": "&#x1F300;", "sections": [{"heading": "Fixed-Pitch vs. Constant-Speed", "body": "A <b>fixed-pitch</b> propeller has one efficient blade angle for a given condition (climb or cruise, not both). A <b>constant-speed</b> propeller uses a governor to vary blade angle automatically, holding a selected RPM across a range of power/airspeed conditions for near-optimal efficiency throughout the flight envelope."}, {"heading": "Governor Operation", "body": "The governor uses engine-driven flyweights and a pilot valve to direct oil pressure to/from the propeller hub piston. Underspeed causes the governor to decrease pitch (increase RPM tendency); overspeed causes it to increase pitch (decrease RPM tendency) - a classic feedback control loop maintaining the selected RPM."}, {"heading": "Feathering & Reversing", "body": "<b>Feathering</b> rotates the blades to a near-edge-on angle to minimize drag after an engine failure (common on multi-engine aircraft and turboprops). <b>Reverse pitch</b> rotates blades to a negative angle to produce reverse thrust for braking on landing rollout - common on turboprop transports."}, {"heading": "Overspeed & Malfunctions", "body": "A propeller <b>overspeed</b> (governor failure, linkage failure) can cause excessive RPM, structural risk, and loss of control authority; many systems have a separate overspeed governor/limiter as backup. Symptoms of governor malfunction include RPM surging, failure to respond to power lever changes, or inability to feather."}], "quiz": [{"q": "What is the main advantage of a constant-speed propeller over fixed-pitch?", "choices": ["Lower cost", "Lighter weight", "Near-optimal efficiency across a range of conditions via automatic blade angle change", "No maintenance required"], "answer": 2, "explain": "A governor automatically adjusts blade angle to hold RPM, keeping efficiency high across varying power/airspeed."}, {"q": "In a governor, what happens when the engine tends toward overspeed?", "choices": ["Governor decreases blade angle", "Governor increases blade angle to absorb more load and slow RPM", "Governor shuts off oil pressure permanently", "Nothing happens"], "answer": 1, "explain": "On overspeed tendency, the governor increases pitch (blade angle), increasing load and pulling RPM back down."}, {"q": "What is the purpose of feathering a propeller?", "choices": ["Increase thrust", "Minimize drag after an engine failure", "Increase RPM", "Improve fuel color"], "answer": 1, "explain": "Feathering turns blades nearly edge-on to the airflow, minimizing drag from a stopped/failed engine."}, {"q": "What is reverse pitch used for?", "choices": ["Climb performance", "Producing reverse thrust for braking on landing rollout", "Cruise efficiency", "Engine starting"], "answer": 1, "explain": "Reverse pitch rotates blades to a negative angle, producing reverse thrust to help slow the aircraft on rollout."}, {"q": "What backup system helps protect against a propeller overspeed?", "choices": ["A second, separate overspeed governor/limiter", "The fuel gauge", "The landing gear", "The pitot heat system"], "answer": 0, "explain": "Many constant-speed prop systems include a backup overspeed governor/limiter independent of the primary governor."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "apu_testcell", "title": "APU Systems & Engine Test Procedures", "track": "powerplant", "icon": "&#x2699;", "sections": [{"heading": "APU Purpose & Operation", "body": "The <b>Auxiliary Power Unit</b> is a small turbine engine (usually tail-mounted) providing electrical power, bleed air (for pneumatics/air conditioning/engine starting), and sometimes hydraulic power on the ground and, on some aircraft, in flight as backup. APUs have their own fire detection/extinguishing, fuel supply, and starting system (often electric)."}, {"heading": "APU Limitations & Monitoring", "body": "APU operation is limited by altitude (many cannot be started or run above a certain altitude), EGT limits, and duty cycle. Cockpit/APU control panel monitors RPM, EGT, and fault codes; an APU fire or overtemp triggers automatic securing of the unit and bottle discharge on many installations."}, {"heading": "Engine Ground Runs", "body": "Post-maintenance <b>engine ground runs</b> verify proper operation before flight release: idle stability, acceleration/deceleration response, instrument readings (oil pressure/temp, EGT, fuel flow, vibration) against limits, and leak checks. Runs are performed per the AMM procedure, often requiring a qualified run-up certified technician and specific chock/tie-down/FOD-area precautions."}, {"heading": "Test Cell / Trim Runs", "body": "Overhauled engines may be run in a <b>test cell</b> (a controlled facility with calibrated instrumentation) to verify performance against factory specifications before installation. <b>Trim runs</b> on-aircraft after certain maintenance adjust fuel control/FADEC parameters and confirm the engine meets thrust/EGT margins for the installed condition."}], "quiz": [{"q": "What does an APU primarily provide?", "choices": ["Extra passenger seating", "Electrical power and bleed air (and sometimes hydraulics) on the ground/in flight", "Extra fuel storage", "Weather radar"], "answer": 1, "explain": "APUs typically supply electrical power, bleed air, and sometimes hydraulic power independent of the main engines."}, {"q": "Why are APUs often limited to operating below a certain altitude?", "choices": ["Noise regulations only", "Performance/certification limitations at altitude", "Weight restrictions", "Fuel color changes"], "answer": 1, "explain": "APUs have altitude limitations for starting and continuous operation based on their design and certification."}, {"q": "What is verified during a post-maintenance engine ground run?", "choices": ["Only that it starts", "Idle stability, acceleration response, and instrument readings against limits, plus leak checks", "Passenger comfort", "Radio frequencies"], "answer": 1, "explain": "Ground runs confirm proper operation across multiple parameters and check for leaks before flight release."}, {"q": "What is a test cell used for?", "choices": ["Testing passenger seats", "Running an overhauled engine in a controlled facility to verify performance against factory specs", "Storing tools", "Charging batteries"], "answer": 1, "explain": "A test cell provides calibrated instrumentation to verify an overhauled engine meets factory performance specs."}, {"q": "What does a 'trim run' after certain on-aircraft maintenance typically adjust?", "choices": ["Cabin lighting", "Fuel control/FADEC parameters to confirm thrust/EGT margins", "Seat positions", "Landing gear rigging"], "answer": 1, "explain": "Trim runs fine-tune fuel control or FADEC parameters and confirm the engine meets performance margins as installed."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "nde_inspection", "title": "Nondestructive Inspection (NDI/NDT)", "track": "airframe", "icon": "&#x1F50E;", "sections": [{"heading": "Visual & Dye Penetrant", "body": "<b>Visual inspection</b> (aided by mirrors, borescopes, magnification) is the most common NDI method. <b>Dye penetrant</b> inspection reveals surface-breaking cracks: penetrant is applied, excess removed, then a developer draws penetrant back out of any crack, showing a visible indication - effective on non-porous materials like aluminum and steel."}, {"heading": "Magnetic Particle Inspection", "body": "Used on ferromagnetic materials only (steel, some alloys). The part is magnetized, then iron particles are applied; particles cluster at flux leakage points caused by surface or near-surface cracks, revealing the defect. Cannot be used on aluminum, titanium, or other non-magnetic materials."}, {"heading": "Eddy Current & Ultrasonic", "body": "<b>Eddy current</b> inspection induces electrical currents in conductive material via a probe coil; cracks and corrosion disrupt the current, changing the probe's signal - good for surface/near-surface flaws, especially around fastener holes. <b>Ultrasonic</b> inspection sends high-frequency sound waves through material; reflections from internal flaws or the back wall reveal thickness loss, delaminations, or subsurface defects."}, {"heading": "Radiographic (X-ray) Inspection", "body": "X-ray/radiographic inspection passes radiation through a part onto film or a digital detector, revealing internal defects, corrosion, or foreign objects by density differences. Requires strict radiation safety controls and is often used for spot welds, composite structures, and complex castings/forgings."}], "quiz": [{"q": "Dye penetrant inspection is effective for detecting:", "choices": ["Internal voids deep in a part", "Surface-breaking cracks on non-porous materials", "Magnetic field strength", "Fuel contamination"], "answer": 1, "explain": "Dye penetrant reveals cracks that break the surface of a non-porous material by capillary action drawing dye back out."}, {"q": "Magnetic particle inspection can only be used on:", "choices": ["Any material", "Ferromagnetic materials like steel", "Composites only", "Plastics"], "answer": 1, "explain": "Magnetic particle inspection relies on magnetizing the part, so it only works on ferromagnetic materials."}, {"q": "Eddy current inspection is especially useful around:", "choices": ["Fastener holes for surface/near-surface flaws", "Fuel tank interiors only", "Tire pressure checks", "Cabin pressurization seals"], "answer": 0, "explain": "Eddy current probes are commonly used to detect cracks around fastener holes and other surface/near-surface flaws."}, {"q": "Ultrasonic inspection detects flaws by:", "choices": ["Measuring color change", "Analyzing reflections of high-frequency sound waves", "Applying magnetic particles", "Using dye penetrant"], "answer": 1, "explain": "Ultrasonic inspection sends sound waves into the material and interprets reflections to find internal or subsurface flaws."}, {"q": "Radiographic (X-ray) inspection is often chosen for:", "choices": ["Simple visual checks", "Complex castings, spot welds, or composite structures where internal defects must be seen", "Measuring cable tension", "Checking oil pressure"], "answer": 1, "explain": "X-ray inspection reveals internal defects via density differences and is common for castings, welds, and composites."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "recip_overhaul", "title": "Reciprocating Engine Overhaul Practices", "track": "powerplant", "icon": "&#x1F527;", "sections": [{"heading": "Overhaul Triggers", "body": "Reciprocating engines are typically overhauled at a manufacturer-recommended <b>TBO (Time Between Overhaul)</b> in hours, or sooner if a qualifying event occurs (sudden stoppage, over-temperature, metal in oil, prop strike). TBO is a recommendation for most operators (not mandatory under Part 91) but often mandatory under Part 135/121 operations or per an approved maintenance program."}, {"heading": "Teardown & Inspection", "body": "Overhaul disassembles the engine completely; parts are cleaned, then inspected using NDI methods (magnetic particle for steel parts, dye penetrant for aluminum) against manufacturer service limits. Parts exceeding wear limits are replaced; crankshafts and camshafts are commonly magnetic-particle inspected for cracks."}, {"heading": "Reassembly & Break-In", "body": "Reassembly follows the overhaul manual's torque values and sequences exactly. New rings and reconditioned/new cylinders often require a specific <b>break-in procedure</b> (mineral oil, higher power settings initially) to properly seat rings against cylinder walls - improper break-in can cause glazed cylinders and excess oil consumption for the engine's life."}, {"heading": "Run-In & Documentation", "body": "After reassembly, the engine undergoes a run-in on a test stand or aircraft per the manual, checking oil pressure/temperature, compression, magneto timing, and for leaks. Overhaul generates extensive documentation: yellow tags on parts, logbook entries, and (for a certified/documented overhaul) an FAA Form 8130-3 or equivalent."}], "quiz": [{"q": "What does TBO stand for?", "choices": ["Total Bearing Output", "Time Between Overhaul", "Torque Balance Operation", "Turbine Bypass Order"], "answer": 1, "explain": "TBO (Time Between Overhaul) is the manufacturer-recommended operating time before overhaul."}, {"q": "Under Part 91 operations, TBO is generally treated as:", "choices": ["Mandatory in all cases", "A recommendation, not mandatory (unless required by an approved program)", "Illegal to exceed", "Only applicable to turbine engines"], "answer": 1, "explain": "For most Part 91 operators, TBO is a manufacturer recommendation rather than a hard regulatory limit."}, {"q": "Which event would typically require an overhaul sooner than scheduled TBO?", "choices": ["Routine oil change", "Sudden stoppage or prop strike", "Normal landing", "Scheduled inspection"], "answer": 1, "explain": "Sudden stoppage, prop strikes, over-temp events, or metal in the oil are qualifying events that can force an early overhaul."}, {"q": "Why is a specific break-in procedure needed for new rings/cylinders?", "choices": ["It is optional and rarely followed", "To properly seat the rings against cylinder walls, preventing glazing and excess oil consumption", "To test the paint finish", "To calibrate the propeller"], "answer": 1, "explain": "Proper break-in seats new rings correctly; skipping it can cause glazed cylinder walls and lifelong excess oil consumption."}, {"q": "What is checked during the post-overhaul run-in?", "choices": ["Only visual paint quality", "Oil pressure/temperature, compression, magneto timing, and leaks", "Cabin pressurization", "Passenger seat belts"], "answer": 1, "explain": "The run-in verifies multiple operating parameters and checks for leaks before the engine is returned to service."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "turbine_overhaul", "title": "Turbine Engine Overhaul & Module Repair", "track": "powerplant", "icon": "&#x1F6E9;", "sections": [{"heading": "Modular Construction", "body": "Modern turbine engines are built in <b>modules</b> (e.g., fan, compressor, combustor, turbine sections) that can be removed and replaced independently. This modular approach allows a single failed module to be repaired or replaced without a full engine teardown, reducing cost and turnaround time."}, {"heading": "On-Condition & Life-Limited Parts", "body": "Turbine engines are largely maintained <b>on-condition</b> (via borescope inspection, oil analysis, trend monitoring) rather than a fixed overhaul interval, but certain <b>life-limited parts</b> (LLPs) - typically rotating parts like disks and shafts - have hard cyclic or hourly limits regardless of condition, driven by fatigue life analysis."}, {"heading": "Borescope Inspection", "body": "A <b>borescope</b> is inserted through access ports to visually inspect internal turbine/compressor blades, combustor liners, and other hot-section components without disassembly. Findings (cracks, erosion, foreign object damage, coating loss) are compared against manufacturer serviceable limits to decide on continued operation, repair, or module removal."}, {"heading": "Hot Section & Repair Considerations", "body": "The <b>hot section</b> (combustor, turbine) experiences the most severe thermal stress and typically drives overhaul/inspection intervals. Repairs may include blade weld/braze repair, recoating (thermal barrier coatings), and balance checks after any rotor work - imbalance in a high-speed turbine rotor can cause severe vibration and premature bearing wear."}], "quiz": [{"q": "What is the main advantage of modular turbine engine construction?", "choices": ["Lower initial purchase cost only", "A failed module can be repaired/replaced without a full engine teardown", "It eliminates the need for inspections", "It only applies to piston engines"], "answer": 1, "explain": "Modular construction lets technicians address a specific section without disassembling the entire engine."}, {"q": "What best describes 'on-condition' maintenance for turbine engines?", "choices": ["Replacing parts at a fixed hourly interval regardless of condition", "Maintaining based on inspection findings and trend monitoring rather than a fixed overhaul interval", "Never inspecting the engine", "Only applicable to piston engines"], "answer": 1, "explain": "On-condition maintenance relies on borescope inspection, oil analysis, and trend monitoring rather than a hard TBO."}, {"q": "Life-limited parts (LLPs) are typically:", "choices": ["Any part on the engine", "Rotating parts like disks/shafts with hard cyclic or hourly limits based on fatigue analysis", "Only external cowling parts", "Never replaced"], "answer": 1, "explain": "LLPs are usually rotating components with strict cyclic/hourly limits driven by fatigue life analysis, regardless of condition."}, {"q": "What is a borescope used for?", "choices": ["Measuring fuel flow", "Visually inspecting internal engine components through access ports without disassembly", "Balancing propellers", "Testing electrical continuity"], "answer": 1, "explain": "A borescope allows internal visual inspection of blades, liners, and hot-section parts without opening up the engine."}, {"q": "Why is a balance check important after rotor blade repair work?", "choices": ["It is not important", "Imbalance in a high-speed rotor can cause severe vibration and premature bearing wear", "It only affects paint appearance", "It only matters for piston engines"], "answer": 1, "explain": "Even small imbalance in a high-speed turbine rotor can cause vibration and accelerate bearing wear/failure."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "corrosion_control", "title": "Corrosion Identification & Control", "track": "general", "icon": "&#x1F6E1;", "sections": [{"heading": "Types of Corrosion", "body": "<b>Uniform surface corrosion</b> etches evenly across a surface; <b>pitting corrosion</b> creates small localized pits, often under coatings; <b>galvanic corrosion</b> occurs when two dissimilar metals contact in the presence of an electrolyte (e.g., moisture); <b>intergranular corrosion</b> attacks grain boundaries inside the metal, often invisible from the surface until advanced."}, {"heading": "Causes & Contributing Factors", "body": "Moisture, salt air, battery acid spills, and trapped dirt/debris all accelerate corrosion. Poor drainage, damaged paint/primer, and dissimilar-metal fastener combinations (without proper isolation) create ideal conditions. Aircraft operated near coastal or industrial areas face elevated corrosion risk and often need more frequent inspection."}, {"heading": "Detection & Treatment", "body": "Corrosion is found via visual inspection (sometimes with magnification), and confirmed/assessed via NDI methods for hidden or advanced cases. Treatment involves mechanical removal (sanding/blasting) down to sound metal, chemical conversion coating, and reapplication of primer/paint - the specific process and allowable removal limits are per the structural repair manual (SRM)."}, {"heading": "Prevention", "body": "Preventive measures include regular washing (especially after coastal/salt exposure), maintaining paint/primer integrity, using corrosion-inhibiting compounds (CIC) in fay surfaces and unpressurized bays, and ensuring drain holes remain clear. Dissimilar metals are isolated with sealant, primer, or non-conductive barriers to prevent galvanic action."}], "quiz": [{"q": "What is galvanic corrosion caused by?", "choices": ["UV light exposure", "Two dissimilar metals in contact with an electrolyte", "Extreme cold", "Excess lubrication"], "answer": 1, "explain": "Galvanic corrosion results from contact between dissimilar metals in the presence of an electrolyte like moisture."}, {"q": "Which corrosion type attacks grain boundaries and can be invisible from the surface?", "choices": ["Uniform surface corrosion", "Pitting corrosion", "Intergranular corrosion", "Filiform corrosion"], "answer": 2, "explain": "Intergranular corrosion progresses along internal grain boundaries and may not be visible until advanced."}, {"q": "What document specifies allowable corrosion removal limits?", "choices": ["The pilot's operating handbook", "The structural repair manual (SRM)", "The weight and balance report", "The MEL"], "answer": 1, "explain": "The SRM defines approved corrosion removal procedures and allowable material loss limits."}, {"q": "How are dissimilar metals typically isolated to prevent galvanic corrosion?", "choices": ["They are never joined", "Sealant, primer, or non-conductive barriers between them", "Painting only the exterior", "Using thicker fasteners"], "answer": 1, "explain": "Isolating dissimilar metals with sealant, primer, or barriers prevents the electrolytic path needed for galvanic corrosion."}, {"q": "Why do coastal-based aircraft often need more frequent corrosion inspection?", "choices": ["They fly higher", "Salt air significantly accelerates corrosion", "They are heavier", "They use different fuel"], "answer": 1, "explain": "Salt-laden coastal air is a major corrosion accelerant, warranting more frequent inspection in those environments."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "hydraulic_systems", "title": "Hydraulic Power Systems", "track": "airframe", "icon": "&#x1F4A7;", "sections": [{"heading": "Basic Hydraulic Principles", "body": "Hydraulic systems use <b>Pascal's Law</b> (pressure applied to a confined fluid transmits equally in all directions) to multiply force through pistons of different areas. Components include a reservoir, pump(s) (engine-driven, electric, or manual), pressure regulator/relief valve, actuators, and selector/control valves."}, {"heading": "System Components", "body": "An <b>accumulator</b> stores pressurized fluid (using a gas-charged piston or bladder) to dampen pressure spikes and provide backup pressure. <b>Filters</b> remove contamination that can damage seals and valves. <b>Check valves</b> allow flow in one direction only; <b>relief valves</b> protect against overpressure."}, {"heading": "Open vs. Closed Center Systems", "body": "In an <b>open-center</b> system, fluid circulates continuously through the system at low pressure when no actuator is being commanded. In a <b>closed-center</b> system, the pump maintains a static pressure with valves closed until an actuator is commanded, then flow is directed on demand - closed-center systems are common on larger transport aircraft with multiple simultaneous users."}, {"heading": "Maintenance & Troubleshooting", "body": "Common issues include internal/external leaks, contaminated fluid, air in the system (causing sponginess/erratic operation), and worn seals. Hydraulic fluid type (e.g., MIL-H-5606 mineral-based vs. Skydrol phosphate-ester) must never be mixed - incompatible fluids can destroy seals. Fluid level, cleanliness, and system pressure are checked per the AMM."}], "quiz": [{"q": "What principle allows hydraulic systems to multiply force?", "choices": ["Bernoulli's principle", "Pascal's Law", "Newton's third law", "Boyle's Law"], "answer": 1, "explain": "Pascal's Law states that pressure applied to a confined fluid is transmitted equally, allowing force multiplication through different piston areas."}, {"q": "What is the purpose of a hydraulic accumulator?", "choices": ["To filter fluid", "To store pressurized fluid, dampening spikes and providing backup pressure", "To cool the fluid", "To measure flow rate"], "answer": 1, "explain": "An accumulator stores pressurized fluid via a gas-charged piston/bladder for shock dampening and backup pressure."}, {"q": "In a closed-center hydraulic system, what happens when no actuator is commanded?", "choices": ["Fluid circulates continuously at low pressure", "The pump maintains static pressure with valves closed until needed", "The pump shuts off completely", "Fluid drains to the reservoir"], "answer": 1, "explain": "Closed-center systems hold static pressure with valves closed, directing flow on demand when an actuator is commanded."}, {"q": "Why must hydraulic fluid types never be mixed?", "choices": ["It changes the fluid color", "Incompatible fluids (e.g., mineral-based vs. phosphate-ester) can destroy seals", "It has no real effect", "It only affects fluid cost"], "answer": 1, "explain": "Mixing incompatible hydraulic fluid types can cause seal swelling/deterioration and system failure."}, {"q": "What symptom often indicates air trapped in a hydraulic system?", "choices": ["Perfectly smooth operation", "Sponginess or erratic actuator operation", "Increased fluid temperature only", "Louder pump noise only"], "answer": 1, "explain": "Air in hydraulic fluid compresses, causing spongy or erratic actuator response instead of firm, consistent movement."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "landing_gear_systems", "title": "Landing Gear Systems", "track": "airframe", "icon": "&#x1F6EC;", "sections": [{"heading": "Gear Configurations", "body": "<b>Tricycle</b> gear (nose + two main) is most common on modern aircraft, offering good ground handling and visibility. <b>Tailwheel (conventional)</b> gear places two main wheels forward of the CG and a small tailwheel aft - more prone to ground-looping but preferred for rough-field operation on some aircraft."}, {"heading": "Retraction Systems", "body": "Retractable gear uses hydraulic, electric, or pneumatic actuators to raise/lower gear, with mechanical uplocks/downlocks to secure position. Emergency extension systems (free-fall, backup hydraulic, or manual crank) allow gear extension if the primary system fails. Position indicators (lights, mechanical pins) confirm gear is safely down and locked before landing."}, {"heading": "Shock Struts (Oleo)", "body": "Most gear uses an <b>oleo-pneumatic strut</b> combining compressed air/nitrogen (springing action) with hydraulic fluid (damping) to absorb landing and taxi shock loads. Proper strut extension (checked against a chart, often via visible exposed chrome/piston length) indicates correct servicing - under- or over-serviced struts affect ground handling and shock absorption."}, {"heading": "Brakes & Tires", "body": "Most aircraft use <b>disc brakes</b> (single or multiple-disc) actuated hydraulically; some large aircraft have <b>anti-skid</b> systems that modulate brake pressure to prevent tire skidding, maximizing braking efficiency. Tire condition (tread wear, cuts, proper inflation) is critical - underinflated tires overheat and can fail; correct inflation is checked cold per the tire chart."}], "quiz": [{"q": "What is the main advantage of tricycle gear over tailwheel gear?", "choices": ["Lighter weight always", "Better ground handling and visibility", "Requires no brakes", "Works only on grass runways"], "answer": 1, "explain": "Tricycle gear generally offers better ground handling, visibility, and stability compared to tailwheel configurations."}, {"q": "What does an oleo-pneumatic strut combine?", "choices": ["Two different metals", "Compressed air/nitrogen with hydraulic fluid for shock absorption and damping", "Electric motors and gears", "Two separate tires"], "answer": 1, "explain": "Oleo struts use compressed gas for springing action and hydraulic fluid for damping to absorb shock loads."}, {"q": "What allows gear extension if the primary retraction system fails?", "choices": ["Nothing - gear stays retracted", "Emergency extension system (free-fall, backup hydraulic, or manual crank)", "The autopilot", "Speed brakes"], "answer": 1, "explain": "Emergency extension systems provide a backup means to get the gear down if the primary system malfunctions."}, {"q": "What is the purpose of an anti-skid system?", "choices": ["Increase tire wear", "Modulate brake pressure to prevent tire skidding and maximize braking efficiency", "Increase touchdown speed", "Reduce fuel consumption"], "answer": 1, "explain": "Anti-skid systems prevent wheel lockup/skidding by modulating brake pressure, improving stopping performance."}, {"q": "Why is it important to check tire inflation when cold?", "choices": ["Cold tires are always overinflated", "Tire pressure rises with heat/use, so cold-check gives the true baseline reading", "It doesn't matter when checked", "Warm tires read lower than actual"], "answer": 1, "explain": "Tire pressure increases with heat, so checking cold ensures an accurate baseline reading against the tire chart."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "turbine_theory", "title": "Gas Turbine Theory & Types", "track": "powerplant", "icon": "&#x1F32A;", "sections": [{"heading": "Brayton Cycle Basics", "body": "Gas turbines operate on the <b>Brayton cycle</b>: air is compressed, fuel is added and burned at roughly constant pressure, and the resulting hot expanding gas drives a turbine and/or produces thrust. This is continuous combustion (unlike a reciprocating engine's intermittent combustion), giving turbines smoother operation and higher power-to-weight ratios."}, {"heading": "Engine Types", "body": "<b>Turbojet</b>: all thrust from exhaust gas velocity. <b>Turbofan</b>: a large fan (bypassing much of the airflow around the core) provides most thrust with better fuel efficiency at subsonic speeds - the dominant type on modern airliners. <b>Turboprop</b>: a turbine drives a propeller through a reduction gearbox. <b>Turboshaft</b>: turbine power drives a shaft (helicopters, APUs, industrial use) rather than propulsive thrust directly."}, {"heading": "Compressor Types", "body": "<b>Centrifugal</b> compressors use an impeller to accelerate air outward, good for smaller/simpler engines with fewer stages needed. <b>Axial</b> compressors use a series of rotating (rotor) and stationary (stator) blade rows to progressively compress air along the engine's axis - most efficient for large, high-thrust engines and dominant in modern turbofans."}, {"heading": "Bypass Ratio & Efficiency", "body": "<b>Bypass ratio</b> compares the mass of air bypassing the core (through the fan) to the mass going through the core. High-bypass turbofans (common on airliners) prioritize fuel efficiency at high subsonic speed; low-bypass turbofans (military fighters) prioritize higher speed/thrust density at some efficiency cost."}], "quiz": [{"q": "What thermodynamic cycle do gas turbines operate on?", "choices": ["Otto cycle", "Brayton cycle", "Diesel cycle", "Rankine cycle"], "answer": 1, "explain": "Gas turbines use the Brayton cycle: continuous compression, combustion, and expansion."}, {"q": "Which engine type provides most of its thrust via a large bypass fan?", "choices": ["Turbojet", "Turbofan", "Turboshaft", "Ramjet"], "answer": 1, "explain": "Turbofans use a large fan to bypass most airflow around the core, producing most thrust with improved efficiency."}, {"q": "What is a key advantage of axial compressors over centrifugal for large engines?", "choices": ["Lower cost only", "Higher efficiency and better suited to large, high-thrust engines", "Simpler construction", "No stator blades needed"], "answer": 1, "explain": "Axial compressors offer higher efficiency and scalability, making them dominant in large modern turbofans."}, {"q": "What does bypass ratio compare?", "choices": ["Fuel to oil ratio", "Mass of air bypassing the core vs. mass going through the core", "Compressor stages to turbine stages", "Weight to thrust ratio"], "answer": 1, "explain": "Bypass ratio is the ratio of bypass airflow (through the fan, around the core) to core airflow."}, {"q": "Why do continuous-combustion turbine engines generally run smoother than reciprocating engines?", "choices": ["They use less fuel", "Combustion is continuous rather than intermittent, avoiding the pulsed power strokes of a piston engine", "They have fewer moving parts", "They operate at lower RPM"], "answer": 1, "explain": "Turbines have smooth, continuous combustion, unlike the pulsed power strokes of reciprocating piston engines."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "engine_lubrication", "title": "Engine Lubrication Systems", "track": "powerplant", "icon": "&#x1FAD9;", "sections": [{"heading": "Lubrication Purposes", "body": "Engine oil reduces friction/wear between moving parts, carries away heat, seals piston rings (in reciprocating engines), cleans by carrying away contaminants to the filter, and in some systems, helps dampen vibration/noise. Turbine engines also use oil for bearing lubrication and, in constant-speed props/hydraulic units, as an actuating fluid."}, {"heading": "Reciprocating Engine Lube Systems", "body": "Most reciprocating aircraft engines use a <b>wet-sump</b> system (oil stored in a pan/sump below the engine) or a <b>dry-sump</b> system (oil stored in a separate external tank, common on aerobatic and some high-performance engines to prevent oil starvation during inverted/high-G flight). Oil pumps, pressure relief valves, and filters/screens are common to both."}, {"heading": "Turbine Engine Lube Systems", "body": "Turbine engines typically use a <b>recirculating pressure-fed system</b> with a separate oil tank, pressure pump, scavenge pumps (to return oil from bearings back to the tank), oil coolers (air or fuel-cooled), and filters. Oil consumption and pressure/temperature trends are closely monitored - abnormal trends often indicate developing bearing or seal problems well before failure."}, {"heading": "Oil Analysis & Filtration", "body": "<b>Spectrometric oil analysis (SOA)</b> detects trace wearing metal particles in used oil, helping catch developing component wear before it becomes a failure. Filters have <b>bypass valves</b> that allow oil flow to continue (unfiltered) if the filter becomes clogged, preventing oil starvation - a clogged filter indicator/bypass warning signals the need for filter service."}], "quiz": [{"q": "What is a key purpose of engine oil besides reducing friction?", "choices": ["Increasing engine weight", "Carrying away heat and contaminants", "Reducing fuel octane requirements", "Increasing compression ratio"], "answer": 1, "explain": "Beyond lubrication, oil carries away heat and contaminants (to the filter), among other functions."}, {"q": "Why do some aerobatic aircraft use a dry-sump oil system?", "choices": ["It's cheaper", "To prevent oil starvation during inverted or high-G flight", "It requires no oil pump", "It eliminates the need for filters"], "answer": 1, "explain": "Dry-sump systems with external tanks help maintain oil supply during inverted/high-G maneuvers where a wet sump might starve the pump."}, {"q": "What is the purpose of a scavenge pump in a turbine lube system?", "choices": ["To add fuel to the oil", "To return oil from bearings back to the oil tank", "To measure oil temperature", "To filter the fuel"], "answer": 1, "explain": "Scavenge pumps return oil from bearing sumps back to the main oil tank in a turbine engine's recirculating system."}, {"q": "What does spectrometric oil analysis (SOA) detect?", "choices": ["Fuel contamination only", "Trace wearing metal particles indicating developing component wear", "Tire pressure", "Cabin altitude"], "answer": 1, "explain": "SOA detects trace metal particles in oil, helping identify developing wear issues before failure."}, {"q": "What is the purpose of a filter bypass valve?", "choices": ["To stop oil flow completely", "To allow oil flow to continue (unfiltered) if the filter clogs, preventing oil starvation", "To increase oil pressure permanently", "To cool the oil"], "answer": 1, "explain": "A bypass valve prevents oil starvation by allowing flow around a clogged filter, though then unfiltered."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "pneumatic_systems", "title": "Pneumatic Systems", "track": "airframe", "icon": "&#x1F4A8;", "sections": [{"heading": "Pneumatic System Basics", "body": "Pneumatic systems use compressed air (bleed air from engines, an APU, or a dedicated compressor) to actuate landing gear, brakes, doors, and de-icing boots on many aircraft. Compared to hydraulics, pneumatic systems are lighter and leak-tolerant (air just vents), but less precise for fine positioning and provide no lubrication of moving parts."}, {"heading": "Bleed Air Sources", "body": "Bleed air is tapped from compressor stages of a turbine engine, regulated and cooled before use for cabin pressurization, anti-icing, and pneumatic actuation. Bleed valves, pressure regulators, and overheat/overpressure switches protect downstream ducting and components from excessive temperature or pressure."}, {"heading": "Pneumatic Deicing Boots", "body": "Pneumatic deicing boots on wing and tail leading edges are inflated in a cyclic sequence to crack and shed ice accumulation, then deflated by vacuum or venturi suction to restore a smooth airfoil surface. Timing sequence and boot condition (cracks, disbonding) are critical inspection items."}, {"heading": "Pneumatic System Inspection", "body": "Inspect ducting for leaks (listen/feel for airflow, check for sooting or discoloration indicating a hot leak), check regulators and relief valves for proper setpoints, and verify check valves prevent backflow between independent system sources (e.g., engine bleed vs. APU bleed)."}], "quiz": [{"q": "Compared to hydraulic systems, pneumatic systems are generally:", "choices": ["Heavier but more precise", "Lighter, leak-tolerant, but less precise", "Only usable on the ground", "Immune to overheat damage"], "answer": 1, "explain": "Pneumatic systems are lighter and can tolerate leaks (air just vents) but are less precise than hydraulics and provide no lubrication."}, {"q": "Where does bleed air on a turbine-powered aircraft typically originate?", "choices": ["The exhaust nozzle", "Compressor stages of the engine", "The fuel tank vent", "The landing gear strut"], "answer": 1, "explain": "Bleed air is tapped from compressor stages, then regulated and cooled for downstream use."}, {"q": "What is the purpose of the cyclic inflate/deflate sequence in pneumatic deicing boots?", "choices": ["To warm the cabin", "To crack and shed ice buildup on leading edges", "To pressurize the fuselage", "To actuate the landing gear"], "answer": 1, "explain": "Cyclic inflation cracks accumulated ice, which is then shed by airflow; deflation restores a smooth airfoil."}, {"q": "A hot bleed air duct leak may be indicated during inspection by:", "choices": ["A shiny, clean duct surface", "Sooting or discoloration near the leak", "Increased hydraulic fluid level", "A drop in battery voltage"], "answer": 1, "explain": "Hot bleed air leaks often discolor or scorch nearby surfaces and insulation, a key visual inspection clue."}, {"q": "Why are check valves used between independent bleed air sources (e.g., engine vs. APU)?", "choices": ["To increase system weight", "To prevent backflow between sources", "To cool the bleed air", "To measure fuel flow"], "answer": 1, "explain": "Check valves prevent one bleed source from backfeeding into another, protecting components not designed for reverse flow."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "wiring_harness_repair", "title": "Wiring Harness Inspection & Repair", "track": "general", "icon": "&#x1F50C;", "sections": [{"heading": "Wire and Harness Construction", "body": "Aircraft wire is sized by AWG (American Wire Gauge) - smaller numbers mean larger conductors and higher current capacity. Harnesses bundle multiple wires with protective sleeving, clamps, and grommets, routed to avoid chafing against structure and to maintain separation from fluid lines and hot components."}, {"heading": "Wire Gauge and Ampacity", "body": "Ampacity (safe current-carrying capacity) depends on wire gauge, insulation type, bundle size, and installation altitude/temperature - manufacturer wire charts must be consulted rather than assuming automotive ratings. Undersized wire overheats and can be a fire hazard; oversized wire adds unnecessary weight."}, {"heading": "Chafing, Corrosion, and Damage Inspection", "body": "Inspect harnesses for chafed insulation (especially at clamps, pass-throughs, and moving surfaces), corrosion at connector pins, broken or frayed strands, and improper strain relief. Bent pins, loose connector backshells, and missing safety wire on connectors are common discrepancies."}, {"heading": "Splicing and Terminal Repair", "body": "Approved wire repairs use crimped terminals or splices with the correct tool, die, and terminal size - never solder splices in flight control or high-vibration areas unless specifically approved, since solder joints can crack under vibration. Proper crimp inspection includes pull-testing and visual/gauge verification of crimp height."}], "quiz": [{"q": "In AWG wire sizing, a smaller gauge number indicates:", "choices": ["A smaller, lower-capacity conductor", "A larger conductor with higher current capacity", "A different insulation color only", "No relationship to conductor size"], "answer": 1, "explain": "In AWG, smaller numbers correspond to larger conductor diameters and higher current-carrying capacity."}, {"q": "Wire ampacity should be determined using:", "choices": ["Automotive wire charts", "Manufacturer/aircraft-specific wire charts", "A fixed number for all wire regardless of gauge", "Only the wire's color code"], "answer": 1, "explain": "Ampacity depends on gauge, insulation, bundle size, and installation conditions - use the applicable aircraft/manufacturer wire chart."}, {"q": "Chafing damage on a wiring harness is most likely to occur at:", "choices": ["The center of a straight, unsupported run", "Clamps, pass-throughs, and moving surfaces", "Inside a sealed connector only", "Only at the battery terminal"], "answer": 1, "explain": "Chafing typically occurs where the harness contacts clamps, structure pass-throughs, or moving parts."}, {"q": "Why is soldering generally avoided for splices in high-vibration areas?", "choices": ["Solder is too conductive", "Solder joints can crack under vibration", "Solder is not available in the shop", "Soldering is faster than crimping"], "answer": 1, "explain": "Solder joints are relatively rigid and can crack from vibration fatigue; approved crimp splices are preferred in such areas."}, {"q": "A proper crimp terminal repair should be verified by:", "choices": ["Visual color of the wire only", "Pull-testing and crimp height verification", "Smelling the connector", "Measuring cabin temperature"], "answer": 1, "explain": "Pull-testing and verifying crimp height/gauge confirm the crimp meets specification and will not fail in service."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "cabin_pressurization", "title": "Cabin Pressurization Systems", "track": "airframe", "icon": "&#x1F6EB;", "sections": [{"heading": "Why Aircraft Are Pressurized", "body": "At high altitude, ambient pressure and oxygen availability drop below levels the human body can tolerate for extended periods. Pressurization systems maintain a cabin altitude far lower than the aircraft's actual flight altitude - typically keeping cabin altitude at or below 8,000 ft even when cruising at 35,000+ ft."}, {"heading": "Pressurization System Components", "body": "Bleed air (or a dedicated compressor on some aircraft) supplies conditioned air to the cabin; outflow valves regulate how much air escapes to control cabin pressure. A pressurization controller schedules cabin altitude as a function of aircraft altitude, and safety/relief valves prevent over- or under-pressurization."}, {"heading": "Cabin Differential Pressure", "body": "Differential pressure (the difference between cabin pressure and outside ambient pressure) is a critical structural limit - exceeding the maximum differential can overstress the fuselage. Differential pressure = cabin pressure - ambient (outside) pressure, and must stay within the structural limits published in the aircraft maintenance manual."}, {"heading": "Decompression and Safety Systems", "body": "Rapid or explosive decompression can result from structural failure, a door seal failure, or a major outflow valve malfunction. Safety valves are designed to relieve excess positive OR negative differential pressure, and the flight crew relies on cabin altitude warnings and oxygen systems as backups if t

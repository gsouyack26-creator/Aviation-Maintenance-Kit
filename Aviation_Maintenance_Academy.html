he primary pressurization schedule fails."}], "quiz": [{"q": "What is the typical goal for cabin altitude during cruise at high flight altitudes?", "choices": ["Match the actual flight altitude exactly", "Keep cabin altitude at or below about 8,000 ft", "Allow cabin altitude to exceed 20,000 ft", "Depressurize completely for fuel savings"], "answer": 1, "explain": "Pressurization systems typically maintain cabin altitude at or below roughly 8,000 ft even at much higher cruise altitudes."}, {"q": "What component primarily regulates how much air escapes the cabin to control pressure?", "choices": ["The fuel selector valve", "The outflow valve", "The landing gear actuator", "The pitot tube"], "answer": 1, "explain": "The outflow valve(s) regulate the rate of air escaping the pressurized cabin, working with the inflow to set cabin pressure."}, {"q": "Cabin differential pressure is defined as:", "choices": ["Cabin pressure plus ambient pressure", "Cabin pressure minus ambient (outside) pressure", "Ambient pressure only", "Fuel tank pressure minus cabin pressure"], "answer": 1, "explain": "Differential pressure = cabin pressure - outside ambient pressure; it's a key structural limit for the fuselage."}, {"q": "Why is exceeding the maximum cabin differential pressure a concern?", "choices": ["It saves fuel", "It can overstress the fuselage structure", "It has no structural effect", "It only affects cabin temperature"], "answer": 1, "explain": "Excess differential pressure can overstress the pressure vessel (fuselage), risking structural damage or failure."}, {"q": "Safety/relief valves in a pressurization system are designed to:", "choices": ["Increase cabin altitude intentionally at all times", "Relieve excess positive or negative differential pressure", "Shut off all engine bleed air permanently", "Only function on the ground"], "answer": 1, "explain": "Safety valves protect the structure by relieving pressure if differential exceeds safe limits in either direction."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "borescope_inspection", "title": "Turbine Engine Borescope Inspection", "track": "powerplant", "icon": "&#x1F50E;", "sections": [{"heading": "Purpose of Borescope Inspection", "body": "Borescope inspection allows technicians to visually examine internal engine components (compressor blades, combustor liners, turbine blades/vanes) through small access ports without full engine teardown, catching damage like foreign object damage (FOD), cracking, erosion, and hot-section distress early."}, {"heading": "Borescope Equipment and Access", "body": "Rigid and flexible fiberscopes/videoscopes are inserted through dedicated borescope ports in the engine case. Proper access requires removing plugs, and on some engines rotating the compressor/turbine (by hand or motoring) to bring each blade into view for a complete inspection."}, {"heading": "Common Findings and Damage Types", "body": "Typical findings include nicks and dents from FOD, cracking at blade roots or leading edges, erosion from sand/dust ingestion, thermal distress (bluing, coating loss) in the hot section, and carbon buildup on fuel nozzles or combustor liners. Findings are documented against manufacturer serviceable limits."}, {"heading": "Recording and Disposition", "body": "Borescope findings are photographed/recorded with reference to blade/stage location, then compared against the engine manual's serviceable limits to determine if the engine can continue in service, needs monitoring at reduced intervals, or requires removal for further inspection or repair."}], "quiz": [{"q": "What is the main advantage of borescope inspection over full teardown?", "choices": ["It is more expensive", "It allows internal inspection without full disassembly", "It replaces the need for any inspection", "It only works on piston engines"], "answer": 1, "explain": "Borescope inspection lets technicians view internal components through small ports, avoiding the cost and downtime of a full teardown."}, {"q": "To inspect every blade on a compressor or turbine stage, technicians often need to:", "choices": ["Remove the entire engine", "Rotate the compressor/turbine to bring each blade into view", "Only inspect the first blade", "Disable the fuel system permanently"], "answer": 1, "explain": "Rotating the rotor (by hand or motoring) brings each blade sequentially into the borescope's field of view for a complete inspection."}, {"q": "Thermal distress in the hot section may appear during borescope inspection as:", "choices": ["Increased shine and reflectivity", "Bluing or coating loss", "Extra paint markings", "Lower fuel pressure"], "answer": 1, "explain": "Thermal distress often shows as discoloration (bluing) or loss of protective thermal barrier coating on hot-section components."}, {"q": "Borescope findings are typically evaluated against:", "choices": ["The technician's personal judgment only", "Manufacturer serviceable limits in the engine manual", "The aircraft's paint scheme", "Cabin pressurization limits"], "answer": 1, "explain": "Findings are compared to the manufacturer's published serviceable limits to determine appropriate disposition."}, {"q": "Carbon buildup found on fuel nozzles or combustor liners during borescope inspection may indicate:", "choices": ["Normal, no-action-needed wear only", "A potential fuel/combustion issue worth further evaluation", "A problem exclusively with the landing gear", "A cabin pressurization fault"], "answer": 1, "explain": "Excessive carbon buildup can point to fuel nozzle spray pattern issues or combustion inefficiency needing further evaluation."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "recip_ignition", "title": "Reciprocating Engine Ignition Systems", "track": "powerplant", "icon": "&#x26A1;", "sections": [{"heading": "Dual Magneto Ignition Systems", "body": "Most reciprocating aircraft engines use two independent magneto-driven ignition systems firing two spark plugs per cylinder, providing redundancy (an engine can run, though roughly, on one magneto) and more complete/faster combustion for better performance and smoother operation."}, {"heading": "Magneto Operation", "body": "A magneto is a self-contained generator that produces its own high-voltage spark energy without battery power, driven mechanically off the engine. Breaker points (or electronic triggering on modern units) time the spark relative to piston position, distributed to the correct cylinder via the distributor gear/rotor."}, {"heading": "Ignition Timing and the Impulse Coupling", "body": "Ignition timing (spark advance before top dead center) is critical for engine performance and must be set per the maintenance manual. An impulse coupling on one magneto retards timing and boosts spark energy during starting, for a reliable, safe hand-crank or starter-assisted start at low RPM."}, {"heading": "Ignition System Inspection and Hazards", "body": "Magnetos can produce a spark even with the engine switch off if the p-lead (ground/shorting lead) is disconnected or broken - always treat a propeller as if the ignition is live. Inspect spark plugs for proper gap and fouling, harness leads for cracking/carbon tracking, and magneto timing per the overhaul/maintenance manual schedule."}], "quiz": [{"q": "Why do most reciprocating aircraft engines use two independent magneto systems?", "choices": ["To reduce weight", "For redundancy and more complete combustion", "Because a single magneto is illegal", "To eliminate the need for spark plugs"], "answer": 1, "explain": "Dual magnetos provide redundancy (engine can run on one) and better combustion via two spark plugs per cylinder."}, {"q": "A magneto produces ignition spark energy by:", "choices": ["Drawing power from the aircraft battery only", "Generating its own high-voltage energy mechanically, independent of the battery", "Using solar cells", "Storing energy in the fuel"], "answer": 1, "explain": "A magneto is a self-contained generator producing its own spark energy, independent of the aircraft's battery/electrical system."}, {"q": "What is the purpose of an impulse coupling on a magneto?", "choices": ["To permanently advance timing at all RPM", "To retard timing and boost spark energy during starting", "To shut off the ignition automatically", "To cool the magneto housing"], "answer": 1, "explain": "The impulse coupling retards timing and provides a stronger spark at low starting RPM for a safe, reliable engine start."}, {"q": "Why must a propeller always be treated as if the ignition is live, even with the switch off?", "choices": ["Propellers are always statically charged", "A broken/disconnected p-lead can allow a magneto to still produce spark", "The battery is always connected to the prop", "This is only a myth with no basis"], "answer": 1, "explain": "If the p-lead (grounding/shorting lead) is open, a magneto can still fire even with the ignition switch off - a serious safety hazard."}, {"q": "Ignition timing on a reciprocating engine refers to:", "choices": ["The color of the spark plug", "The spark occurring at a specified point relative to piston position (advance before TDC)", "The fuel mixture setting only", "The oil change interval"], "answer": 1, "explain": "Ignition timing specifies how many degrees before top dead center the spark occurs, critical for proper combustion and performance."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "nondestructive_electrical", "title": "Electrical System Troubleshooting", "track": "general", "icon": "\u26a1", "sections": [{"heading": "Systematic Troubleshooting Approach", "body": "Effective electrical troubleshooting follows a logical sequence: verify the complaint, review the wiring diagram, isolate the circuit into segments, and test at accessible points working from the easiest/most likely fault points inward. Guessing and randomly swapping components wastes time and can mask the real fault."}, {"heading": "Voltage, Continuity, and Resistance Checks", "body": "A voltage check confirms power is present at a point with the circuit energized; a continuity check confirms an unbroken path with power off; a resistance check quantifies wire/connection resistance to find high-resistance faults (corroded connectors, loose crimps) that a simple continuity check might miss."}, {"heading": "Common Electrical Faults", "body": "Common faults include open circuits (broken wire, blown fuse, failed switch), short circuits (chafed wire touching ground/another circuit), high-resistance connections (corrosion, loose terminals), and intermittent faults (vibration-sensitive connectors, marginal grounds) that only appear under certain conditions."}, {"heading": "Grounding and Bonding", "body": "Proper aircraft grounding and bonding provide a low-resistance return path for current and dissipate static charge, and are critical for radio/avionics noise suppression and lightning protection. Loose or corroded ground straps are a frequent, easily overlooked source of erratic electrical faults."}], "quiz": [{"q": "What is the first step in a systematic electrical troubleshooting approach?", "choices": ["Randomly swap components", "Verify the complaint and review the wiring diagram", "Replace the battery", "Skip straight to replacing the suspected part"], "answer": 1, "explain": "Verifying the complaint and reviewing the wiring diagram establishes a clear starting point before isolating the fault."}, {"q": "What does a continuity check verify?", "choices": ["Voltage present with the circuit energized", "An unbroken path with power off", "Fuel flow rate", "Cabin altitude"], "answer": 1, "explain": "A continuity check confirms an unbroken electrical path, typically performed with the circuit de-energized."}, {"q": "A high-resistance connection (e.g., corroded terminal) might be missed by a simple continuity check because:", "choices": ["Continuity checks always detect resistance faults", "A weak continuity check may still show a path even with excessive resistance", "High resistance always causes an open circuit", "Continuity checks require the circuit to be energized"], "answer": 1, "explain": "A continuity tester may show a path even through a degraded high-resistance connection, so a resistance measurement is needed to properly quantify the fault."}, {"q": "An intermittent electrical fault is best described as one that:", "choices": ["Is always present at a constant severity", "Only appears under certain conditions (vibration, temperature, movement)", "Cannot ever be diagnosed", "Only occurs during engine start"], "answer": 1, "explain": "Intermittent faults appear inconsistently, often triggered by vibration, temperature changes, or physical movement of a marginal connection."}, {"q": "Why is proper aircraft grounding and bonding important?", "choices": ["It has no functional purpose", "It provides a low-resistance return path and helps with static/lightning protection and noise suppression", "It only affects paint appearance", "It replaces the need for circuit breakers"], "answer": 1, "explain": "Grounding/bonding provides a proper current return path, dissipates static, and supports lightning protection and avionics noise suppression."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "aircraft_batteries", "title": "Aircraft Batteries", "track": "general", "icon": "\ud83d\udd0b", "sections": [{"heading": "Battery Types", "body": "Lead-acid (flooded or sealed/AGM) and nickel-cadmium (NiCad) batteries are common on aircraft, with lithium-ion batteries increasingly used on newer designs. Each has different charging characteristics, thermal runaway risks, and maintenance requirements - never assume the same servicing procedure applies across chemistries."}, {"heading": "State of Charge and Capacity Testing", "body": "Battery capacity (typically in amp-hours) degrades with age and cycling; a capacity check discharges the battery at a specified rate and measures how long it sustains a minimum voltage, compared against the rated capacity to determine serviceability (often requiring 80% of rated capacity minimum)."}, {"heading": "Thermal Runaway and NiCad Hazards", "body": "NiCad batteries can experience thermal runaway - a self-sustaining, escalating overcharge/overheat condition - if a cell fails and disrupts normal charge control, requiring immediate battery removal/power isolation if detected (rising temperature, smoke, swelling). Lithium batteries carry similar or greater thermal runaway risk if damaged or overcharged."}, {"heading": "Battery Servicing and Safety", "body": "Battery servicing requires appropriate PPE (acid-resistant gloves, eye protection for lead-acid electrolyte), proper ventilation (hydrogen gas is released during charging), and correct disposal per hazardous material regulations. Never mix electrolyte types or use incorrect charging equipment for the battery chemistry installed."}], "quiz": [{"q": "Why is it important not to assume the same servicing procedure applies across battery chemistries?", "choices": ["All batteries are serviced identically", "Different chemistries have different charging characteristics and hazards", "Battery chemistry has no effect on maintenance", "Only lead-acid batteries need any maintenance"], "answer": 1, "explain": "Lead-acid, NiCad, and lithium batteries each have distinct charging requirements and hazard profiles requiring chemistry-specific procedures."}, {"q": "A battery capacity check typically requires the battery to retain at least what percentage of rated capacity to remain serviceable (common general guideline)?", "choices": ["25%", "50%", "80%", "100% exactly, no tolerance"], "answer": 2, "explain": "A common general guideline is that a battery should retain at least about 80% of its rated capacity to remain serviceable, though exact limits vary by type/manufacturer."}, {"q": "Thermal runaway in a NiCad battery is best described as:", "choices": ["A normal charging state", "A self-sustaining, escalating overheat/overcharge condition", "A routine capacity test result", "A cosmetic defect only"], "answer": 1, "explain": "Thermal runaway is a dangerous, self-escalating overheat condition that can occur if a cell fails and disrupts normal charge control."}, {"q": "What gas is released during lead-acid battery charging, requiring proper ventilation?", "choices": ["Carbon monoxide", "Hydrogen", "Helium", "Nitrogen"], "answer": 1, "explain": "Lead-acid batteries release hydrogen gas during charging, which is flammable and requires adequate ventilation."}, {"q": "What PPE is important when servicing lead-acid batteries?", "choices": ["No PPE is needed", "Acid-resistant gloves and eye protection", "A hard hat only", "Steel-toed boots only"], "answer": 1, "explain": "Lead-acid electrolyte is corrosive; acid-resistant gloves and eye protection are important PPE for battery servicing."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "fuel_metering", "title": "Fuel Metering & Injection Systems", "track": "powerplant", "icon": "\u26fd", "sections": [{"heading": "Carburetor vs. Fuel Injection", "body": "Float-type carburetors mix fuel and air in a venturi before the intake manifold, and are prone to carburetor ice; fuel injection systems meter fuel directly to each cylinder (or near it), reducing icing risk and generally improving fuel distribution/mixture control across cylinders."}, {"heading": "Mixture Control", "body": "Mixture controls adjust the fuel-to-air ratio to compensate for reduced air density at altitude - leaning the mixture as altitude increases maintains proper combustion efficiency and prevents an overly rich mixture from fouling spark plugs or wasting fuel."}, {"heading": "Fuel Injection System Components", "body": "A typical reciprocating-engine fuel injection system includes an engine-driven fuel pump, a fuel control unit/servo that meters fuel based on airflow and throttle position, a fuel manifold (spider) distributing fuel to individual injector nozzles, and injector nozzles at each cylinder."}, {"heading": "Turbine Fuel Control Units", "body": "Turbine engines use fuel control units (mechanical/hydromechanical or electronic - FADEC) that schedule fuel flow based on throttle lever position, engine speed, temperature, and altitude to maintain safe operating limits and prevent compressor stalls or overtemperature during acceleration."}], "quiz": [{"q": "What is a key disadvantage of float-type carburetors compared to fuel injection?", "choices": ["They are heavier", "They are more prone to carburetor ice", "They cannot be used on any aircraft", "They require no maintenance"], "answer": 1, "explain": "Float carburetors are prone to carburetor icing due to the venturi effect cooling the incoming air/fuel mixture."}, {"q": "Why is mixture leaned as altitude increases in a reciprocating engine?", "choices": ["To increase fuel consumption", "To compensate for reduced air density and maintain proper combustion efficiency", "Because engines always run better rich", "It has no effect on performance"], "answer": 1, "explain": "As altitude increases, air density drops; leaning the mixture keeps the fuel-air ratio appropriate for efficient combustion."}, {"q": "What distributes metered fuel to individual injector nozzles in a typical piston fuel injection system?", "choices": ["The magneto", "The fuel manifold (spider)", "The alternator", "The landing gear actuator"], "answer": 1, "explain": "The fuel manifold, sometimes called the spider, distributes metered fuel from the control unit to each cylinder's injector nozzle."}, {"q": "What does a turbine engine's fuel control unit primarily schedule fuel flow based on?", "choices": ["Cabin temperature only", "Throttle position, engine speed, temperature, and altitude", "Passenger count", "Landing gear position"], "answer": 1, "explain": "Turbine fuel control units schedule fuel flow based on multiple parameters including throttle position, N1/N2 speed, temperature, and altitude."}, {"q": "What is FADEC?", "choices": ["A type of carburetor", "Full Authority Digital Engine Control - an electronic fuel/engine control system", "A fuel additive", "A type of landing gear"], "answer": 1, "explain": "FADEC (Full Authority Digital Engine Control) is an electronic system that manages engine fuel scheduling and other parameters digitally."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "turbine_starting", "title": "Turbine Engine Starting Systems", "track": "powerplant", "icon": "\ud83d\udd25", "sections": [{"heading": "Starting Sequence Overview", "body": "A typical turbine start sequence involves the starter motor (pneumatic, electric, or hydraulic) rotating the engine to a minimum speed, then introducing ignition and fuel in the correct sequence, monitoring for light-off (rise in exhaust gas temperature and RPM), and releasing the starter once the engine is self-sustaining."}, {"heading": "Starter Types", "body": "Pneumatic starters use compressed air (from an APU, ground cart, or cross-bleed from another running engine) driving an air turbine; electric starters use a DC motor (common on smaller turbines/APUs); hydraulic starters use hydraulic motors. Each has different torque, weight, and system integration characteristics."}, {"heading": "Hot Starts, Hung Starts, and Aborted Starts", "body": "A hot start occurs when exhaust gas temperature exceeds limits during start (often from too much fuel too soon); a hung start occurs when the engine stabilizes at a low RPM below idle without accelerating further (often insufficient starter assist or fuel scheduling issue); both require an immediate abort per the manufacturer's procedure to prevent engine damage."}, {"heading": "Starter Duty Cycle Limits", "body": "Starters (especially electric) have duty cycle limits (e.g., a maximum engagement time followed by a mandatory cooling period) to prevent overheating the starter motor. Maintenance manuals specify these limits, and exceeding them risks starter motor damage or failure on a subsequent start attempt."}], "quiz": [{"q": "What indicates engine 'light-off' during a turbine start?", "choices": ["A drop in oil pressure", "A rise in exhaust gas temperature and RPM", "Illumination of the landing lights", "A decrease in fuel flow to zero"], "answer": 1, "explain": "Light-off is indicated by a rise in EGT and RPM as combustion becomes established and self-sustaining."}, {"q": "What is a 'hot start'?", "choices": ["A start performed in warm weather", "A condition where exhaust gas temperature exceeds limits during start", "A start using an external power cart", "A normal, expected start condition"], "answer": 1, "explain": "A hot start is an abnormal condition where EGT exceeds safe limits, often from excess fuel introduced too soon, requiring an abort."}, {"q": "What characterizes a 'hung start'?", "choices": ["The engine accelerates too quickly to idle", "The engine stabilizes at a low RPM below idle without further acceleration", "The engine never rotates at all", "The engine exceeds maximum RPM limits"], "answer": 1, "explain": "A hung start occurs when the engine stalls out at a sub-idle RPM and fails to continue accelerating, often due to insufficient starter assist or fuel scheduling."}, {"q": "Why do electric starters have duty cycle limits?", "choices": ["To save fuel", "To prevent overheating the starter motor", "To comply with paint regulations", "To reduce cabin noise"], "answer": 1, "explain": "Electric starter motors can overheat with extended or repeated engagement, so duty cycle limits (engagement time + cooling period) protect the starter."}, {"q": "A pneumatic starter's compressed air source can come from:", "choices": ["Only the aircraft battery", "An APU, ground cart, or cross-bleed from another running engine", "The hydraulic reservoir", "The oxygen system"], "answer": 1, "explain": "Pneumatic starters can be supplied by an APU, external ground air cart, or cross-bleed air from an already-running engine."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "sheet_metal_repair_adv", "title": "Advanced Sheet Metal Repair", "track": "airframe", "icon": "\ud83d\udd27", "sections": [{"heading": "Damage Evaluation and Repair Classification", "body": "Sheet metal damage is classified as negligible (no repair needed within limits), repairable (patch, doubler, or splice per approved data), or requiring parts replacement (damage exceeds repairable limits). Structural repair manuals (SRMs) define allowable damage limits by location and damage type (dents, cracks, corrosion, punctures)."}, {"heading": "Repair Design Principles", "body": "A proper sheet metal repair restores original strength, stiffness, and contour while avoiding stress concentrations. Doublers (external reinforcement patches) and flush patches (inset repairs) are sized and fastened per SRM guidance, with fastener edge distance, spacing, and pattern all critical to load transfer and fatigue life."}, {"heading": "Stop-Drilling and Crack Repair", "body": "Stop-drilling a crack (drilling a small hole at the crack tip) can arrest crack propagation as a temporary or approved permanent measure in low-stress areas, removing the stress-concentrating sharp crack tip. This must be followed by an appropriate doubler or patch per SRM guidance for anything beyond negligible damage."}, {"heading": "Corrosion-Related Repairs", "body": "Repairs following corrosion removal must account for material thinning - if corrosion removal reduces material below minimum gauge, a repair (doubler or replacement) is required even if no crack or puncture is present. Post-repair corrosion protection (primer, sealant) is essential to prevent recurrence at the repair site."}], "quiz": [{"q": "What document defines allowable sheet metal damage limits by location and damage type?", "choices": ["The pilot's operating handbook", "The structural repair manual (SRM)", "The weight and balance report", "The fuel planning chart"], "answer": 1, "explain": "The SRM defines allowable damage limits and approved repair methods by location and damage type."}, {"q": "What is the purpose of a doubler in a sheet metal repair?", "choices": ["To add decorative trim", "To provide external reinforcement restoring strength across the damaged area", "To reduce the aircraft's weight", "To seal fuel tanks only"], "answer": 1, "explain": "A doubler is a reinforcement patch that restores strength and stiffness across a repaired area."}, {"q": "What is the purpose of stop-drilling a crack?", "choices": ["To permanently seal the crack with paint", "To remove the stress-concentrating crack tip and arrest propagation", "To increase the crack length intentionally", "To weld the crack shut"], "answer": 1, "explain": "Stop-drilling removes the sharp crack tip that concentrates stress, helping arrest further crack propagation."}, {"q": "Why might a repair be required after corrosion removal even without a crack or puncture present?", "choices": ["Repairs are always required regardless of condition", "Material thinning from corrosion removal may reduce thickness below minimum gauge", "Corrosion removal always creates a puncture", "It is purely a cosmetic requirement"], "answer": 1, "explain": "If corrosion removal thins the material below the minimum allowable gauge, a repair is required to restore adequate strength."}, {"q": "What is important to apply after completing a repair following corrosion removal?", "choices": ["Nothing further is needed", "Corrosion protection such as primer and sealant", "Only decorative paint matching the fuselage color", "A layer of grease"], "answer": 1, "explain": "Post-repair corrosion protection (primer, sealant) is essential to prevent corrosion from recurring at the repair site."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "hoisting_jacking", "title": "Aircraft Jacking & Hoisting Safety", "track": "general", "icon": "\ud83c\udfd7", "sections": [{"heading": "Jack Point Identification", "body": "Aircraft have designated jack points specified in the maintenance manual - using an incorrect location can damage structure or cause the aircraft to become unstable on the jacks. Jack pads/adapters matched to the specific jack point geometry are required, never improvised substitutes."}, {"heading": "Jacking Sequence and Stability", "body": "Jacking typically follows a specified sequence (e.g., nose then main gear, or symmetric main gear points together) with weight and CG within limits, on a level, hard surface, and with the aircraft ideally in a wind-protected area since jacked aircraft are vulnerable to tip-over in gusts."}, {"heading": "Jack Capacity and Inspection", "body": "Jacks must be rated for at least the load they will support with margin, inspected for hydraulic leaks, cracked welds, and proper operation before use. Never exceed a jack's rated capacity, and always have a means of safely lowering the aircraft if a jack fails partway through the task."}, {"heading": "Hoisting and Engine/Component Removal Safety", "body": "Hoists and lifting slings used for engine or major component removal must be rated for the load with margin, inspected for wear (frayed cable, cracked hooks), and rigged per the manual's specified attachment points to avoid imbalance or component damage during the lift."}], "quiz": [{"q": "Why must jack points match those specified in the maintenance manual?", "choices": ["Any strong-looking structure point works fine", "Using an incorrect location can damage structure or destabilize the aircraft", "Jack points are purely cosmetic markings", "Manufacturers do not specify jack points"], "answer": 1, "explain": "Only manual-specified jack points are designed to safely support the aircraft's weight without structural damage or instability."}, {"q": "Why is a jacked aircraft particularly vulnerable in gusty wind conditions?", "choices": ["Wind has no effect once jacked", "The aircraft can tip over since it is no longer supported by its landing gear/tires", "Jacks automatically compensate for wind loads", "Wind only affects flight, not ground operations"], "answer": 1, "explain": "A jacked aircraft lacks the stability of its landing gear on the ground and can be more easily tipped by wind gusts."}, {"q": "What should be verified about a jack before use?", "choices": ["Only that it is painted the correct color", "That it is rated for the load with margin and free of leaks/damage", "That it matches the aircraft's paint scheme", "That it was manufactured within the last week"], "answer": 1, "explain": "Jacks must be inspected for proper rated capacity, hydraulic integrity, and structural condition before use."}, {"q": "What is a key consideration when rigging a hoist for engine removal?", "choices": ["Attaching at any convenient point", "Using the manual-specified attachment points to avoid imbalance or damage", "Using the thinnest available cable", "Skipping any capacity rating check"], "answer": 1, "explain": "Hoist rigging must use manual-specified attachment points and rated equipment to avoid an unbalanced or damaging lift."}, {"q": "What must be verified about weight and CG before jacking an aircraft?", "choices": ["They are irrelevant to jacking", "They must be within the limits specified for jacking", "Only weight matters, not CG", "Only CG matters, not weight"], "answer": 1, "explain": "Both weight and CG must be within specified jacking limits to maintain stability and avoid overloading jack points."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "avionics_troubleshooting", "title": "Avionics System Troubleshooting", "track": "airframe", "icon": "\ud83d\udcf1", "sections": [{"heading": "Avionics Architecture Basics", "body": "Modern avionics systems use data buses (e.g., ARINC 429, ARINC 664/AFDX, or CAN bus on smaller aircraft) to share information between line replaceable units (LRUs) such as navigation, communication, and display computers, rather than dedicated point-to-point wiring for every signal."}, {"heading": "LRU Fault Isolation", "body": "Built-in test equipment (BITE) in most modern avionics LRUs can report fault codes, helping isolate whether a discrepancy is internal to the LRU, in the interconnecting wiring/bus, or in another interfacing LRU providing bad data. Cross-referencing BITE history with the maintenance manual's fault isolation procedures is the standard first troubleshooting step."}, {"heading": "Software and Database Considerations", "body": "Avionics systems often rely on loadable software and periodically updated databases (navigation data, terrain, charts). A malfunction may stem from a software/database version mismatch or a corrupted/outdated load rather than a hardware fault - checking the installed versions against requirements is an important early troubleshooting step."}, {"heading": "Electromagnetic Interference (EMI) and Bonding", "body": "Avionics can be susceptible to electromagnetic interference from poorly bonded/shielded wiring, nearby high-power equipment, or portable electronic devices. Proper cable shielding, grounding, and bonding practices per the manual reduce EMI-related nuisance faults or erroneous readings."}], "quiz": [{"q": "What do modern avionics data buses like ARINC 429 primarily do?", "choices": ["Provide mechanical support for LRUs", "Share information between line replaceable units (LRUs) digitally", "Supply hydraulic pressure", "Replace the need for any wiring"], "answer": 1, "explain": "Data buses like ARINC 429 carry digital information between avionics LRUs, replacing extensive point-to-point analog wiring."}, {"q": "What is BITE in the context of avionics troubleshooting?", "choices": ["A type of connector", "Built-in test equipment that reports fault codes from within an LRU", "A fuel additive", "A structural repair technique"], "answer": 1, "explain": "BITE (built-in test equipment) is self-test circuitry within an LRU that helps isolate faults by reporting diagnostic codes."}, {"q": "A software/database version mismatch in an avionics unit might cause:", "choices": ["No effect on system operation ever", "A malfunction that could be mistaken for a hardware fault", "Automatic self-correction with no technician input", "Only cosmetic display issues, never functional problems"], "answer": 1, "explain": "Version mismatches or corrupted software/database loads can cause malfunctions that mimic hardware faults, so checking versions is an important early step."}, {"q": "What can cause electromagnetic interference (EMI) affecting avionics?", "choices": ["Proper cable shielding and bonding", "Poorly bonded/shielded wiring or nearby high-power equipment", "Using only manufacturer-approved connectors", "Routine visual inspections"], "answer": 1, "explain": "Poor shielding/bonding or proximity to high-power equipment can introduce EMI that disrupts avionics signals."}, {"q": "When isolating an avionics fault, what should be cross-referenced with BITE history?", "choices": ["The aircraft's paint records", "The maintenance manual's fault isolation procedures", "The catering manifest", "The passenger seating chart"], "answer": 1, "explain": "BITE fault codes should be cross-referenced with the maintenance manual's specific fault isolation procedures for accurate diagnosis."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "oxygen_systems_adv", "title": "Advanced Oxygen System Servicing", "track": "airframe", "icon": "\ud83e\udee7", "sections": [{"heading": "Oxygen System Types", "body": "Aircraft oxygen systems may be gaseous (high-pressure cylinders), liquid (LOX, converted to gas via a converter), or chemical (oxygen generators producing gas via a chemical reaction, common for passenger emergency masks). Each has distinct servicing, storage, and hazard considerations."}, {"heading": "Oxygen Cleanliness and Fire Hazard", "body": "Oxygen systems must be kept scrupulously free of oil, grease, and hydrocarbon contamination - these can ignite violently in an oxygen-enriched environment. Only oxygen-system-approved lubricants and cleaning agents are used, and tools/hands must be free of oil residue when servicing."}, {"heading": "Servicing Procedures and Precautions", "body": "Oxygen cylinders are serviced slowly to avoid excessive heat buildup from rapid compression (adiabatic heating), never over-pressurized beyond rated limits, and always sourced from aviation-grade oxygen (not industrial/medical oxygen, which may have different moisture/purity specifications) unless specifically approved."}, {"heading": "Chemical Oxygen Generator Hazards", "body": "Chemical oxygen generators produce oxygen via an exothermic chemical reaction and become very hot during activation - expended or activated generators must be handled and disposed of per hazardous material procedures, as an unexpended generator can still pose a fire/burn hazard if improperly triggered or damaged."}], "quiz": [{"q": "Why must oxygen systems be kept free of oil and grease contamination?", "choices": ["It has no effect on the system", "Oil/grease can ignite violently in an oxygen-enriched environment", "It only affects the smell of the oxygen", "Oil improves oxygen flow"], "answer": 1, "explain": "Hydrocarbon contamination in an oxygen-rich environment poses a serious fire/explosion hazard."}, {"q": "Why are oxygen cylinders serviced slowly rather than rapidly filled?", "choices": ["To save time", "To avoid excessive heat buildup from rapid compression (adiabatic heating)", "Rapid filling is always preferred and safer", "Slow filling has no technical reason"], "answer": 1, "explain": "Rapid compression during filling generates heat (adiabatic heating), which slow filling helps avoid for safety."}, {"q": "Why should industrial or medical oxygen generally not be used for aircraft systems unless specifically approved?", "choices": ["They are always identical to aviation oxygen", "They may have different moisture/purity specifications", "They are illegal to purchase", "Aircraft cannot use any oxygen except pure argon"], "answer": 1, "explain": "Industrial/medical oxygen may not meet aviation-grade moisture and purity specifications required for aircraft oxygen systems."}, {"q": "How do chemical oxygen generators (common for passenger masks) produce oxygen?", "choices": ["By compressing ambient air", "Via an exothermic chemical reaction", "By freezing liquid oxygen", "By electrolysis of water"], "answer": 1, "explain": "Chemical oxygen generators use an exothermic (heat-producing) chemical reaction to generate oxygen gas."}, {"q": "Why must expended or activated chemical oxygen generators be handled carefully?", "choices": ["They have no residual hazard", "They can become very hot and pose a fire/burn hazard", "They are lighter than unexpended units", "They must be recharged immediately"], "answer": 1, "explain": "Chemical oxygen generators get very hot during activation and retain hazard potential, requiring careful handling and disposal."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "gas_turbine_performance", "title": "Gas Turbine Performance & Limits", "track": "powerplant", "icon": "\ud83d\udcc8", "sections": [{"heading": "Key Turbine Performance Parameters", "body": "N1/N2 (or Np/Ng) represent rotational speeds of different spool sections; EGT (exhaust gas temperature) indicates combustion/turbine thermal condition; and torque or EPR (engine pressure ratio) can represent power output depending on engine type. Each has published normal and limit values in the engine manual."}, {"heading": "Thermal and Mechanical Limits", "body": "Exceeding EGT limits accelerates hot-section wear and can cause immediate damage in severe cases; exceeding N1/N2 overspeed limits risks mechanical failure of rotating components. Both transient (brief exceedance) and steady-state limits are typically defined, with different allowable durations."}, {"heading": "Performance Trend Monitoring", "body": "Engine trend monitoring programs track parameters like EGT margin, fuel flow, and vibration over time at comparable conditions (e.g., stabilized cruise) to detect gradual deterioration before it becomes a limit exceedance or in-flight event - a rising EGT trend at constant power is a classic early warning sign."}, {"heading": "Altitude and Temperature Effects on Performance", "body": "Turbine engine thrust/power output decreases with increasing altitude (lower air density) and increasing outside air temperature (hotter air is less dense) - performance charts and flat-rating (engines rated to deliver a fixed thrust up to a temperature threshold) account for these effects in flight planning."}], "quiz": [{"q": "What does EGT indicate in a turbine engine?", "choices": ["Cabin pressure", "Exhaust gas temperature, indicating combustion/turbine thermal condition", "Landing gear position", "Fuel tank quantity"], "answer": 1, "explain": "EGT (exhaust gas temperature) reflects the thermal condition of combustion and the turbine section."}, {"q": "What is a key difference between transient and steady-state limit exceedances?", "choices": ["They are always treated identically with no distinction", "Transient (brief) exceedances often have different allowable durations than steady-state ones", "Steady-state limits do not exist for turbine engines", "Transient limits are always higher than steady-state limits with no restriction"], "answer": 1, "explain": "Engine manuals typically define different allowable durations for brief (transient) versus sustained (steady-state) limit exceedances."}, {"q": "What is a classic early warning sign detected by engine trend monitoring?", "choices": ["A sudden decrease in aircraft weight", "A rising EGT trend at constant power over time", "An increase in tire pressure", "A change in paint color"], "answer": 1, "explain": "A gradual rise in EGT at comparable power settings over time is a classic early indicator of engine deterioration."}, {"q": "Why does turbine engine thrust decrease with increasing altitude?", "choices": ["Air density decreases with altitude, reducing available thrust", "Engines run hotter at altitude, increasing thrust", "Altitude has no effect on turbine performance", "Fuel becomes denser at altitude"], "answer": 0, "explain": "Lower air density at higher altitude reduces the mass airflow through the engine, reducing available thrust."}, {"q": "What does 'flat-rating' an engine mean?", "choices": ["The engine has no rated limits", "The engine delivers a fixed thrust rating up to a specified temperature threshold", "The engine is physically flat in shape", "The engine cannot operate above sea level"], "answer": 1, "explain": "A flat-rated engine is designed to produce a constant thrust rating up to a specified outside air temperature, beyond which thrust falls off."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "aircraft_finishes", "title": "Aircraft Finishes & Corrosion Protection", "track": "airframe", "icon": "\ud83c\udfa8", "sections": [{"heading": "Finish System Layers", "body": "A typical aircraft finish system includes surface pretreatment (cleaning, etching, or conversion coating), a primer layer (often chromate or non-chromate corrosion-inhibiting primer) providing the main corrosion protection, and a topcoat providing UV/environmental protection and appearance."}, {"heading": "Surface Preparation", "body": "Proper surface preparation (cleaning to remove oils/contaminants, light abrasion or chemical treatment for adhesion, and complete drying) is critical - finishes applied over contaminated or improperly prepared surfaces fail prematurely through poor adhesion, blistering, or accelerated corrosion underneath."}, {"heading": "Primer Selection and Corrosion Inhibition", "body": "Corrosion-inhibiting primers contain compounds that passivate the metal surface and/or provide a sacrificial protective action; compatibility between primer, topcoat, and substrate material (aluminum, steel, composite) must be verified per the approved finish specification to avoid adhesion or galvanic issues."}, {"heading": "Finish Inspection and Touch-Up", "body": "Inspect finishes for cracking, peeling, blistering, and chalking (UV degradation), which can allow moisture ingress and corrosion initiation. Touch-up repairs should feather-blend into existing finish and match the full layer system (primer plus topcoat), not just a cosmetic topcoat-only patch over bare or corroded metal."}], "quiz": [{"q": "What is the main purpose of the primer layer in an aircraft finish system?", "choices": ["Providing decorative color only", "Providing the main corrosion protection", "Improving aerodynamic drag", "Adding weight for balance"], "answer": 1, "explain": "The primer layer is the primary corrosion-inhibiting component of the finish system, beneath the cosmetic/protective topcoat."}, {"q": "Why does improper surface preparation cause premature finish failure?", "choices": ["It has no effect on finish durability", "Contaminants or poor adhesion prep cause blistering, peeling, or hidden corrosion", "Surface prep only affects color matching", "It only matters for composite structures"], "answer": 1, "explain": "Finishes applied over contaminated or poorly prepared surfaces adhere poorly and can trap moisture leading to corrosion underneath."}, {"q": "What must be verified when selecting a primer for a specific substrate?", "choices": ["Only the color needs to match", "Compatibility between primer, topcoat, and substrate material", "Primers are universally compatible with all materials", "Cost is the only consideration"], "answer": 1, "explain": "Primer/topcoat/substrate compatibility must be verified per approved specifications to avoid adhesion or galvanic corrosion issues."}, {"q": "What finish defect is caused by UV degradation?", "choices": ["Chalking", "Increased gloss with no other change", "Improved corrosion resistance", "Weight reduction"], "answer": 0, "explain": "Chalking (a powdery, dulled surface) is a common sign of UV degradation in aircraft finishes."}, {"q": "Why should touch-up repairs include the full primer-plus-topcoat layer system rather than just a cosmetic topcoat patch?", "choices": ["Cosmetic-only patches provide equal corrosion protection", "A topcoat-only patch over bare/corroded metal leaves inadequate corrosion protection", "Primer is unnecessary in touch-up work", "It has no bearing on long-term durability"], "answer": 1, "explain": "A topcoat-only touch-up without proper primer underneath does not restore the corrosion-inhibiting protection of the full finish system."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "aircraft_welding_gas", "title": "Gas & Arc Welding for Airframe Repair", "track": "airframe", "icon": "&#x1F525;", "sections": [{"heading": "Oxy-Acetylene Welding Fundamentals", "body": "Oxy-acetylene welding uses a flame produced by burning acetylene gas with oxygen to melt and fuse metal. The neutral flame (equal oxygen and acetylene) is preferred for most steel welding, showing a well-defined inner cone with no excess feather. A carburizing flame (excess acetylene) has a feathery inner cone and adds carbon to the weld, useful for hard-surfacing. An oxidizing flame (excess oxygen) is hotter but can burn metal and is generally avoided except for brazing brass. Regulators reduce cylinder pressure to safe working pressure; acetylene should never be used above 15 psi due to explosion risk from unstable acetylide compounds at higher pressure."}, {"heading": "Filler Rod and Flux Selection", "body": "Filler rod composition should closely match the base metal being welded. Mild steel structures typically use RG45 or similar low-carbon rod. Flux is required when welding aluminum or stainless steel to dissolve oxide layers that form instantly in air and prevent proper fusion; flux is not needed for mild steel oxy-acetylene welding. After welding aluminum with flux, all flux residue must be thoroughly removed with hot water and a stainless brush, as residual flux is corrosive and will continue attacking the metal."}, {"heading": "TIG (GTAW) for Aircraft Structures", "body": "Gas Tungsten Arc Welding (TIG) uses a non-consumable tungsten electrode and inert shielding gas (argon) to produce high-quality, precise welds with minimal distortion, making it the preferred method for aircraft steel tubing, aluminum skins, and stainless exhaust systems. DCEN (direct current electrode negative) is used for steel; AC is typically used for aluminum because it provides the cleaning action needed to break up the oxide layer. Proper gas coverage (adequate flow rate, correct cup size, no drafts) is critical to prevent porosity and contamination of the weld puddle."}, {"heading": "Weld Inspection and Repair Criteria", "body": "Aircraft welds are inspected visually for uniform ripple pattern, complete penetration, absence of undercut, and no evidence of porosity, cracks, or slag inclusion. A properly welded joint should show a fine, evenly spaced ripple with no icicles or lumps. Cracked or heavily corroded steel tubing structures are generally repaired by welding in a new section (splice) rather than patching, following AC 43.13-1B guidance for tubing structure repairs, including proper overlap and stress-relieving of the heat-affected zone where required."}], "quiz": [{"q": "What is the safe maximum acetylene pressure due to explosion risk?", "choices": ["5 psi", "15 psi", "30 psi", "50 psi"], "answer": 1, "explain": "Correct answer: 15 psi."}, {"q": "Which flame type is preferred for most steel oxy-acetylene welding?", "choices": ["Oxidizing", "Carburizing", "Neutral", "Reducing-only"], "answer": 2, "explain": "Correct answer: Neutral."}, {"q": "Why is flux required when welding aluminum?", "choices": ["To add carbon", "To dissolve the oxide layer", "To cool the weld faster", "To increase flame temperature"], "answer": 1, "explain": "Correct answer: To dissolve the oxide layer."}, {"q": "Which current type is typically used for TIG welding aluminum?", "choices": ["DCEN", "AC", "DCEP only at low amperage", "No current, gas only"], "answer": 1, "explain": "Correct answer: AC."}, {"q": "How are cracked steel tubing structures typically repaired per AC 43.13-1B?", "choices": ["Patching over the crack", "Welding in a new spliced section", "Riveting a doubler", "Bonding with adhesive"], "answer": 1, "explain": "Correct answer: Welding in a new spliced section."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "aircraft_electrical_bonding", "title": "Electrical Bonding & Static Discharge Systems", "track": "airframe", "icon": "&#x26A1;", "sections": [{"heading": "Purpose of Bonding", "body": "Electrical bonding connects metal components with low-resistance jumpers to establish a common electrical potential across the airframe. Bonding minimizes voltage differences between parts, reducing the risk of sparking, RF interference, and lightning-strike damage concentration. Bonding jumpers are typically braided copper straps with crimped or soldered terminals, installed across movable joints such as control surface hinges, engine mounts, and landing gear struts to maintain continuity even as components move or vibrate."}, {"heading": "Static Dischargers (Static Wicks)", "body": "Static dischargers, or static wicks, are mounted at the trailing edges of wings, ailerons, elevators, and the rudder. They provide a low-resistance path to bleed off static charge that builds up from airflow friction (triboelectric charging), preventing charge buildup that would otherwise discharge as noisy corona and interfere with radio communications. Dischargers must be inspected for physical damage, proper resistance (typically checked with an ohmmeter against manufacturer specs, often under 1 megohm), and secure attachment; a missing or damaged wick can cause significant static-related radio noise."}, {"heading": "Lightning Strike Protection", "body": "Composite aircraft structures, lacking the inherent conductivity of aluminum, often incorporate embedded metal mesh, foil, or expanded metal layers to provide a conductive path for lightning current, diverting it away from fuel tanks and sensitive avionics. Bonding straps connect these conductive layers across structural joints to maintain a continuous path. Fuel tank areas require special attention: bonding resistance requirements are stricter here because arcing near fuel vapors presents an explosion hazard."}, {"heading": "Bonding Resistance Testing", "body": "Bonding resistance is measured with a low-resistance ohmmeter (milliohmmeter) capable of accurate readings in the milliohm range, since standard multimeters lack sufficient resolution and accuracy for bonding checks. Typical acceptable bonding resistance across a strap is a fraction of an ohm (often less than 0.003 ohm for critical fuel-system bonding, higher for general structure per manufacturer data). Corrosion at bonding jumper attachment points is a common cause of high resistance readings and failed bonding checks; cleaning and re-torquing the attachment often restores continuity."}], "quiz": [{"q": "What is the primary purpose of electrical bonding jumpers on an airframe?", "choices": ["Increase weight for balance", "Establish a common low-resistance electrical potential", "Improve paint adhesion", "Reduce fuel consumption"], "answer": 1, "explain": "Correct answer: Establish a common low-resistance electrical potential."}, {"q": "Where are static dischargers typically mounted?", "choices": ["Nose landing gear", "Trailing edges of flight control surfaces", "Cockpit windows", "Engine cowling"], "answer": 1, "explain": "Correct answer: Trailing edges of flight control surfaces."}, {"q": "What do static wicks help prevent?", "choices": ["Engine overheating", "Radio interference from static discharge", "Hydraulic fluid leaks", "Tire wear"], "answer": 1, "explain": "Correct answer: Radio interference from static discharge."}, {"q": "Why do composite aircraft often embed metal mesh in the skin?", "choices": ["To reduce drag", "To provide a path for lightning current", "To improve paint color", "To add stiffness only"], "answer": 1, "explain": "Correct answer: To provide a path for lightning current."}, {"q": "What instrument is required for accurate bonding resistance checks?", "choices": ["Standard multimeter", "Low-resistance ohmmeter (milliohmmeter)", "Voltmeter", "Ammeter clamp"], "answer": 1, "explain": "Correct answer: Low-resistance ohmmeter (milliohmmeter)."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "aircraft_scheduled_inspections", "title": "Scheduled Inspection Programs & Airworthiness Directives", "track": "general", "icon": "&#x1F4CB;", "sections": [{"heading": "Inspection Program Types", "body": "Part 91 aircraft not used for hire generally require an annual inspection every 12 calendar months under 14 CFR 91.409. Aircraft used for hire or flight instruction for hire typically require 100-hour inspections in addition to (or instead of) the annual, depending on operation type. Progressive inspection programs and manufacturer-approved inspection programs (like those in a maintenance manual's inspection schedule) offer alternatives, spreading inspection tasks across multiple shorter events rather than one large annual inspection, which can reduce aircraft downtime."}, {"heading": "Airworthiness Directives (ADs)", "body": "Airworthiness Directives are legally enforceable rules issued by the FAA to correct an unsafe condition in a product, and compliance is mandatory unless a specific exemption is granted. ADs may require one-time inspections, recurring inspections at specified intervals, or modifications/replacements of parts. Emergency ADs may require action before further flight when the unsafe condition poses an immediate hazard. AD compliance must be recorded in the aircraft's permanent maintenance records, including the AD number, method of compliance, and date/time of compliance."}, {"heading": "Service Bulletins vs. ADs", "body": "Service Bulletins (SBs) are issued by manufacturers and are generally NOT mandatory unless referenced by an AD or a specific operator's approved maintenance program (or required by insurance/lease terms). However, many ADs are based on manufacturer SBs, incorporating them by reference and making compliance mandatory. Understanding whether a bulletin is 'FAA-mandated' (via an AD) versus 'manufacturer-recommended' (SB alone) is essential to correctly prioritizing and documenting compliance."}, {"heading": "Inspection Documentation and Sign-off", "body": "A completed inspection requires a written, signed statement in the maintenance records including the type of inspection performed, aircraft total time, and a statement that the aircraft was found to be in airworthy condition (or a list of discrepancies if not airworthy). For an annual inspection, only an IA (Inspection Authorization holder) may perform and approve for return to service; a mechanic with an A&P certificate but no IA can perform the inspection but cannot approve it for return to service without IA sign-off."}], "quiz": [{"q": "How often is an annual inspection required under 14 CFR 91.409?", "choices": ["Every 6 calendar months", "Every 12 calendar months", "Every 100 flight hours", "Every 24 calendar months"], "answer": 1, "explain": "Correct answer: Every 12 calendar months."}, {"q": "Is compliance with an Airworthiness Directive mandatory?", "choices": ["No, it's a suggestion", "Yes, unless a specific exemption is granted", "Only for commercial operators", "Only if the owner agrees"], "answer": 1, "explain": "Correct answer: Yes, unless a specific exemption is granted."}, {"q": "Are Service Bulletins generally mandatory on their own?", "choices": ["Yes, always", "No, unless referenced by an AD or required by an approved program", "Only for turbine aircraft", "Only within the first year of issue"], "answer": 1, "explain": "Correct answer: No, unless referenced by an AD or required by an approved program."}, {"q": "Who must approve an aircraft for return to service after an annual inspection?", "choices": ["Any A&P mechanic", "An Inspection Authorization (IA) holder", "The aircraft owner", "A student mechanic under supervision"], "answer": 1, "explain": "Correct answer: An Inspection Authorization (IA) holder."}, {"q": "What must be recorded for AD compliance in maintenance records?", "choices": ["Only the aircraft tail number", "AD number, method of compliance, and date/time", "Just a checkmark", "Nothing, verbal confirmation suffices"], "answer": 1, "explain": "Correct answer: AD number, method of compliance, and date/time."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "aircraft_fabric_covering", "title": "Fabric Covering & Doped Finishes", "track": "airframe", "icon": "&#x1F9F5;", "sections": [{"heading": "Fabric Materials and Certification", "body": "Modern aircraft fabric covering primarily uses synthetic polyester fabric (such as Ceconite or Stits Poly-Fiber systems) rather than the cotton or linen historically used, offering greater strength, longer service life, and resistance to rot and mildew. Fabric coverings must be applied under an approved STC (Supplemental Type Certificate) process or per the aircraft's original type certificate data, with the specific process (envelope method, blanket method, or individual panel method) dictated by the covering system manufacturer's approved instructions."}, {"heading": "Dope Application Process", "body": "Dope is a clear or pigmented liquid coating applied in multiple coats to shrink the fabric taut over the structure and provide a protective, weatherproof surface. Nitrate dope was historically used as a base coat for adhesion, followed by butyrate dope topcoats for its superior UV and weather resistance and lower flammability; nitrate dope alone is highly flammable and today, all-butyrate or non-flammable modern systems are preferred. Each dope coat must be allowed to fully cure before the next is applied, and proper ventilation during application is essential due to solvent vapors."}, {"heading": "Rib Stitching and Reinforcing Tape", "body": "Fabric is attached to wing ribs using rib stitching (a specific lock-stitch pattern using waxed polyester cord) or approved rib-lacing clips, spaced according to the covering manual's specified interval (often related to airspeed category). Reinforcing tape (surface tape) is applied over rib stitching, seams, and structural members before final dope coats to distribute stress and prevent fabric from tearing at attachment points; tape width and adhesive method must follow the specific covering system's approved procedures."}, {"heading": "Fabric Strength Testing", "body": "Fabric strength is checked periodically using a calibrated fabric tester (punch-type tester) that measures the force required to punch through the fabric; results are compared against the minimum strength value specified for the aircraft's category (typically listed in pounds per inch of tear strength, e.g., a common minimum threshold near 46-56 lbs depending on aircraft category and original certification basis). Fabric that tests below the minimum strength is considered unairworthy and must be re-covered before further flight, even if it appears visually sound."}], "quiz": [{"q": "What synthetic fabric type is commonly used in modern aircraft covering systems?", "choices": ["Cotton", "Linen", "Polyester (e.g., Ceconite/Poly-Fiber)", "Nylon canvas"], "answer": 2, "explain": "Correct answer: Polyester (e.g., Ceconite/Poly-Fiber)."}, {"q": "Why was nitrate dope historically paired with butyrate topcoats?", "choices": ["Nitrate is cheaper only", "Nitrate provides good adhesion, butyrate adds weather/UV resistance", "Butyrate can't be used alone at all", "Color matching purposes only"], "answer": 1, "explain": "Correct answer: Nitrate provides good adhesion, butyrate adds weather/UV resistance."}, {"q": "What is the purpose of reinforcing (surface) tape over rib stitching?", "choices": ["Purely decorative", "Distribute stress and prevent tearing at attachment points", "Increase aircraft weight", "Replace the need for dope"], "answer": 1, "explain": "Correct answer: Distribute stress and prevent tearing at attachment points."}, {"q": "How is fabric strength verified during inspection?", "choices": ["Visual inspection only", "A calibrated punch-type fabric tester", "Tapping with a hammer", "Weighing the fabric"], "answer": 1, "explain": "Correct answer: A calibrated punch-type fabric tester."}, {"q": "What happens if fabric tests below minimum strength?", "choices": ["It's fine if it looks good", "It is unairworthy and must be re-covered", "Add another dope coat and it's fine", "Only needs a logbook note"], "answer": 1, "explain": "Correct answer: It is unairworthy and must be re-covered."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "engine_condition_monitoring", "title": "Engine Condition Monitoring & Trend Analysis", "track": "powerplant", "icon": "&#x1F4C8;", "sections": [{"heading": "Purpose of Trend Monitoring", "body": "Engine condition monitoring tracks key parameters (EGT, oil temperature, oil pressure, fuel flow, vibration, oil consumption) over time to detect gradual degradation before it becomes a failure. A single data point rarely reveals a developing problem, but a trend\u2014such as EGT slowly rising over many flight hours at the same power setting\u2014can indicate developing issues like injector wear, compressor fouling, or turbine deterioration well before they trigger a warning light or in-flight event."}, {"heading": "Oil Analysis (SOAP)", "body": "Spectrometric Oil Analysis Program (SOAP) testing detects trace metal particles suspended in engine oil, identifying wear patterns specific to different engine components (e.g., elevated iron may indicate cylinder/piston wear, elevated copper may indicate bushing or bearing wear). Regular SOAP sampling at consistent intervals (matching oil changes) builds a baseline for each engine; a sudden spike in a particular metal, even if still within a nominal range, is often more significant than a single high absolute reading, because it suggests a rapid change in wear rate."}, {"heading": "Vibration Analysis", "body": "Vibration monitoring, particularly on turbine engines, uses accelerometers to detect imbalance, misalignment, or developing mechanical faults such as bearing wear or blade damage. Vibration signatures are analyzed by frequency; different fault types produce characteristic frequency patterns (e.g., a 1x rotor speed peak often indicates imbalance, while higher-frequency peaks can indicate bearing defects). Sustained vibration above manufacturer limits requires investigation even if the engine otherwise appears to perform normally."}, {"heading": "Borescope and Video Trend Records", "body": "Periodic borescope inspections, recorded on video or as still images with clear reference markers, allow direct visual comparison of internal engine condition (turbine blades, combustor liner, compressor blades) across multiple inspection intervals. Maintaining a photographic/video trend history lets technicians distinguish between a pre-existing minor blemish and genuinely new or progressing damage, preventing both over-reaction to old, stable findings and under-reaction to newly developing defects."}], "quiz": [{"q": "Why is trend monitoring more valuable than a single data point?", "choices": ["It's not, single readings are sufficient", "It reveals gradual degradation before failure occurs", "It reduces the need for oil changes", "It replaces borescope inspections"], "answer": 1, "explain": "Correct answer: It reveals gradual degradation before failure occurs."}, {"q": "What does SOAP testing analyze?", "choices": ["Fuel octane rating", "Trace metal particles in engine oil", "Exhaust gas color", "Cabin air quality"], "answer": 1, "explain": "Correct answer: Trace metal particles in engine oil."}, {"q": "Why can a sudden spike in a wear metal matter even within a nominal range?", "choices": ["It never matters", "It suggests a rapid change in wear rate", "It only affects fuel economy", "It indicates the oil brand is wrong"], "answer": 1, "explain": "Correct answer: It suggests a rapid change in wear rate."}, {"q": "What does a 1x rotor speed vibration peak often indicate?", "choices": ["Normal operation always", "Imbalance", "Fuel contamination", "Low oil pressure"], "answer": 1, "explain": "Correct answer: Imbalance."}, {"q": "Why maintain a photographic/video borescope trend history?", "choices": ["For marketing photos", "To distinguish pre-existing findings from newly progressing damage", "It's not useful", "To replace all inspections"], "answer": 1, "explain": "Correct answer: To distinguish pre-existing findings from newly progressing damage."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "turbocharging_systems", "title": "Turbocharging & Turbo-Normalizing Systems", "track": "powerplant", "icon": "&#x1F300;", "sections": [{"heading": "Turbocharger Operating Principle", "body": "A turbocharger uses exhaust gas energy to spin a turbine wheel, which drives a compressor wheel on the same shaft to compress intake air before it enters the engine, increasing the mass of air (and therefore fuel/air charge) delivered per cycle. Unlike a supercharger, which is mechanically driven off the engine crankshaft and consumes engine power, a turbocharger recovers otherwise-wasted exhaust energy, making it more efficient but introducing exhaust-side heat and lag considerations."}, {"heading": "Turbo-Normalizing vs. Turbocharging", "body": "Turbo-normalized systems use the turbocharger only to restore sea-level-equivalent manifold pressure as altitude increases, typically capping manifold pressure near the engine's sea-level rated value; this extends the altitude at which full rated power is available but does not increase power above sea-level ratings. True turbocharged (turbo-boosted) systems can produce manifold pressures above sea-level normal, providing higher-than-sea-level power output, but require more conservative operating limits and monitoring to avoid overboost damage."}, {"heading": "Wastegate and Overboost Protection", "body": "A wastegate valve diverts a portion of exhaust gas around the turbine wheel to control turbine (and therefore compressor) speed, preventing overboost. Wastegates may be manually controlled, or automatically controlled by a density controller or electronic control unit that senses manifold pressure and adjusts wastegate position to maintain a target pressure. A stuck or malfunctioning wastegate is a common cause of overboost events, which can cause detonation and engine damage if manifold pressure limits are exceeded."}, {"heading": "Turbocharger Inspection and Maintenance", "body": "Turbocharger bearings operate at extremely high rotational speeds and temperatures, requiring reliable oil supply and cooling; oil starvation at shutdown (from turning the engine off abruptly after high-power operation) can cause coking of oil in the hot bearing housing, leading to bearing damage. Inspections check for excessive shaft play, exhaust leaks at turbine housing connections, and proper wastegate operation. Turbocharger failure can allow oil or debris into the intake or exhaust system, so post-failure inspection typically includes checking downstream components for contamination."}], "quiz": [{"q": "What powers a turbocharger's compressor wheel?", "choices": ["Direct crankshaft drive belt", "Exhaust gas energy driving a turbine wheel", "Electric motor", "Hydraulic pump"], "answer": 1, "explain": "Correct answer: Exhaust gas energy driving a turbine wheel."}, {"q": "What is the main difference between turbo-normalizing and turbocharging?", "choices": ["No difference", "Turbo-normalizing restores sea-level pressure only; turbocharging can exceed it", "Turbocharging is always weaker", "Turbo-normalizing uses a supercharger"], "answer": 1, "explain": "Correct answer: Turbo-normalizing restores sea-level pressure only; turbocharging can exceed it."}, {"q": "What does a wastegate control?", "choices": ["Fuel flow", "Turbine/compressor speed by diverting exhaust gas", "Oil pressure", "Propeller pitch"], "answer": 1, "explain": "Correct answer: Turbine/compressor speed by diverting exhaust gas."}, {"q": "What can cause turbocharger bearing coking?", "choices": ["Cold weather operation", "Abrupt shutdown after high-power operation without cooldown", "Using synthetic oil", "Low altitude flight"], "answer": 1, "explain": "Correct answer: Abrupt shutdown after high-power operation without cooldown."}, {"q": "Why check downstream components after a turbocharger failure?", "choices": ["Not necessary", "Failure can release oil/debris into intake or exhaust system", "Only cosmetic concern", "To check paint condition"], "answer": 1, "explain": "Correct answer: Failure can release oil/debris into intake or exhaust system."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "fadec_engine_controls", "title": "FADEC & Electronic Engine Controls", "track": "powerplant", "icon": "&#x1F4BB;", "sections": [{"heading": "FADEC Fundamentals", "body": "Full Authority Digital Engine Control (FADEC) is a computer-based system that fully controls engine operating parameters (fuel flow, ignition timing where applicable, bleed air, variable geometry) without direct mechanical backup in most implementations. FADEC continuously monitors engine sensors (N1/N2 speed, EGT, torque, altitude, temperature) and adjusts fuel scheduling to optimize performance while protecting against exceedances such as overtemperature or overspeed."}, {"heading": "Dual-Channel Redundancy", "body": "Most FADEC systems use dual, independent channels (Channel A and Channel B), each capable of fully controlling the engine, so that a single channel failure does not result in loss of engine control. The system automatically switches to the healthy channel upon detecting a fault, often without pilot action required, and annunciates the fault for crew awareness and maintenance follow-up."}, {"heading": "FADEC Sensor Inputs and Protections", "body": "FADEC relies on accurate sensor data (thermocouples, speed sensors, pressure transducers) to make control decisions; a failed or drifting sensor can cause the FADEC to command an incorrect fuel schedule. Built-in protections include automatic power limiting to prevent exceeding temperature or overspeed limits, and many systems include a fault-tolerant reversion mode that uses alternate sensor data or a simplified control law if primary sensors are lost."}, {"heading": "FADEC Maintenance and Software Considerations", "body": "FADEC maintenance includes verifying proper software configuration/version matches the approved engine configuration, checking sensor wiring and connectors for corrosion or damage (a common source of intermittent faults), and reviewing fault logs stored in the FADEC's non-volatile memory during troubleshooting. Software updates to FADEC systems require strict configuration control, since incorrect software loading can result in improper engine control and is a certification-critical concern."}], "quiz": [{"q": "What does FADEC stand for?", "choices": ["Fixed Automatic Digital Engine Control", "Full Authority Digital Engine Control", "Fast Adaptive Diesel Engine Controller", "Field Adjustable Digital Engine Computer"], "answer": 1, "explain": "Correct answer: Full Authority Digital Engine Control."}, {"q": "Why do most FADEC systems use dual channels?", "choices": ["To save weight", "Redundancy so a single channel failure doesn't cause loss of control", "To reduce cost", "For display purposes only"], "answer": 1, "explain": "Correct answer: Redundancy so a single channel failure doesn't cause loss of control."}, {"q": "What happens with a failed/drifting FADEC sensor?", "choices": ["No effect at all", "FADEC may command an incorrect fuel schedule", "Engine shuts down instantly always", "Only affects cabin displays"], "answer": 1, "explain": "Correct answer: FADEC may command an incorrect fuel schedule."}, {"q": "Where are FADEC fault logs typically stored?", "choices": ["Printed logbook only", "The FADEC's non-volatile memory", "Pilot's personal notes", "Nowhere, they are not recorded"], "answer": 1, "explain": "Correct answer: The FADEC's non-volatile memory."}, {"q": "Why is FADEC software version control certification-critical?", "choices": ["It isn't important", "Incorrect software can cause improper engine control", "Only affects fuel economy slightly", "Software never changes"], "answer": 1, "explain": "Correct answer: Incorrect software can cause improper engine control."}], "faa_ref": "FAA-H-8083-32B \u2014 Aviation Maintenance Technician Handbook: Powerplant"}, {"id": "emergency_equipment_systems", "title": "Emergency Equipment & Evacuation Systems", "track": "airframe", "icon": "&#x1F6A8;", "sections": [{"heading": "Fire Extinguishing Equipment", "body": "Aircraft carry portable fire extinguishers (typically Halon or approved Halon-replacement agents in the cabin/cockpit) and, on larger aircraft, fixed engine/APU fire extinguishing systems using discharge bottles connected to distribution piping in the engine nacelle or APU compartment. Fixed system bottles are pressure-checked and weighed periodically to confirm agent quantity, since a leaking bottle may show correct pressure due to added nitrogen charge, but insufficient extinguishing agent."}, {"heading": "Emergency Evacuation Slides and Rafts", "body": "Evacuation slides are packed in compartments (often in the door sill or a separate external pack) and deploy automatically or manually, inflating rapidly using a compressed gas cylinder. Slide/raft packs require periodic functional inspection and repack per the manufacturer's inspection interval; over-water aircraft carry rafts (sometimes slide/raft combination units) sized for the aircraft's maximum occupancy, and raft equipment (signaling devices, provisions) must be inspected for expiration dates."}, {"heading": "Oxygen and Emergency Lighting", "body": "Emergency oxygen systems (chemical generator or gaseous cylinder-based) supply passenger oxygen masks automatically upon cabin depressurization above a set altitude threshold; chemical oxygen generators produce oxygen through an exothermic chemical reaction and generate significant heat, requiring careful installation clearance from flammable materials. Emergency lighting systems (floor path lighting, exit signs) must have independent battery backup power sufficient to operate for a minimum specified duration after main aircraft power loss."}, {"heading": "Inspection and Servicing Requirements", "body": "Emergency equipment (extinguishers, oxygen bottles, slides, locator transmitters/ELTs) is tracked on a dedicated inspection schedule separate from routine airframe inspections, since expiration dates (for chemical generators, ELT batteries, hydrostatic test dates for cylinders) drive replacement independent of flight hours. A missing, expired, or discharged piece of required emergency equipment typically makes the aircraft unairworthy for the affected operation until corrected."}], "quiz": [{"q": "Why might a fire extinguisher bottle show correct pressure but insufficient agent?", "choices": ["Impossible scenario", "A leak can be masked by the nitrogen charge added for pressurization", "Pressure gauges are inaccurate always", "Agent quantity doesn't matter"], "answer": 1, "explain": "Correct answer: A leak can be masked by the nitrogen charge added for pressurization."}, {"q": "How do most evacuation slides inflate?", "choices": ["Manual foot pump", "Compressed gas cylinder for rapid automatic/manual inflation", "Electric air compressor", "They don't inflate, they're rigid"], "answer": 1, "explain": "Correct answer: Compressed gas cylinder for rapid automatic/manual inflation."}, {"q": "What is a consideration for chemical oxygen generators?", "choices": ["They are always cold", "They produce heat via exothermic reaction, requiring clearance from flammables", "They require electrical power to function", "They never expire"], "answer": 1, "explain": "Correct answer: They produce heat via exothermic reaction, requiring clearance from flammables."}, {"q": "What must emergency lighting systems have?", "choices": ["No backup needed", "Independent battery backup for a minimum specified duration", "Only AC power connection", "Manual crank power only"], "answer": 1, "explain": "Correct answer: Independent battery backup for a minimum specified duration."}, {"q": "What typically drives emergency equipment replacement schedules?", "choices": ["Flight hours only", "Expiration dates independent of flight hours", "Pilot preference", "Random inspection"], "answer": 1, "explain": "Correct answer: Expiration dates independent of flight hours."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}, {"id": "ground_support_equip

ment", "title": "Ground Support Equipment (GSE) Operations", "track": "general", "icon": "&#x1F69A;", "sections": [{"heading": "Ground Power Units (GPUs)", "body": "Ground power units supply external electrical power to the aircraft during maintenance and pre-flight operations without running onboard engines or APU, saving fuel and engine cycles. GPUs must supply correct voltage and frequency matching aircraft electrical system requirements (commonly 28V DC or 115V AC 400Hz for many aircraft types); connecting an incompatible GPU can damage sensitive avionics, so technicians must verify GPU output specifications match the aircraft before connection."}, {"heading": "Ground Air Carts and Air Start Units", "body": "Air carts supply conditioned air for cabin heating/cooling during ground operations, while air start units (ASUs) provide high-pressure compressed air to pneumatically start engines without using the APU or engine-driven starter. ASU output pressure and flow must match the specific engine start requirements; using an undersized or incorrectly regulated air source can result in a failed or hung start."}, {"heading": "Towing and Tug Operations", "body": "Aircraft towing requires a tow bar or towbarless tug rated for the specific aircraft's nose gear or main gear attachment points and weight, with a properly trained tow team including wing-walkers for large aircraft to prevent collision with obstacles. Nose gear steering limits (specified maximum turn angle) must never be exceeded during towing, as forcing the nose gear beyond its steering limit can cause structural damage to the steering mechanism or gear."}, {"heading": "GSE Safety and FOD Prevention", "body": "Ground support equipment left near active aircraft (chocks, stands, carts) not properly secured or stored becomes a foreign object debris (FOD) and collision hazard, particularly in engine intake/exhaust danger zones. GSE operators must maintain safe clearance from wingtips, engine inlets, and control surfaces, and equipment must be inspected for damage, proper tire condition/pressure (for towed carts), and functioning brakes before use around aircraft."}], "quiz": [{"q": "Why must GPU output specifications be verified before connecting to an aircraft?", "choices": ["Not necessary, all GPUs are the same", "Incompatible voltage/frequency can damage sensitive avionics", "GPUs never vary in output", "Only affects lighting"], "answer": 1, "explain": "Correct answer: Incompatible voltage/frequency can damage sensitive avionics."}, {"q": "What does an air start unit (ASU) provide?", "choices": ["Electrical power", "High-pressure compressed air for pneumatic engine starting", "Hydraulic fluid", "Fuel"], "answer": 1, "explain": "Correct answer: High-pressure compressed air for pneumatic engine starting."}, {"q": "What must never be exceeded during aircraft towing?", "choices": ["Tow speed only", "The nose gear steering angle limit", "Fuel quantity", "Cabin temperature"], "answer": 1, "explain": "Correct answer: The nose gear steering angle limit."}, {"q": "Why are wing-walkers used during towing of large aircraft?", "choices": ["Decoration", "To help prevent collision with obstacles", "To check tire pressure", "To operate the tow bar remotely"], "answer": 1, "explain": "Correct answer: To help prevent collision with obstacles."}, {"q": "Why is unsecured GSE near aircraft a hazard?", "choices": ["It isn't a hazard", "It can become FOD or a collision hazard near intakes/exhaust", "Only a cosmetic issue", "It improves ramp organization"], "answer": 1, "explain": "Correct answer: It can become FOD or a collision hazard near intakes/exhaust."}], "faa_ref": "FAA-H-8083-30A \u2014 Aviation Maintenance Technician Handbook: General"}, {"id": "fuel_quantity_indicating", "title": "Fuel Quantity & Indicating Systems", "track": "airframe", "icon": "&#x26FD;", "sections": [{"heading": "Capacitance-Type Fuel Quantity Systems", "body": "Capacitance-type fuel probes use the fuel itself as part of a capacitor's dielectric; as fuel level changes, capacitance changes proportionally (since fuel and air have different dielectric constants), and this signal is processed by a fuel quantity indicating system computer to display quantity. Capacitance systems are common on larger and turbine aircraft because they are relatively insensitive to aircraft attitude changes compared to simple float-type systems, though they still require compensation for fuel density and temperature variations."}, {"heading": "Float-Type and Mechanical Fuel Gauges", "body": "Simpler float-type fuel quantity systems use a float connected to a variable resistor (rheostat) or a mechanically linked indicator; as fuel level changes, the float position changes resistance or gauge needle position accordingly. Float-type systems are common on smaller general aviation aircraft, are simpler and cheaper to maintain, but can be less accurate during maneuvering flight (climbs, turns, descents) since fuel sloshes and the float doesn't reflect an average level."}, {"heading": "Fuel Quantity System Calibration and Density Compensation", "body": "Because fuel is typically measured and billed by volume (gallons/liters) but engines consume fuel by mass, quantity indicating systems for larger aircraft often include a density (compensator) unit that adjusts the displayed reading based on actual fuel density, since fuel density varies with temperature and fuel batch. Systems are calibrated per the aircraft manufacturer's procedure, comparing indicated quantity against a known dripstick or sight-gauge reading at specified fuel levels."}, {"heading": "Fuel Quantity System Troubleshooting", "body": "Common fuel quantity indication faults include probe wiring faults (opens/shorts causing full-scale or zero readings), a failed compensator unit, and probe contamination (water or debris affecting capacitance readings). Troubleshooting typically starts with comparing indicated quantity against a manual dripstick check; a significant discrepancy points to a system fault rather than an actual fuel quantity difference, and isolating individual tank probes (where multiple probes exist per tank) helps pinpoint a faulty unit."}], "quiz": [{"q": "How does a capacitance-type fuel probe sense fuel level?", "choices": ["A float mechanically moves a needle", "Fuel changes the capacitance of the probe (acting as dielectric)", "A radar beam measures distance", "A pressure switch"], "answer": 1, "explain": "Correct answer: Fuel changes the capacitance of the probe (acting as dielectric)."}, {"q": "Why are capacitance systems preferred on larger/turbine aircraft over float systems?", "choices": ["Cheaper always", "Less sensitive to attitude changes", "They require no calibration", "They are lighter"], "answer": 1, "explain": "Correct answer: Less sensitive to attitude changes."}, {"q": "Why do fuel quantity systems need density compensation?", "choices": ["Fuel is billed by volume but consumed by mass, and density varies", "Density never changes", "Only for cosmetic display accuracy", "Not actually needed"], "answer": 1, "explain": "Correct answer: Density never changes."}, {"q": "What is used to verify fuel quantity indication accuracy on the ground?", "choices": ["Guessing based on flight time", "A dripstick or sight-gauge check at known fuel levels", "Asking the fuel truck driver", "Checking tire pressure"], "answer": 1, "explain": "Correct answer: A dripstick or sight-gauge check at known fuel levels."}, {"q": "What does a significant discrepancy between indicated and dripstick-checked quantity suggest?", "choices": ["Normal variation, ignore it", "A system fault rather than an actual quantity difference", "The aircraft needs refueling immediately", "Nothing, it's expected"], "answer": 1, "explain": "Correct answer: A system fault rather than an actual quantity difference."}], "faa_ref": "FAA-H-8083-31 \u2014 Aviation Maintenance Technician Handbook: Airframe"}];

en count", "back": "12 human-factors error precursors"}, {"front": "SHELL model", "back": "Software, Hardware, Environment, Liveware"}, {"front": "Just culture", "back": "Report errors without blame to learn from them"}, {"front": "LOTO", "back": "Lockout/Tagout - isolate energy sources before work"}, {"front": "Hydraulic principle", "back": "Pascal's Law - confined fluid transmits pressure equally"}, {"front": "Skydrol color/type", "back": "Purple phosphate-ester (transport aircraft)"}, {"front": "MIL-H-5606 color", "back": "Red mineral-based hydraulic fluid"}, {"front": "Accumulator", "back": "Stores hydraulic pressure, dampens surges (gas-precharged)"}, {"front": "Oleo strut serviced with", "back": "Nitrogen/air charge + hydraulic fluid"}, {"front": "WOW/squat switch", "back": "Prevents gear retraction on the ground"}, {"front": "Split-rim wheel safety", "back": "Fully deflate tire before removing rim bolts"}, {"front": "Anti-skid", "back": "Modulates brake pressure to prevent wheel lockup"}, {"front": "Approach hot brakes from", "back": "Fore or aft, never the side (explosion risk)"}, {"front": "Pitot senses", "back": "Ram/total pressure (for airspeed)"}, {"front": "Static system drives", "back": "Airspeed, altimeter, VSI"}, {"front": "ADS-B Out", "back": "Broadcasts GPS position for ATC surveillance"}, {"front": "Gyro instrument principles", "back": "Rigidity in space and precession"}, {"front": "91.411 checks", "back": "Altimeter/static system (24-month) test"}, {"front": "Carb ice remedy", "back": "Carburetor heat (warm air)"}, {"front": "Fuel injection vs carb", "back": "No carb ice, better cylinder fuel distribution"}, {"front": "Bleed air source", "back": "Engine compressor section (high-pressure air)"}, {"front": "Fuel tank entry", "back": "Confined space - purge vapors, use attendant"}, {"front": "Type IV de-ice fluid", "back": "Anti-ice fluid with longer holdover time"}, {"front": "Reverse-Current Relay", "back": "Disconnects generator when output drops below bus voltage, preventing battery from motoring it"}, {"front": "Alternator vs Generator", "back": "Alternator produces AC internally then rectifies to DC - lighter, efficient at low RPM"}, {"front": "Essential Bus", "back": "Electrical bus preserving power to critical equipment during a source failure/load shedding"}, {"front": "Trip-Free Breaker", "back": "Opens on a genuine fault even if held/reset - can't be defeated by holding it closed"}, {"front": "Part 147 School", "back": "Structured A&P training program path, ~18-24 months, alternative to 30-month experience path"}, {"front": "Inspection Authorization (IA)", "back": "Added authorization beyond A&P letting a mechanic approve annual inspections/major repairs"}, {"front": "Ply Orientation", "back": "Fiber direction (0/45/90) in a composite laminate - matching original schedule restores load paths"}, {"front": "Honeycomb Water Intrusion", "back": "Moisture trapped in honeycomb core that freeze/thaw cycles can destroy - major sandwich-panel damage mode"}, {"front": "Scarf/Step-Lap Repair", "back": "Tapered composite repair joint used for higher-strength structural repairs per SRM"}, {"front": "Clean Aircraft Concept", "back": "No ice/frost/snow may adhere to critical surfaces before flight"}, {"front": "Anti-Ice vs De-Ice", "back": "Anti-ice prevents ice formation continuously; de-ice removes ice after some accumulation, cyclically"}, {"front": "Pneumatic Deice Boots", "back": "Inflate in a timed cycle to crack and shed accumulated leading-edge ice"}, {"front": "TBO", "back": "Time Between Overhaul - manufacturer recommendation, not automatically an FAA mandate under Part 91"}, {"front": "Rebuilt / Zero-Timed", "back": "Term reserved for manufacturer/agent overhaul resetting logbook time to zero with new/service-limit parts"}, {"front": "Life-Limited Part", "back": "Must be replaced at a specified time/cycle limit regardless of condition"}, {"front": "Time-Continued Part", "back": "Stays in service indefinitely if inspection shows it remains serviceable - no fixed cap"}, {"front": "Four Forces of Flight", "back": "Lift, Weight, Thrust, Drag - balanced in steady level flight"}, {"front": "Critical Angle of Attack", "back": "AOA beyond which the wing stalls, regardless of airspeed"}, {"front": "L/D Max", "back": "Speed of lowest total drag - best glide/range speed"}, {"front": "Load Factor & Stall Speed", "back": "Stall speed increases with the square root of load factor (G)"}, {"front": "Cabin Altitude", "back": "Equivalent pressure altitude maintained inside a pressurized cabin"}, {"front": "Pressure Relief Valve (cabin)", "back": "Protects the fuselage from overpressurization damage"}, {"front": "Oxygen + Hydrocarbon Hazard", "back": "High-pressure O2 with oil/grease creates an explosion risk - use only O2-approved lubricants"}, {"front": "Fuel Control Unit (FCU)", "back": "Schedules turbine engine fuel flow for power, altitude, temperature"}, {"front": "Igniter Plug (turbine)", "back": "High-energy plug used mainly for start and adverse-weather continuous ignition"}, {"front": "N1/N2", "back": "Fan/compressor and turbine spool speeds, shown as % of max"}, {"front": "Engine Trend Monitoring", "back": "Tracking EGT/oil/fuel-flow/vibration over time to catch degradation before failure"}, {"front": "TIG Welding (GTAW)", "back": "Precise inert-gas-shielded welding process standard for modern aircraft repairs"}, {"front": "Welding Approved Data", "back": "Structural aircraft welds must follow FAA-approved processes referencing AC 43.13-1B/SRM"}, {"front": "Stress Relieving", "back": "Post-weld heat treatment restoring proper material properties in hardened steel"}, {"front": "Micrometer thimble - one full turn", "back": "0.025 in (25 thousandths) on a standard 0-1 in mic."}, {"front": "Click-type torque wrench storage rule", "back": "Reset to lowest setting after use to preserve spring calibration."}, {"front": "Feeler gauge use", "back": "Checks small, exact gaps like v s errors the original mechanic may miss."}, {"front": "Dye penetrant inspection use", "back": "Detects surface-breaking cracks on non-porous materials like aluminum and steel."}, {"front": "Magnetic particle inspection limitation", "back": "Only works on ferromagnetic materials (e.g., steel) - not aluminum or titanium."}, {"front": "Eddy current inspection strength", "back": "Detects surface/near-surface flaws, especially around fastener holes."}, {"front": "Ultrasonic inspection principle", "back": "Sound wave reflections reveal internal/subsurface flaws and thickness loss."}, {"front": "Pneumatic boot ice removal", "back": "Sequenced inflation/deflation cracks and sheds accumulated ice."}, {"front": "Ice bridging risk", "back": "Cycling deice boots too early can form an ice shell the boot can no longer break."}, {"front": "TBO definition", "back": "Time Between Overhaul - manufacturer-recommended hours before engine overhaul."}, {"front": "Break-in procedure purpose", "back": "Properly seats new rings against cylinder walls, preventing glazing and excess oil use."}, {"front": "Turbine modular construction benefit", "back": "A failed module can be repaired/replaced without full engine teardown."}, {"front": "On-condition maintenance", "back": "Maintenance driven by inspection/trend data rather than a fixed overhaul interval."}, {"front": "Life-limited parts (LLPs)", "back": "Rotating parts like disks/shafts with hard cyclic/hourly limits from fatigue analysis."}, {"front": "Borescope", "back": "Instrument inserted through access ports to visually inspect internals without disassembly."}, {"front": "Galvanic corrosion cause", "back": "Two dissimilar metals in contact with an electrolyte (e.g., moisture)."}, {"front": "Intergranular corrosion", "back": "Attacks grain boundaries inside the metal; often invisible from the surface until advanced."}, {"front": "Corrosion removal limits reference", "back": "The Structural Repair Manual (SRM)."}, {"front": "Pascal's Law", ng) it onto the conductor with a specified tool and die."}, {"term": "Critical AOA", "def": "Angle of attack beyond which the wing stalls"}, {"term": "Datum", "def": "Reference plane for weight-and-balance measurements"}, {"term": "De-Ice System", "def": "Cyclically removes ice after limited accumulation"}, {"term": "Density Compensator", "def": "Fuel quantity system component adjusting displayed quantity for fuel density variation."}, {"term": "Dial Indicator", "def": "A precision instrument that measures small linear displacements, used for runout and alignment checks."}, {"term": "Dirty Dozen", "def": "12 human-factors precursors to maintenance error"}, {"term": "DME", "def": "Designated Mechanic Examiner - administers A&P practical tests"}, {"term": "Doubler", "def": "An external reinforcement patch used in sheet metal repair to restore strength and stiffness across a damaged area."}, {"term": "Dripstick", "def": "Calibrated manual dipstick used to verify fuel quantity indication accuracy."}, {"term": "Dry-Sump Oil System", "def": "An oil system using a separate external oil tank, common in aerobatic/high-performance engines."}, {"term": "Dual-Channel Redundancy", "def": "Two independent control channels ensuring continued control after a single failure."}, {"term": "Duplicate Inspection", "def": "A required second, independent inspection of critical flight control work before return to service."}, {"term": "Dye Penetrant Inspection", "def": "NDI method revealing surface-breaking cracks in non-porous materials using capillary-drawn dye."}, {"term": "Eddy Current Inspection", "def": "NDI method using induced electrical currents to detect surface/near-surface flaws in conductive material."}, {"term": "EGT", "def": "Exhaust Gas Temperature - critical turbine limit"}, {"term": "EGT (Exhaust Gas Temperature)", "def": "A turbine engine parameter indicating the thermal condition of combustion and the turbine section."}, {"term": "EGT Margin", "def": "Difference between current and limit EGT, tracked for engine health trending"}, {"term": "Engine Trend Monitoring", "def": "A program tracking engine parameters over time at comparable conditions to detect gradual deterioration before it becomes a limit exceedance."}, {"term": "EPR (Engine Pressure Ratio)", "def": "A turbine engine parameter representing the ratio of turbine discharge pressure to compressor inlet pressure, used as a power indicator on some engines."}, {"term": "Essential Bus", "def": "Circuit bus preserving power to critical equipment during a failure"}, {"term": "Evacuation Slide", "def": "Compressed-gas-inflated slide for rapid passenger emergency egress."}, {"term": "Exfoliation", "def": "Corrosion that lifts metal in layers/flakes"}, {"term": "Fabric Punch Tester", "def": "Calibrated instrument measuring force to punch through covering fabric, checked against minimum strength."}, {"term": "FADEC", "def": "Full Authority Digital Engine Control"}, {"term": "Fairlead", "def": "A guide that keeps a control cable aligned and prevents excessive rubbing as it passes through structure."}, {"term": "Fatigue Risk Management", "def": "Practices (rest periods, workload planning, self-reporting) to reduce fatigue-related error risk."}, {"term": "Feathering", "def": "Rotating propeller blades to a near edge-on angle to minimize drag, typically after engine failure."}, {"term": "Filiform", "def": "Thread-like corrosion under coatings"}, {"term": "Filter Bypass Valve", "def": "A valve that allows oil to bypass a clogged filter (unfiltered) to prevent oil starvation."}, {"term": "Flat-Rating", "def": "Designing an engine to deliver a fixed thrust rating up to a specified outside air temperature threshold."}, {"term": "FOD", "def": "Foreign Object Damage/Debris"}, {"term": "Foreign Object Damage (FOD)", "def": "Damage to engine components caused by ingestion or impact of foreign objects such as debris, ice, or tools."}, {"term": "Form 337", "def": "FAA form documenting major repairs/alterations"}, {"term": "Fuel Control Unit (FCU)", "def": "Meters turbine fuel flow per power/altitude/temperature"}, {"term": "Galvanic Corrosion", "def": "Corrosion between dissimilar metals with electrolyte"}, {"term": "Governor", "def": "Maintains constant prop RPM by adjusting blade angle"}, {"term": "Ground Loop", "def": "An uncontrolled swerve/rotation on the ground, more common with tailwheel gear configurations."}, {"term": "Ground Power Unit (GPU)", "def": "External power source supplying aircraft electrical power during ground operations."}, {"term": "GTAW (TIG)", "def": "Gas Tungsten Arc Welding; uses non-consumable tungsten electrode and inert gas shielding."}, {"term": "High-Bypass Turbofan", "def": "A turbofan with a high ratio of fan-bypassed air to core air, optimized for subsonic fuel efficiency."}, {"term": "High-Resistance Fault", "def": "A degraded electrical connection (corrosion, loose crimp) that impedes current flow without fully opening the circuit."}, {"term": "Hot Start", "def": "An abnormal turbine start condition where exhaust gas temperature exceeds limits, often from excess fuel introduced too soon."}, {"term": "Hung Start", "def": "An abnormal turbine start condition where the engine stabilizes at a low RPM below idle without further acceleration."}, {"term": "IA", "def": "Inspection Authorization - annuals and major work approval"}, {"term": "IA (Inspection Authorization)", "def": "Added mechanic authorization to approve annuals/major repairs"}, {"term": "Ice Bridging", "def": "A failure mode where deicing boots cycled too early allow an unbroken ice shell to form over them."}, {"term": "Ignition Exciter", "def": "Provides high-energy pulses to turbine igniter plugs"}, {"term": "Ignition Timing", "def": "The specified point (in degrees before top dead center) at which the spark plug fires relative to piston position."}, {"term": "Impulse Coupling", "def": "A mechanism on a magneto that retards timing and boosts spark energy during engine starting."}, {"term": "Induced Drag", "def": "Drag from lift generation/wingtip vortices, decreases with speed"}, {"term": "Inspection Authorization (IA)", "def": "FAA certificate allowing approval of annual inspections for return to service."}, {"term": "Intergranular", "def": "Corrosion along a metal's grain boundaries"}, {"term": "ITT", "def": "Interstage Turbine Temperature - engine limit gauge"}, {"term": "Jack Point", "def": "A manual-specified structural location designed to safely support an aircraft's weight when jacked."}, {"term": "L/D Max", "def": "Speed giving lowest total drag - best glide/range"}, {"term": "Life-Limited Part", "def": "Component with a mandatory hard replacement time/cycle limit"}, {"term": "Life-Limited Part (LLP)", "def": "A part with a hard cyclic/hourly retirement limit based on fatigue life analysis, regardless of condition."}, {"term": "Light-Off", "def": "The point during engine start when combustion becomes established, indicated by rising EGT and RPM."}, {"term": "Line Replaceable Unit (LRU)", "def": "A modular avionics or system component designed for quick removal/replacement at the line maintenance level."}, {"term": "Load Factor", "def": "Ratio of aerodynamic lift to aircraft weight (in Gs)"}, {"term": "Load Shedding", "def": "Disconnecting non-essential loads to preserve power for critical systems"}, {"term": "Longeron", "def": "Major lengthwise structural member in fuselage"}, {"term": "LOTO", "def": "Lockout/Tagout - energy isolation procedure"}, {"term": "Magnetic Particle Inspection", "def": "NDI method using magnetized parts and iron particles to reveal cracks in ferromagnetic materials."}, {"term": "Magneto", "def": "Self-contained ignition generator for recip engines"}, {"term": "Milliohmmeter", "def": "Precision low-resistance meter used for bonding and continuity checks."}, {"term": "Mixture Control", "def": "A control that adjusts the fuel-to-air ratio, typically leaned at altitude to compensate for reduced air density."}, {"term": "Modular Engine Construction", "def": "Turbine engine design built from independently removable/replaceable sections (fan, compressor, combustor, turbine)."}, {"term": "Moment", "def": "Weight multiplied by arm (torque about datum)"}, {"term": "Monocoque", "def": "Structure where skin carries all loads"}, {"term": "MTOW", "def": "Maximum Takeoff Weight"}, {"term": "N1 / N2", "def": "Turbine spool speeds shown as percent of maximum"}, {"term": "N1/N2", "def": "Low/high-pressure spool speeds (percent RPM)"}, {"term": "NDT", "def": "Non-Destructive Testing"}, {"term": "Neutral Flame", "def": "Oxy-acetylene flame with equal oxygen and acetylene, preferred for steel welding."}, {"term": "Oleo Strut", "def": "Air-oil shock absorber in landing gear"}, {"term": "Open-Center Hydraulic System", "def": "A system where fluid circulates continuously at low pressure when no actuator is commanded."}, {"term": "Otto Cycle", "def": "Thermodynamic cycle of 4-stroke recip engines"}, {"term": "Outflow Valve", "def": "A valve that regulates the rate of air escaping a pressurized cabin to control cabin pressure."}, {"term": "Overboost", "def": "Manifold pressure exceeding safe limits, risking detonation and engine damage."}, {"term": "Overspeed Governor", "def": "A backup governor/limiter that protects against propeller RPM exceeding safe limits if the primary governor fails."}, {"term": "P-Lead", "def": "The grounding/shorting lead on a magneto that, when connected, allows the ignition switch to disable the magneto; if broken, the magneto may still fire."}, {"term": "Parasite Drag", "def": "Drag from form/skin friction/interference, increases with speed squared"}, {"term": "Pascal", "def": "Pressure in confined fluid transmits equally"}, {"term": "Pascal's Law", "def": "Pressure applied to a confined fluid is transmitted equally in all directions."}, {"term": "Pitot", "def": "Probe sensing ram/total pressure for airspeed"}, {"term": "Pitot Heat", "def": "Electric heating element preventing pitot tube ice blockage"}, {"term": "Pitting Corrosion", "def": "Localized corrosion forming small pits, often occurring under coatings or in crevices."}, {"term": "Pneumatic Deicing Boots", "def": "Inflatable rubber boots on leading edges that cyclically inflate/deflate to crack and shed ice buildup."}, {"term": "Precession", "def": "Gyro response 90 deg from an applied force"}, {"term": "Rectifier", "def": "Converts AC to DC, used in alternators"}, {"term": "Rib Stitching", "def": "Lock-stitch method of attaching fabric covering to wing ribs."}, {"term": "Rigidity", "def": "A spinning gyro's tendency to stay fixed in space"}, {"term": "RTS", "def": "Return to Service - formal airworthiness approval"}, {"term": "Sandwich Structure", "def": "Face sheets bonded to a lightweight core (honeycomb) for stiffness-to-weight"}, {"term": "Scarf Repair", "def": "Tapered composite repair joint restoring structural strength"}, {"term": "Semi-monocoque", "def": "Skin + frames + stringers (modern standard)"}, {"term": "Service Bulletin (SB)", "def": "Manufacturer-issued recommendation, not mandatory unless referenced by an AD."}, {"term": "SHELL", "def": "Human-factors model: Software/Hardware/Environment/Liveware"}, {"term": "SHELL Model", "def": "A human factors framework: Software, Hardware, Environment, Liveware (people)."}, {"term": "Skydrol", "def": "Phosphate-ester hydraulic fluid - corrosive"}, {"term": "SOAP", "def": "Spectrometric Oil Analysis Program"}, {"term": "SOAP (Oil Analysis)", "def": "Spectrometric Oil Analysis Program; detects trace wear metals in engine oil."}, {"term": "Spar", "def": "Primary wing beam carrying bending loads"}, {"term": "Spectrometric Oil Analysis (SOA)", "def": "An oil test detecting trace wearing metal particles to reveal developing component wear."}, {"term": "Squat Switch", "def": "Weight-on-wheels sensor (see WOW)"}, {"term": "Squib", "def": "An explosive discharge cartridge used to release fire-extinguishing agent from a bottle; has a service-life limit."}, {"term": "SRM", "def": "Structural Repair Manual"}, {"term": "Static Discharger", "def": "Device (static wick) that bleeds off airframe static charge to reduce radio interference."}, {"term": "Static Port", "def": "Opening sensing ambient pressure for instruments"}, {"term": "STC", "def": "Supplemental Type Certificate - approved modification"}, {"term": "Stop-Drilling", "def": "Drilling a small hole at a crack tip to remove the stress concentration and arrest crack propagation."}, {"term": "Stress Relieving", "def": "Post-weld heat treatment restoring material properties"}, {"term": "Sump Drain", "def": "Low-point drain to remove water/sediment from tanks"}, {"term": "TBO", "def": "Time Between Overhaul"}, {"term": "TBO (Time Between Overhaul)", "def": "Manufacturer-recommended operating hours before an engine overhaul is due."}, {"term": "TCDS", "def": "Type Certificate Data Sheet - approved config and limits"}, {"term": "Tensiometer", "def": "Measures control cable tension"}, {"term": "Test Cell", "def": "A controlled facility with calibrated instrumentation used to verify an overhauled engine's performance against factory specs."}, {"term": "Thermal Runaway", "def": "Cascading Ni-Cad overheat - fire risk"}, {"term": "TIG Welding", "def": "Inert-gas-shielded precision welding process (GTAW)"}, {"term": "Time-Continued Part", "def": "Part reused indefinitely if inspection confirms it's still serviceable"}, {"term": "Tool Control Program", "def": "A shop system (shadow boards, sign-out logs) ensuring every tool is accounted for, preventing FOD."}, {"term": "Torque Wrench", "def": "Applies precise rotational force to fasteners"}, {"term": "Trend Monitoring", "def": "Tracking engine parameters over time to detect gradual degradation before failure."}, {"term": "Trim Run", "def": "An on-aircraft engine run after maintenance that adjusts fuel control/FADEC parameters and confirms performance margins."}, {"term": "Turbo-Normalizing", "def": "Turbocharging limited to restoring sea-level-equivalent manifold pressure at altitude."}, {"term": "Turbocharger", "def": "Exhaust-driven turbine/compressor assembly that increases intake air density."}, {"term": "Turnbuckle", "def": "Adjusts cable tension (must be safetied)"}, {"term": "Ultrasonic Inspection", "def": "NDI method using high-frequency sound wave reflections to detect internal or subsurface flaws."}, {"term": "Uplock/Downlock", "def": "Mechanical locks that secure retractable landing gear in the up or down position."}, {"term": "Useful Load", "def": "Max weight minus empty weight (fuel + payload)"}, {"term": "Vernier Caliper", "def": "A measuring tool using a sliding vernier scale for readings typically to 0.001 in."}, {"term": "Voltage Regulator", "def": "Holds generator/alternator output voltage constant despite RPM/load changes"}, {"term": "VSI", "def": "Vertical Speed Indicator (static-driven)"}, {"term": "Wastegate", "def": "Valve diverting exhaust gas around the turbine to control boost and prevent overboost."}, {"term": "Wet-Sump Oil System", "def": "An oil system storing oil in a pan/sump directly below the engine."}, {"term": "WOW Switch", "def": "Weight-On-Wheels switch - ground/air detection"}, {"term": "Zero-Timed", "def": "Logbook reset to zero hours - only valid when done by mfr/agent per rebuild rules"}, {"term": "Zonal Inspection", "def": "Inspection organized by physical aircraft zones"}, {"term": "Bypass Pin", "def": "Pin that disconnects nosewheel steering linkage for towing"}, {"term": "Constant-Speed Prop", "def": "Propeller whose governor varies blade pitch to hold set RPM"}, {"term": "Delamination", "def": "Separation between layers in a composite laminate"}, {"term": "Disbond", "def": "Loss of adhesive bond between composite/honeycomb layers"}, {"term": "Electrolyte", "def": "Conductive fluid enabling galvanic/battery chemical reactions"}, {"term": "Error Chain", "def": "Series of small contributing factors combining into an incident"}, {"term": "Firing Order", "def": "Sequence in which engine cylinders fire to balance power delivery"}, {"term": "Governor (prop)", "def": "Device that adjusts propeller blade pitch to maintain selected RPM"}, {"term": "Hot Section", "def": "Combustor, turbine, and exhaust area of a gas turbine engine"}, {"term": "Relief Valve", "def": "Hydraulic/pneumatic valve limiting maximum system pressure"}, {"term": "Safety Net (human factors)", "def": "Independent process check (e.g., buy-back inspection) that catches errors"}, {"term": "Setback (sheet metal)", "def": "Distance from bend tangent line to the mold line, used in flat layout"}, {"term": "Specific Gravity", "def": "Ratio used to gauge battery electrolyte state of charge via hydrometer"}, {"term": "Track (propeller)", "def": "Alignment of blade tip paths - mismatch causes vibration"}, {"term": "Type IV Fluid", "def": "Thickened, unheated anti-icing fluid providing extended holdover time"}];
const SIMS=[{"id": "wb", "title": "Weight & Balance", "icon": "&#x2696;", "cat": "General", "desc": "Add loading stations, compute CG and check the envelope."}, {"id": "ohm", "title": "Ohm's Law & Power", "icon": "&#x26A1;", "cat": "Electrical", "desc": "Solve any two of Voltage, Current, Resistance, Power."}, {"id": "disp", "title": "Cylinder Displacement", "icon": "&#x1F527;", "cat": "Powerplant", "desc": "Compute engine displacement from bore, stroke, cylinders."}, {"id": "cr", "title": "Compression Ratio", "icon": "&#x1F6E2;", "cat": "Powerplant", "desc": "Compute CR from cylinder + clearance volume."}, {"id": "gas", "title": "Gas Law Solver", "icon": "&#x1F4A8;", "cat": "General", "desc": "Boyle, Charles, and Combined gas-law solver (absolute temp)."}, {"id": "bend", "title": "Sheet Metal Bend", "icon": "&#x1F4D0;", "cat": "Airframe", "desc": "Bend allowance, setback, and bend deduction for a layout."}, {"id": "diffcomp", "title": "Differential Compression", "icon": "&#x1F52C;", "cat": "Powerplant", "desc": "Interpret a cylinder leak-down reading and locate the leak."}, {"id": "torque", "title": "Torque Wrench Extension", "icon": "&#x1F529;", "cat": "General", "desc": "Compute the dial/gauge reading when using an extension/adapter on a torque wrench."}, {"id": "densalt", "title": "Density Altitude", "icon": "&#x1F321;", "cat": "General", "desc": "Estimate density altitude from field elevation, altimeter setting, and OAT."}, {"id": "vdrop", "title": "Wire Size & Voltage Drop", "icon": "&#x1F50C;", "cat": "Electrical", "desc": "Check voltage drop for a wire run and whether the gauge is adequate."}, {"id": "fuelplan", "title": "Fuel Endurance Planner", "icon": "&#x26FD;", "cat": "Powerplant", "desc": "Compute flight endurance and range from usable fuel and burn rate."}, {"id": "rivspace", "title": "Rivet Spacing Checker", "icon": "&#x1F4CF;", "cat": "Airframe", "desc": "Check rivet pitch and edge distance against standard minimums for a given diameter."}, {"id": "battery", "title": "Battery Capacity & C-Rate", "icon": "&#x1F50B;", "cat": "General", "desc": "Compute discharge current, run time, and C-rate for aircraft batteries."}, {"id": "stallv", "title": "Stall Speed & Load Factor", "icon": "&#x2708;", "cat": "Airframe", "desc": "Compute stall speed change with bank angle / load factor (n)."}, {"id": "tas", "title": "True Airspeed Calculator", "icon": "&#x1F4A8;", "cat": "General", "desc": "Estimate true airspeed from calibrated airspeed, pressure altitude, and temperature."}, {"id": "proprpm", "title": "Propeller Tip Speed & RPM Limit", "icon": "&#x1F300;", "cat": "Powerplant", "desc": "Compute propeller blade tip speed and check against the transonic tip-speed caution zone."}, {"id": "loadfactor", "title": "Load Factor & Turn Stall Speed", "icon": "&#x1F504;", "cat": "General", "desc": "Compute load factor (G) in a level turn and the resulting increase in stall speed."}, {"id": "sfc", "title": "Specific Fuel Consumption Estimator", "icon": "&#x26FD;", "cat": "Powerplant", "desc": "Estimate specific fuel consumption (SFC) from fuel flow and power/thrust output."}, {"id": "hydforce", "title": "Hydraulic Force & Pressure (Pascal's Law)", "icon": "&#x1F527;", "cat": "Airframe", "desc": "Compute output force, pressure, or piston area in a hydraulic system using Pascal's Law and mechanical advantage between two pistons."}, {"id": "oilconsum", "title": "Oil Consumption Rate Estimator", "icon": "&#x1FAA3;", "cat": "Powerplant", "desc": "Estimate engine oil consumption rate in quarts per hour from oil added and elapsed flight/run time."}, {"id": "cabindiff", "title": "Cabin Differential Pressure", "icon": "&#x1F6EB;", "cat": "Airframe", "desc": "Compute cabin differential pressure from cabin altitude and aircraft altitude, and check it against a structural limit."}, {"id": "wireamp", "title": "Wire Ampacity Check", "icon": "&#x1F50C;", "cat": "General", "desc": "Compare a circuit's expected current draw against a wire's rated ampacity to flag undersized wiring."}, {"id": "battcap", "title": "Battery Capacity Check", "icon": "\ud83d\udd0b", "cat": "General", "desc": "Compute a battery's remaining capacity percentage from a discharge test and compare it to the serviceability threshold."}, {"id": "mixlean", "title": "Mixture Leaning Estimator", "icon": "\u26fd", "cat": "Powerplant", "desc": "Estimate the recommended fuel-air mixture lean percentage based on density altitude."}, {"id": "jackload", "title": "Jack Load Distribution", "icon": "\ud83c\udfd7", "cat": "General", "desc": "Estimate the load on each jack point given aircraft weight, CG position, and jack point locations for a simple 3-point jacking setup."}, {"id": "egtmargin", "title": "Turbine EGT Margin Tracker", "icon": "\ud83d\udcc8", "cat": "Powerplant", "desc": "Compute the margin between current EGT and the redline limit, and flag a shrinking margin trend."}, {"id": "bondres", "title": "Bonding Resistance Checker", "icon": "\ud83d\udd0c", "cat": "Airframe", "desc": "Enter a measured bonding resistance and compare it against typical pass/fail thresholds for general structure versus fuel-system bonding."}, {"id": "fabtest", "title": "Fabric Strength Margin", "icon": "\ud83e\ude79", "cat": "Airframe", "desc": "Compare a punch-tester fabric strength reading against the minimum required strength to determine remaining margin before re-covering is required."}, {"id": "boostmargin", "title": "Turbo Overboost Margin", "icon": "\ud83d\udca8", "cat": "Powerplant", "desc": "Compare current manifold pressure against the redline limit to estimate overboost margin and flag unsafe operation."}, {"id": "fueldensity", "title": "Fuel Quantity Density Correction", "icon": "\u26fd", "cat": "Airframe", "desc": "Convert a fuel volume reading (gallons) to mass (pounds) using actual fuel density, useful for weight-and-balance cross-checks against volume-based gauges."}];
const REFERENCE=[{"cat": "Formulas", "title": "Ohm's Law Wheel", "body": "<b>E = I x R</b> &middot; <b>P = I x E</b> &middot; P = I&sup2;R = E&sup2;/R. Series: Rt = R1+R2+... Parallel: 1/Rt = 1/R1+1/R2+..."}, {"cat": "Formulas", "title": "Engine Math", "body": "Displacement = (pi/4) x bore&sup2; x stroke x #cyl. Compression Ratio = V(BDC)/V(TDC). BHP = (Torque x RPM)/5252."}, {"cat": "Formulas", "title": "Weight & Balance", "body": "Moment = Weight x Arm. CG = total moment / total weight. Useful load = max weight - empty weight."}, {"cat": "Formulas", "title": "Gas Laws", "body": "Boyle: P1V1 = P2V2. Charles: V1/T1 = V2/T2. Combined: P1V1/T1 = P2V2/T2. Always use absolute temperature (K or R)."}, {"cat": "Formulas", "title": "Sheet Metal", "body": "Setback = K x (radius + thickness), K=1 for 90 deg. Bend Allowance = (0.01743 x R + 0.0078 x T) x degrees. Min bend radius from alloy/temper chart."}, {"cat": "Hardware", "title": "Rivet Alloy Codes", "body": "<b>A</b>=1100 &middot; <b>AD</b>=2117-T3 (most common, drive as-is) &middot; <b>D</b>=2017 &middot; <b>DD</b>=2024-T4 (ice-box) &middot; <b>B</b>=5056 (magnesium). Head: AN470 universal, AN426 100-deg flush."}, {"cat": "Hardware", "title": "Aluminum Alloys", "body": "2024-T3 fatigue/skins. 7075-T6 highest strength/spars. 6061-T6 corrosion-resistant/weldable. Alclad = pure-Al cladding for corrosion."}, {"cat": "Hardware", "title": "Bolt / Thread Basics", "body": "AN/MS/NAS. Grip must match joint thickness (1-3 threads showing). AN fittings = 37-deg flare (never mix with 45-deg auto). Positive locking required: safety wire, cotter pin, self-locking nut."}, {"cat": "Fluids", "title": "Hydraulic Fluids", "body": "MIL-H-5606 = red mineral. MIL-H-83282 = red fire-resistant mineral. Skydrol = purple phosphate-ester (transport, corrosive, PPE). NEVER mix types - destroys seals."}, {"cat": "Fluids", "title": "Fuel Colors", "body": "Avgas 80 = red. 100LL = blue. 100 = green. Jet-A = clear/straw. Confirm grade before fueling; check sumps for water."}, {"cat": "NDT", "title": "NDT Method Picker", "body": "Dye penetrant: surface cracks, non-porous. Magnetic particle: ferrous only, surface/near-surface. Eddy current: conductive, surface/subsurface. Ultrasonic: internal/thickness. Radiography: internal, needs safety."}, {"cat": "Powerplant", "title": "Differential Compression", "body": "Air out exhaust = exhaust valve. Air out intake/carb = intake valve. Air out breather/oil filler = worn rings. Typical minimum 60/80 (check TCDS/mfr)."}, {"cat": "Powerplant", "title": "Turbine Start Faults", "body": "Hot start = EGT/ITT over limit. Hung start = lights but won't reach idle. No start = no light-off. Watch N1/N2 rise and fuel scheduling."}, {"cat": "Powerplant", "title": "Magneto Check", "body": "Excessive RPM drop = fouled plugs / faulty mag / bad timing. No drop = grounding (P-lead) fault - hot mag hazard. RPM rise on one mag = over-rich or plug issue."}, {"cat": "Regs", "title": "Key CFR Parts", "body": "Part 43 = maintenance/preventive/alteration. Part 65 = mechanic certification. Part 91 = general operating rules. 43.9 = records for maint. 43.11 = inspection records. Form 337 = major repair/alteration."}, {"cat": "Regs", "title": "43.9 Record Entry", "body": "Required: description of work, date completed, name of person doing work, signature + certificate number + kind of certificate held. RTS approval = return to service."}, {"cat": "Safety", "title": "Fire Class & Extinguisher", "body": "A = ordinary combustibles. B = flammable liquids. C = electrical. D = combustible metals (magnesium!). Match the class or make it worse."}, {"cat": "Safety", "title": "Dirty Dozen", "body": "Communication, complacency, knowledge, distraction, teamwork, fatigue, resources, pressure, assertiveness, stress, awareness, norms - the 12 human-factors error precursors."}, {"cat": "General", "title": "DME Exam Day Checklist", "body": "<b>Bring:</b> Government photo ID, IACRA confirmation number / Airman Knowledge Test report showing passing scores (valid 24 months), completed 8610-2 application, logbook entries proving experience (or 147 school graduation certificate), and payment for the DME/DAR fee. <b>Also bring:</b> your own tools for the practical portion (check with your DME on required list), safety glasses, coveralls, and any approved data / AC 43.13-1B you plan to reference. <b>Before you go:</b> confirm the appointment time/location 24-48hrs ahead, get a full night's sleep, and arrive 15+ minutes early. <b>During the Oral:</b> think out loud, cite your source (handbook/AC/manual) for every answer, and it's OK to look references up - examiners want to see you know WHERE to find the answer, not just memorize it. <b>During the Practical:</b> narrate what you're doing and why as you work; treat every task like a real job with proper documentation."}, {"cat": "Formulas", "title": "Torque Wrench w/ Extension", "body": "TW = TE x (L / (L + A)). TW=wrench setting, TE=target (true) torque, L=wrench handle length, A=extension length beyond the wrench's drive. Always measure L from the wrench's pivot/square drive to the handle grip center."}, {"cat": "Formulas", "title": "Density Altitude (rule of thumb)", "body": "Pressure Altitude = Field Elevation + [(29.92 - Altimeter Setting) x 1000]. Density Altitude &asymp; Pressure Altitude + [120 x (OAT - ISA Temp at that altitude)]. High density altitude = reduced engine/prop performance."}, {"cat": "Formulas", "title": "Voltage Drop", "body": "Vdrop = I x R(wire). Max recommended drop is typically 2% (avionics/critical) to 5-10% (general) of source voltage over the full circuit length (there and back). Check wire tables (AWG vs length vs current) in AC 43.13-1B Ch.11."}, {"cat": "Hardware", "title": "Standard Torque Striping", "body": "Torque-seal / paint stripe across a fastener and adjacent structure after final torque - a broken or misaligned stripe on later inspection flags a fastener that has loosened or been disturbed."}, {"cat": "Regs", "title": "Logbook Entry Example (43.9)", "body": "\"Removed L/H main gear tire P/N 123-456, installed new S/N 789 IAW AMM 32-45-11. Ops check normal. No defects noted.\" &mdash; Date, Total Time, and mechanic's Name/Cert#/Type + signature must follow."}, {"cat": "Regs", "title": "AD Compliance Record Example", "body": "\"Complied with AD 2024-12-08 para (f)(1) by visual inspection of wing spar IAW AD instructions. No cracking found. Next due: 500 hrs or 12 months, whichever occurs first.\" Must reference the AD number, method of compliance, and recurring interval if any."}, {"cat": "Electrical", "title": "Common Wire Gauges (AWG)", "body": "22 AWG: ~7A. 20 AWG: ~11A. 18 AWG: ~16A. 16 AWG: ~22A. 14 AWG: ~32A. 12 AWG: ~41A (continuous, free air, exact rating varies by insulation/bundle/altitude - always confirm in AC 43.13-1B wire tables)."}, {"cat": "Powerplant", "title": "Density Altitude Effects", "body": "High density altitude (hot, high elevation, low pressure) reduces air density &rarr; less power, less prop efficiency, longer takeoff roll, reduced climb. Always check performance charts, not just gut feel, on hot/high days."}, {"cat": "Formulas", "title": "Fuel Endurance", "body": "Endurance (hr) = Usable Fuel (gal) / Burn Rate (gal/hr). Range (nm) &asymp; Endurance x Groundspeed. Always plan a reserve (commonly 30-45 min VFR/IFR per part/ops rules) - never plan to the last drop."}, {"cat": "Formulas", "title": "Rivet Spacing Minimums", "body": "Minimum edge distance &asymp; 2x rivet diameter. Minimum pitch (row spacing along a line) &asymp; 3x rivet diameter (typical general guidance - always confirm against the specific structural repair manual for the actual aircraft)."}, {"cat": "Electrical", "title": "Alternator vs Generator Quick Compare", "body": "Generator: DC output directly, heavier, brushes carry full output current, poor low-RPM output. Alternator: AC internally rectified to DC, lighter, brushes carry only field current, good output at low RPM."}, {"cat": "Regs", "title": "A&P Eligibility Paths", "body": "Path 1: Part 147 school graduate (structured curriculum). Path 2: 30 months documented hands-on experience (or military equivalency). Both require passing General + Airframe and/or Powerplant written/oral/practical tests."}, {"cat": "Powerplant", "title": "Overhaul Terminology", "body": "<b>Overhauled</b> = inspected/reworked to service limits. <b>Rebuilt/zero-timed</b> = manufacturer/agent only, new/service-limit parts, logbook reset to zero. <b>Repaired</b> = fixed a specific defect, not a full overhaul."}, {"cat": "Airframe", "title": "Composite Damage Classification", "body": "Cosmetic (no repair needed) &rarr; Repairable per SRM (follow ply schedule/cure exactly) &rarr; Requires engineering disposition/OEM approval (major structural damage beyond standard repair limits)."}, {"cat": "Safety", "title": "Ice Protection System Types", "body": "Pneumatic boots (cyclic inflate/deflate), bleed-air thermal (turbine engines, continuous), electrothermal (props/pitot/windshields, cyclic or continuous). Match protection type to the aircraft - never assume a system is anti-ice vs de-ice without checking the AFM."}, {"cat": "Hardware", "title": "Life-Limited vs Time-Continued", "body": "Life-limited: hard replacement at a specified time/cycle no matter the condition (e.g., certain crankshafts, turbine disks). Time-continued: stays in service indefinitely as long as inspection shows it's serviceable - no fixed cap."}, {"cat": "Formulas", "title": "Battery C-Rate", "body": "C-Rate expresses charge/discharge current relative to capacity: Current (A) = C-Rate x Capacity (Ah). A 1C discharge on a 40 Ah battery = 40 A. Run time (hr) &asymp; Capacity (Ah) / Discharge Current (A), derated for real-world efficiency losses and temperature."}, {"cat": "Formulas", "title": "Load Factor & Stall Speed", "body": "Load factor n = 1 / cos(bank angle) in a coordinated level turn. Stall speed increases with the square root of load factor: Vs(new) = Vs(1g) x sqrt(n). A 60&deg; bank level turn doubles load factor (n=2), raising stall speed ~41%."}, {"cat": "Safety", "title": "Battery Safety", "body": "Ni-Cd thermal runaway, lead-acid gassing/venting, and Li-ion fire risk all demand correct charger settings, ventilation, and case inspection. Never exceed manufacturer max discharge C-rate - excess heat degrades cells and can cause failure."}, {"cat": "Safety", "title": "Accelerated Stalls", "body": "Stalls can occur at any airspeed and any attitude if the critical angle of attack is exceeded - steep turns, abrupt pull-ups, and turbulence penetration are common accelerated-stall scenarios. Load factor multiplies stall speed, shrinking the margin above Vs quickly."}, {"cat": "Formulas", "title": "True Airspeed (Rule of Thumb)", "body": "TAS &asymp; CAS + (2% x CAS per 1,000 ft of pressure altitude), adjusted further for non-standard temperature. For precise work use a flight computer or POH tables - this is a rough estimate only, most accurate below ~10,000 ft and moderate speeds."}, {"cat": "Formulas", "title": "Propeller Tip Speed", "body": "Tip speed (ft/min) = pi x Diameter (ft) x RPM. Convert to Mach by dividing tip speed (ft/sec) by local speed of sound (~1,116 ft/sec at sea level standard day). Tip speeds approaching Mach 1 cause a sharp rise in noise and drag (efficiency loss) - most propellers are designed to stay well below this."}, {"cat": "Safety", "title": "High-Speed Propeller Effects", "body": "As blade tip speed approaches the speed of sound, shockwave formation increases drag sharply, spikes noise levels, and can induce blade vibration/stress - a major reason propeller RPM and diameter are limited by design, and why reduction gearboxes are used on many turboprops to keep the propeller itself turning slower than the engine core."}, {"cat": "Safety", "title": "Airspeed Indicator Errors", "body": "Indicated airspeed differs from calibrated (instrument/position error), true (density altitude), and groundspeed (wind) - always know which airspeed value a checklist or limitation refers to. Never mix CAS-based limitations with true airspeed readings without proper conversion."}, {"cat": "Formulas", "title": "Load Factor in a Level Turn", "body": "n = 1 / cos(bank angle). At 60 deg bank, n = 2.0 (2 G's). Stall speed increases with the square root of load factor: Vs(turn) = Vs1 x sqrt(n). A 60 deg bank turn increases stall speed by about 41%."}, {"cat": "Formulas", "title": "Specific Fuel Consumption (SFC)", "body": "BSFC (piston, lb/hp/hr) = fuel flow (lb/hr) / brake horsepower. TSFC (turbine, lb/lb-thrust/hr) = fuel flow (lb/hr) / thrust (lb). Lower SFC = more fuel-efficient for the power/thrust produced."}, {"cat": "Safety", "title": "Accelerated Stalls", "body": "Load factor increases stall speed in any maneuver that isn't 1G level flight - steep turns, pull-ups, and turbulence all raise the effective stall speed. An 'accelerated stall' can occur well above the normal 1G stall speed if the pilot exceeds the critical angle of attack during a high-G maneuver."}, {"cat": "Safety", "title": "Fuel Planning Margins", "body": "SFC is a snapshot at one power/thrust setting - actual fuel burn varies with altitude, temperature, and power setting throughout a flight. Always use POH/AFM fuel-flow charts (not a single SFC number) for real flight planning, with adequate reserves per regulation."}, {"cat": "Formulas", "title": "Pascal's Law & Hydraulic Force", "body": "Pressure is transmitted equally throughout a confined fluid: P = F / A. Force output = Pressure x Area. Mechanical advantage between two pistons = A2 / A1, so F2 = F1 x (A2 / A1). A small input force on a small piston can produce a large output force on a larger piston, at the cost of piston travel distance."}, {"cat": "Formulas", "title": "Oil Consumption Rate", "body": "Oil consumption rate (qt/hr) = quarts of oil added / hours of operation since last servicing. Compare against the engine manufacturer's normal consumption limits in the type certificate data sheet or maintenance manual; a rate above the published limit may indicate worn rings, seals, or a leak."}, {"cat": "Safety", "title": "Hydraulic System Precautions", "body": "Hydraulic fluid under pressure can penetrate skin and cause serious injury - never search for leaks with bare hands. Always relieve system pressure per the maintenance manual before opening lines or components, and use only the fluid type specified (e.g., MIL-PRF-5606 vs. MIL-PRF-83282/87257) - mixing incompatible fluid types can damage seals."}, {"cat": "Safety", "title": "Interpreting Oil Consumption Trends", "body": "A single high reading can be a fluke, but a steadily rising oil consumption trend across several flights/inspections is a strong early indicator of internal wear (rings, cylinder walls, turbine seals) and should trigger a borescope inspection, oil filter/screen check for metal, and oil analysis before the trend worsens into a forced landing or in-flight shutdown risk."}, {"cat": "Formulas", "title": "Cabin Differential Pressure", "body": "Differential pressure = cabin pressure - outside ambient pressure. Standard atmosphere approximation: pressure (inHg) drops roughly 1 inHg per 1,000 ft up to about 10,000 ft. Compare the computed differential against the aircraft's maximum structural differential pressure limit."}, {"cat": "Formulas", "title": "Wire Ampacity Margin", "body": "Ampacity margin = rated ampacity - expected circuit current. A positive margin means the wire is adequately sized; a small or negative margin indicates the wire may be undersized for the load and should be upsized or the load reduced, per the applicable wire chart."}, {"cat": "Safety", "title": "Pressurization Structural Limits", "body": "Exceeding the maximum cabin differential pressure can overstress the fuselage pressure vessel. Flight crews and maintenance must respect published limits, and any pressurization system discrepancy (erratic outflow valve, unreliable controller) should be resolved before further pressurized flight."}, {"cat": "Safety", "title": "Undersized Wiring Hazards", "body": "An undersized wire running near or above its ampacity limit can overheat, degrade insulation, and become an in-flight fire hazard. Always verify wire gauge against the manufacturer's ampacity chart for the specific bundle size, altitude, and insulation type - never assume a wire is adequate based on gauge alone without checking the chart."}, {"cat": "Formulas", "title": "Battery Capacity Check", "body": "Capacity % = (measured discharge amp-hours / rated amp-hours) x 100. A common general guideline is that a battery should retain at least 80% of rated capacity to remain serviceable, though exact limits vary by battery type and manufacturer - always check the applicable maintenance manual."}, {"cat": "Formulas", "title": "Mixture Leaning vs. Density Altitude", "body": "As density altitude increases, air density drops and less oxygen is available per unit volume, so the fuel-air mixture should be leaned to maintain an efficient ratio. Many manufacturers recommend leaning starting around 3,000-5,000 ft density altitude, with the precise procedure specified in the POH/AFM."}, {"cat": "Safety", "title": "Battery Servicing Hazards", "body": "Battery servicing exposes technicians to corrosive electrolyte (lead-acid) and combustible hydrogen gas released during charging. Use proper PPE, ensure good ventilation, and never assume a discharged battery is safe to handle without checking for damage, swelling, or leakage first."}, {"cat": "Safety", "title": "Mixture Mismanagement Risks", "body": "An improperly rich mixture at altitude wastes fuel and can foul spark plugs; an improperly lean mixture can cause excessive cylinder head temperatures and potential engine damage. Always follow the POH/AFM leaning procedure and monitor engine instruments (EGT/CHT) rather than leaning by feel alone."}, {"cat": "Formulas", "title": "Simple Jack Load Estimate", "body": "For a basic 3-point jacking setup (nose + two main gear points), approximate load sharing can be estimated from aircraft weight and CG position relative to the jack points, similar to a weight-and-balance moment calculation. Always verify against the aircraft-specific jacking procedure rather than relying on a simplified estimate alone."}, {"cat": "Formulas", "title": "EGT Margin", "body": "EGT margin = redline EGT limit - current EGT reading (at a comparable, stabilized power setting). A shrinking margin over time at the same power setting is a classic indicator of gradual hot-section deterioration and should prompt closer monitoring or inspection."}, {"cat": "Safety", "title": "Jacking Stability Precautions", "body": "Never leave a jacked aircraft unattended without stabilizing tripod jacks or locks as specified, and always jack on a level, hard, wind-protected surface within the weight/CG limits specified by the manual - overloading a single jack point or jacking outside CG limits risks a serious tip-over."}, {"cat": "Safety", "title": "Responding to Shrinking EGT Margin", "body": "A shrinking EGT margin trend at consistent power settings should prompt borescope inspection, oil analysis, and review of recent operating history (hot starts, FOD events) - continuing to operate with an eroding margin risks an in-flight EGT limit exceedance or hot-section failure."}, {"cat": "Formulas", "title": "Bonding Resistance Thresholds", "body": "General structure bonding resistance is typically acceptable up to a few tenths of an ohm depending on manufacturer data, while fuel-system bonding near tanks and fuel lines demands much tighter thresholds, often under 0.003 ohm, because arcing near fuel vapors is an explosion hazard. Always use the aircraft-specific maintenance manual value rather than a generic threshold."}, {"cat": "Formulas", "title": "Fabric Strength Margin", "body": "Fabric strength margin = measured punch-tester reading (lbs) - minimum required strength (lbs) for the aircraft's certification category. A positive margin means the fabric is still airworthy; a zero or negative margin means the aircraft must be re-covered before further flight regardless of visual appearance."}, {"cat": "Safety", "title": "Welding Fire and Gas Safety", "body": "Oxy-acetylene welding requires strict gas cylinder safety: acetylene cylinders must always be stored and used upright, never exceed 15 psi acetylene working pressure, and flashback arrestors/check valves should be installed on both oxygen and acetylene lines to prevent a flashback from traveling into the cylinder or regulator, which can cause a violent explosion."}, {"cat": "Safety", "title": "AD Compliance Tracking Discipline", "body": "Missed or improperly documented Airworthiness Directive compliance is a common source of airworthiness disputes and enforcement action. Maintain a dedicated AD compliance log cross-referenced to the aircraft logbooks, and re-verify AD applicability against the current AD list at every annual inspection, since new ADs are issued continuously."}, {"cat": "Formulas", "title": "Overboost Margin", "body": "Overboost margin = manifold pressure redline limit - current manifold pressure reading (at the same altitude/power condition). A shrinking or negative margin indicates the wastegate or its controller may not be functioning correctly, and continued operation risks detonation and engine damage."}, {"cat": "Formulas", "title": "Fuel Volume to Mass Conversion", "body": "Fuel weight (lbs) = fuel volume (gallons) x fuel density (lbs/gallon). Aviation gasoline is commonly approximated near 6.0 lbs/gallon and Jet A near 6.7-6.8 lbs/gallon at standard temperature, but actual density varies with temperature - always use the actual measured or provided density for accurate weight and balance calculations."}, {"cat": "Safety", "title": "Turbocharger Shutdown Cooldown", "body": "After sustained high-power operation, allow an idle cooldown period before shutting the engine down completely, when practical per the aircraft/engine manufacturer's procedure, to reduce the risk of oil coking in the hot turbocharger bearing housing from oil starvation at shutdown."}, {"cat": "Safety", "title": "Emergency Equipment Expiration Tracking", "body": "Maintain a dedicated tracking log for all emergency equipment expiration and inspection dates (extinguisher hydrostatic tests, oxygen generator/cylinder dates, ELT battery dates, slide/raft repack intervals) separate from routine airframe inspection tracking, since these items can lapse independent of flight hours and are easy to overlook."}, {"cat": "Oral & Practical", "title": "The 3 Parts of A&P Certification", "body": "FAA Mechanic Certification = <b>Written</b> (knowledge test, computer-based) + <b>Oral</b> (verbal Q&A with a DME) + <b>Practical</b> (hands-on tasks/projects). All three must be passed; Oral and Practical are typically given together in one session by your DME."}, {"cat": "Oral & Practical", "title": "What to Bring to Your O&P", "body": "Government photo ID, your Written test <b>Airman Knowledge Test Report</b>, proof of experience (logbooks/training records/certificate of completion), current AC 43.13-1B and applicable ACs, your own toolbox/PPE, and the FAA's current Airman Certification Standards (ACS) for A&P."}, {"cat": "Oral & Practical", "title": "Oral Exam: Typical Topics", "body": "Expect questions on: regulations (Part 43/65/91), weight & balance calculations, use of maintenance publications/ADs/service bulletins, inspection procedures, materials & hardware identification, and safe practices (FOD, hazmat, lockout/tagout)."}, {"cat": "Oral & Practical", "title": "Practical Exam: Task Structure", "body": "The DME selects tasks from the ACS Task Tables covering your rating (Airframe/Powerplant/both). Expect to <b>perform</b> a task (e.g., safety-wire a fitting, splice a wire, inspect a component) and <b>talk through</b> your reasoning and reference to approved data as you work."}, {"cat": "Oral & Practical", "title": "Logbook Entry Requirements", "body": "A proper maintenance record entry needs: description of work performed, date, total aircraft/component time (if applicable), certificate number & type of the person approving the work, and a statement that the work was performed IAW approved data. Missing any element = an unacceptable entry on your practical."}, {"cat": "Oral & Practical", "title": "Safety Wire Technique (Practical Staple)", "body": "Twist direction resists the fastener loosening. Standard: 6-8 twists per inch for 0.032in wire (adjust for wire diameter). Wire must be in tension, never slack; pigtail bent away from the part, tucked, and cut to ~1/4-1/2in to avoid FOD/injury. This is one of the most commonly assigned practical tasks."}, {"cat": "Oral & Practical", "title": "Torque Wrench Use (Practical Staple)", "body": "Verify calibration is current before use. Apply torque smoothly in one continuous motion to the specified value (never in short jerks). If using an extension/adapter, calculate the effective torque setting: TW = TE x (L/(L+A)), where L=wrench length, A=adapter length, TE=desired torque at fastener."}, {"cat": "Oral & Practical", "title": "Wire Splicing / Termination (Practical Staple)", "body": "Strip length must expose only bare conductor (no nicked strands); crimp with the correct die and verify with a pull test; heat-shrink or solder-sleeve for environmental protection where required. Be ready to identify wire gauge (AWG) by table and explain why it was selected for the circuit's current load."}, {"cat": "Oral & Practical", "title": "Weight & Balance Problem (Oral Staple)", "body": "Be ready to compute new CG after adding/removing/moving weight: New CG = (Old Total Moment +/- Item Moment) / New Total Weight, where Moment = Weight x Arm. Also know how to determine if the resulting CG falls within the aircraft's approved CG envelope from its weight & balance data."}, {"cat": "Oral & Practical", "title": "Inspection Authorization (IA) Overview", "body": "An IA is an additional privilege (not automatic) added to an A&P certificate after 3+ years of active A&P privileges, allowing the holder to perform/approve annual and progressive inspections and approve major repairs/alterations for return to service. Requires a separate FAA exam."}, {"cat": "Oral & Practical", "title": "Approved Data: Know Your Sources", "body": "Be ready to name and describe: Type Certificate Data Sheet (TCDS), Airworthiness Directives (ADs), Service Bulletins (advisory unless referenced by an AD), Advisory Circulars like AC 43.13-1B/2B, and the manufacturer's Maintenance/Illustrated Parts Manual. Examiners frequently ask which source governs a given repair."}, {"cat": "Oral & Practical", "title": "Major vs. Minor Repair/Alteration", "body": "Be ready to explain the distinction per 14 CFR Part 43 Appendix A: major repairs/alterations can affect airworthiness, weight/balance, structural strength, flight characteristics, or other qualities affecting airworthiness, and require FAA Form 337 and IA/FAA sign-off; minor ones do not."}, {"cat": "Oral & Practical", "title": "PPE & FOD Awareness (Practical Staple)", "body": "Examiners commonly grade shop discipline as part of the task: eye/hearing protection when required, proper tool control (tool accountability/shadow boards), FOD walk habits, and safe handling of hazmat (fuel, hydraulic fluid, battery acid) with correct PPE and disposal procedures."}, {"cat": "Oral & Practical", "title": "How to Study for the Oral (Not Just the Written)", "body": "The written test rewards memorization; the Oral rewards being able to <b>explain your reasoning out loud</b> and point to the specific approved-data source for your answer. Practice narrating your work process on real tasks (or in front of a mirror) using the ACS Task Tables as your checklist, not just quiz apps."}, {"cat": "Oral & Practical", "title": "Common First-Time-Fail Reasons", "body": "The most common O&P failure reasons are: incomplete/incorrect logbook entries, inability to cite the approved data source for a decision, unsafe shop practices during the practical task, and inability to explain the 'why' behind a procedure (not just perform it by rote)."}];
const ORAL_QUESTIONS=[{"cat": "Regulations & Documentation", "prompt": "What are the three parts of the FAA A&P certification process, and who administers the last two?", "answer": "Written (knowledge test), Oral, and Practical exams. The Oral and Practical are administered together by a Designated Mechanic Examiner (DME)."}, {"cat": "Regulations & Documentation", "prompt": "What documents must you bring to your Oral & Practical exam?", "answer": "Government photo ID, your Airman Knowledge Test Report, proof of experience (logbooks/training records), current AC 43.13-1B/2B and applicable ACs, your own tools/PPE, and the current FAA Airman Certification Standards (ACS)."}, {"cat": "Regulations & Documentation", "prompt": "What are the required elements of a proper maintenance logbook entry?", "answer": "Description of the work performed, the date, total aircraft/component time (if applicable), the certificate number and type of the person approving the work for return to service, and a statement that the work was performed in accordance with approved data."}, {"cat": "Hardware & Rigging", "prompt": "Explain how you determine the correct number of safety wire twists per inch and why the twist must stay in tension.", "answer": "Typically 6-8 twists per inch for 0.032in wire (adjust per wire diameter/spec). The wire must stay in tension (never slack) so it actively resists the fastener backing out; a loose wire provides no security."}, {"cat": "Hardware & Rigging", "prompt": "How do you calculate the correct torque wrench setting when using an extension or adapter?", "answer": "TW = TE x (L / (L+A)), where TE is the torque value specified for the fastener, L is the wrench's effective length, and A is the extension/adapter length. This compensates for the added leverage."}, {"cat": "Weight & Balance", "prompt": "Walk through how you'd calculate a new aircraft CG after moving a piece of equipment.", "answer": "Compute each item's Moment = Weight x Arm. New CG = (Old Total Moment +/- the moved item's Moment change) / New Total Weight. Then verify the resulting CG falls within the aircraft's approved CG envelope."}, {"cat": "Regulations & Documentation", "prompt": "What is the difference between a major and a minor repair or alteration, per 14 CFR Part 43 Appendix A?", "answer": "A major repair/alteration can affect airworthiness, weight & balance, structural strength, or flight characteristics, and requires FAA Form 337 with IA/FAA sign-off. A minor repair/alteration does not meet those criteria and doesn't require Form 337."}, {"cat": "Regulations & Documentation", "prompt": "Name the sources of 'approved data' you'd cite to justify a repair, and explain the difference between a Service Bulletin and an Airworthiness Directive.", "answer": "Type Certificate Data Sheet (TCDS), Airworthiness Directives (ADs), Service Bulletins, Advisory Circulars (e.g. AC 43.13-1B/2B), and the manufacturer's Maintenance/Illustrated Parts Manual. An AD is mandatory/regulatory; a Service Bulletin is advisory unless an AD specifically references and mandates it."}, {"cat": "Regulations & Documentation", "prompt": "What is an Inspection Authorization (IA), and what are the basic eligibility requirements?", "answer": "An IA is an added privilege on an A&P certificate that allows performing/approving annual and progressive inspections and approving major repairs/alterations for return to service. It requires at least 3 years of active A&P privileges and passing a separate FAA exam."}, {"cat": "Safety & Shop Practices", "prompt": "What PPE and shop-discipline practices would you demonstrate/explain during a practical task?", "answer": "Appropriate eye/hearing protection, proper tool control and accountability (e.g. shadow boards), FOD awareness/walks, and correct PPE and disposal procedures when handling hazmat like fuel, hydraulic fluid, or battery acid."}, {"cat": "Electrical", "prompt": "When splicing or terminating a wire, what would you check before crimping, and how would you verify the crimp?", "answer": "Verify the strip length exposes only bare conductor with no nicked strands, use the correct crimp die for the terminal and wire gauge, then verify the crimp with a pull test; apply heat-shrink or solder-sleeve for environmental protection where required."}, {"cat": "Exam Strategy", "prompt": "Why does an examiner care about your reasoning process, not just whether you get the right final answer?", "answer": "The Oral exam is designed to test judgment and the ability to justify decisions using approved data sources, not rote memorization. Being able to explain 'why' and cite the correct reference is often weighted as heavily as the task outcome itself."}, {"cat": "Exam Strategy", "prompt": "What are the most common reasons candidates fail the Oral & Practical on their first attempt?", "answer": "Incomplete or incorrect logbook entries, inability to cite the approved data source for a decision, unsafe shop practices during the practical task, and inability to explain the reasoning behind a procedure rather than just performing it by rote."}, {"cat": "Electrical", "prompt": "How would you identify the correct wire gauge (AWG) for a given circuit, and what would you check for during inspection?", "answer": "Use the aircraft wiring/AWG ampacity tables based on circuit current load and length/voltage drop considerations, then verify no chafing, corrosion, or damaged insulation and that the gauge matches what's specified in the wiring diagram."}, {"cat": "Regulations & Documentation", "prompt": "If a Designated Mechanic Examiner asks you to justify a repair method, what should your answer always reference?", "answer": "The specific approved data source authorizing that repair method for that aircraft/part -- e.g. the manufacturer's maintenance manual, an AD, a TCDS, or an applicable AC -- not general shop practice alone."}];

function startSubTest(trackId,focusModId){
  const t=TRACKS.find(x=>x.id===trackId);if(!t)return;
  window._subFocusMod=focusModId||null;
  let questions,minutes;
  if(focusModId){
    const fm=MODS.find(x=>x.id===focusModId);
    questions=fm?fm.quiz.map((q,idx)=>({...q,mod:fm.title,modId:fm.id,qIdx:idx})):[];
    for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}
    minutes=Math.max(10,questions.length*2);
  }else{
    const target=SUBTEST_TARGET_LEN[trackId]||t.modules.length;
    const guaranteed=[];const rest=[];
    for(const mid of t.modules){
      const m=MODS.find(x=>x.id===mid);if(!m)continue;
      const pool=[...m.quiz];
      if(!pool.length)continue;
      const gi=Math.floor(Math.random()*pool.length);
      guaranteed.push({...pool[gi],mod:m.title,modId:m.id,qIdx:gi});
      pool.forEach((q,idx)=>{if(idx!==gi)rest.push({...q,mod:m.title,modId:m.id,qIdx:idx})});
    }
    for(let i=rest.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[rest[i],rest[j]]=[rest[j],rest[i]];}
    const need=Math.max(0,target-guaranteed.length);
    questions=[...guaranteed,...rest.slice(0,need)];
    for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]];}
    minutes=SUBTEST_MINUTES[trackId]||30;
  }
  window._subTrack=trackId;window._subAnswers={};window._subTotal=questions.length;window._subQuestions=questions;
  window._subEndsAt=Date.now()+minutes*60000;
  const focusLabel=focusModId?(MODS.find(x=>x.id===focusModId)||{}).title:null;
  let h='<div class="card"><h2>'+t.name+' Test'+(focusLabel?' &mdash; Focus: '+focusLabel:'')+' ('+questions.length+' questions)</h2><p>Score 70%+ to pass. Time remaining: <b id="subtest-timer">'+minutes+':00</b></p></div>';
  questions.forEach((q,i)=>{
    h+='<div class="card" id="sq'+i+'"><p style="font-size:0.8rem;color:var(--txt2)">'+q.mod+'</p><p><b>'+(i+1)+'. '+q.q+'</b></p>';
    q.choices.forEach((c,ci)=>{
      h+='<button class="quiz-opt" data-ci="'+ci+'" onclick="subTestAnswer('+i+','+ci+','+q.answer+',\''+q.modId+'\','+q.qIdx+')">'+c+'</button>';
    });
    h+='<div class="explain" id="sqex'+i+'">'+q.explain+'</div></div>';
  });
  h+='<div id="subtest-result"></div>';
  document.getElementById('subtest-content').innerHTML=h;
  if(window._subTimerHandle)clearInterval(window._subTimerHandle);
  window._subTimerHandle=setInterval(subTestTick,1000);
  subTestTick();
  show('v-subtest');
}

function examAnswer(qi,ci,correct,total,modId,modQIdx){
  if(window._examAnswers[qi]!==undefined)return;
  window._examAnswers[qi]=ci===correct?1:0;
  const opts=document.querySelectorAll('#eq'+qi+' .quiz-opt');
  if(opts[ci])opts[ci].classList.add(ci===correct?'correct':'wrong');
  if(ci!==correct&&opts[correct])opts[correct].classList.add('correct');
  document.getElementById('eex'+qi).style.display='block';
  if(modId!==undefined&&modQIdx!==undefined)trackMissed(modId,parseInt(modQIdx),ci===correct);
  if(Object.keys(window._examAnswers).length===total){
    const score=Object.values(window._examAnswers).reduce((a,b)=>a+b,0);
    const pctE=Math.round(score/total*100);
    logScoreHistory('Final Exam',pctE);
    let msg='<div class="card"><h2>Exam Result: '+score+'/'+total+' ('+pctE+'%)</h2>';
    if(pctE>=80){msg+='<p style="color:var(--ok);font-size:1.2rem">&#x2705; PASSED! You earned your certificate.</p>';S.examPassed=true;S.examScore=pctE;addXP(XP_TABLE.exam_pass);checkAch('exam_pass');persist()}
    else{msg+='<p style="color:var(--fail)">Below 80%. Review and retake.</p>'}
    msg+='</div>';
    const byTrack={};
    (window._examQuestions||[]).forEach(function(q,qi2){
      const trk=TRACKS.find(t=>t.modules.includes(q.modId));
      const key=trk?trk.id:'other';
      if(!byTrack[key])byTrack[key]={id:trk?trk.id:'', title:trk?trk.name:'Other',correct:0,total:0};
      byTrack[key].total++;
      if(window._examAnswers[qi2]===1)byTrack[key].correct++;
    });
    const trackRows=Object.values(byTrack).map(function(r){r.pct=r.total?Math.round(r.correct/r.total*100):0;return r;}).sort((a,b)=>a.pct-b.pct);
    if(trackRows.length){
      msg+='<div class="card"><h3>Score by Subject Area</h3>'+trackRows.map(function(r){
        const c2=r.pct>=85?'var(--ok)':(r.pct>=70?'var(--warn)':'var(--fail)');
        let row='<div style="margin:0.6rem 0"><div style="display:flex;justify-content:space-between;font-size:0.9rem"><span>'+r.title+'</span><span style="color:'+c2+';font-weight:600">'+r.correct+'/'+r.total+' ('+r.pct+'%)</span></div><div class="progress-bar"><div class="progress-fill" style="width:'+r.pct+'%;background:'+c2+'"></div></div>';
        if(r.pct<70&&r.id){row+='<button class="btn btn-sec" style="margin-top:0.4rem;font-size:0.8rem" onclick="show(\'v-subtests\');startSubTest(\''+r.id+'\')">&#x1F3AF; Practice '+r.title+'</button>';}
        row+='</div>';
        return row;
      }).join('')+'</div>';
    }
    window._examLastReport={date:new Date().toLocaleDateString(),score:score,total:total,pct:pctE,areaRows:trackRows};
    msg+='<div style="text-align:center;margin-top:0.6rem"><button class="btn btn-sec" onclick="printExamReport()">&#x1F5A8; Print Exam Score Report</button></div>';
    document.getElementById('exam-result').innerHTML=msg;
  }
}
